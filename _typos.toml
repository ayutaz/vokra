# typos (crate-ci/typos) configuration for the Vokra repo — Phase 5b, X-08
# successor. See .github/workflows/ci-quality.yml `typos` job for the CI
# wiring. Advisory only; a typo hit annotates the run but does not block PRs.
#
# Guiding principles:
#   * Skip binary / generated / vendored trees so the check completes fast
#     and never trips on random bytes that happen to spell a dictionary word.
#   * The typos default dictionary is CONSERVATIVE — it flags known typos,
#     not unknown words. So project / brand names (Vokra, Kokoro, Voxtral,
#     CosyVoice, Silero, Moshi, Piper, Mimi, DAC, DFN3, Wyoming, etc.) do
#     NOT need to be listed here unless the dictionary later starts flagging
#     one of them. Add per-word overrides ONLY on a false-positive
#     observation, with a comment naming what version of typos flagged it.

[files]
extend-exclude = [
    # Build artifacts and vendor trees — never scan.
    "target/",
    "third_party/",
    "**/target/",
    # Lockfiles — dependency hashes and download paths are noise for a
    # spellchecker, and Cargo.lock is the NFR-DS-02 zero-dep sentinel we do
    # not want typos rewriting under any circumstance.
    "**/Cargo.lock",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/yarn.lock",
    # Binary weight / fixture / audio / shader artifacts.
    "**/*.gguf",
    "**/*.safetensors",
    "**/*.wav",
    "**/*.flac",
    "**/*.pcm",
    "**/*.bin",
    "**/*.spv",
    "**/*.png",
    "**/*.jpg",
    "**/*.jpeg",
    "**/*.pdf",
    # Fixture directories — hashes, encoded tokens, and reference dumps
    # trigger noise faster than they add value.
    "tests/fixtures/",
    "**/tests/fixtures/",
    "docs/bench-baselines/",
    # ABI symbol dumps and manifest lists — one-token-per-line files that
    # only ever contain mangled or C-ABI identifiers.
    "docs/abi/",
    "crates/vokra-eval/data/zoo/manifest.txt",
    # Minified assets (WASM/web bundle drops).
    "**/*.min.js",
    "**/*.min.css",
    # Precompiled Vulkan SPIR-V shader manifests reference opcodes, not prose.
    "crates/vokra-backend-vulkan/kernels/precompiled/",
    # Rust source (crates/*/src/*.rs) は 2-char identifier 略 (ot/alo/wih
    # 等)・SIMD math 変数 (numer/denom)・音響学正式用語 (formant)・CPU ISA
    # 略号 (ANE/SME 等) を大量に含み、typos default dictionary との
    # whack-a-mole になる。**user-facing prose (README / docs / workflow
    # YAML comment) の typo が本質**であり、Rust identifier の綴りは clippy
    # の naming lint が別途 catch する。ゆえに Rust source は全面除外し、
    # scan 対象を documentation + shell script + CI config に絞る。
    "crates/**/*.rs",
    "integrations/**/*.rs",
    "staging/**/*.rs",
    # Rust の test / benches / examples も同様に除外 (variable naming の
    # 短縮形が頻出)。
    "tests/**/*.rs",
]

[default]
# Regex-level ignores applied to the CONTENT of every scanned line. Hex
# literals and short base-16 sequences appear all over device / codec code
# (Metal argument slots, SPIR-V opcodes, GGUF magic bytes) and must never
# be spellchecked.
extend-ignore-re = [
    # Hex literals: 0xDEADBEEF, 0x1234, etc.
    "0x[0-9A-Fa-f]+",
    # SHA-1 / SHA-256 / commit hashes (7-64 hex chars).
    "\\b[0-9a-fA-F]{7,64}\\b",
    # Base64-ish tokens (>=20 chars of alphanumerics + / +) — GGUF blobs,
    # test fixtures pasted into docs, etc.
    "\\b[A-Za-z0-9+/]{20,}={0,2}\\b",
    # Creative Commons license codes (cc-by-4.0, cc-by-nc-nd-4.0, cc-by-sa-4.0
    # 等)。SPDX identifier として頻出。"nd" (NoDerivatives) 単体で
    # "and" と誤検出されるため、license 全体 pattern で ignore。
    "cc-by[a-z0-9-]*",
    "CC-BY[A-Z0-9-]*",
]

# Per-word overrides. Populate ONLY on an observed false positive, with a
# comment naming the offending typos version. Format:
#   [default.extend-words]
#   theWord = "theWord"       # v1.48.0 flagged this as "theTypo"
[default.extend-words]
# ARM Mali GPU ブランド名 — 実在の GPU 世代 (Immortalis-G715 等)。
# 2026-07-23 の Phase 5b-3 初回 CI で "Immortals" と誤検出された。
Immortalis = "Immortalis"
# "mis" は英語慣用の hyphen-prefix (mis-assembled / mis-specified /
# mis-shaped 等) として頻出。typos default dictionary は "miss" / "mist"
# を提案してくるが、hyphen-prefix 用途では正しい綴り。
mis = "mis"
# "ANE" = Apple Neural Engine。CoreML delegate scaffold の comment に
# 頻出 (probe-gated ANE 実行の記述)。typos default は "AND" / "ONE" を
# 提案してくるが、Apple の公式略称ゆえ正しい。
ANE = "ANE"
# "SME" = ARM Scalable Matrix Extension (Apple M4+ で実装)。
# typos default は "SOME" / "SAME" / "SEME" / "SMS" を提案してくるが、
# ARMv9 の公式命令拡張名ゆえ正しい (CLAUDE.md §CPU ISA 参照)。
SME = "SME"
# "alo" = SIMD kernel の "a low" 変数名 (16-bit lane の下位半分)。
# vget_low_s16(alo) 等の慣用命名で複数箇所に出現。typos default は
# "also" を提案してくるが、identifier としては短縮形が意図的。
alo = "alo"
# "wih" = LSTM の weight_ih (input-to-hidden gate) の慣用短縮。
# Silero VAD の LSTM decoder で lstm_wih / lstm_whh の pair 命名として使用。
# typos default は "with" を提案してくるが、gate 名として意図的な略称。
wih = "wih"
# "formant" = 音響学の正式用語 (声帯共鳴周波数、vocal tract resonance)。
# 音声合成・音声認識の文脈で頻出。typos default は "format" を提案してくるが、
# フォルマント (F0/F1/F2/F3) は誤り検出の対象外。
formant = "formant"
# "numer" = numerator の慣用略 (分子)。SIMD kernel の math で
# `let numer = ...; let denom = ...; let s = numer / denom;` パターン。
# typos default は "number" を提案してくるが、数式変数名として意図的。
numer = "numer"
# "OPTIN" = NVIDIA CUDA Driver API の定数名
# (CU_FUNC_ATTRIBUTE_MAX_DYNAMIC_SHARED_SIZE_BYTES_OPTIN 等)。
# typos default は "OPTION" を提案してくるが、NVIDIA 公式 API 名。
OPTIN = "OPTIN"
# "Charactr" = 実在する社名 (Charactr AI、Vocos 実装元)。
# typos default は "Character" を提案してくるが、正式な company brand。
Charactr = "Charactr"
# "wisper" = tools/docs/check_doc_examples.py の "bad-kind" test fixture で
# 意図的に間違えて書かれた model 名 (validator が reject するのを test)。
# 実 typo ではなく test 意図の一部。
wisper = "wisper"
# "buidl" = scripts/check-workflow-hygiene.sh の heredoc YAML fixture で
# 意図的に間違えて書かれた needs: 参照 (linter が misspelled needs を検出
# するのを self-test)。実 typo ではなく test 意図の一部。
buidl = "buidl"
# "JSUT" = 日本語 TTS 用の実 corpus 名 (NII 発行、"Japanese Speech corpus of
# Saruwatari-lab, University of Tokyo")。VOICEVOX / CSJ と並んで license
# audit で頻出。typos default は "JUST" を提案してくるが、正式コーパス名。
JSUT = "JSUT"
# "dows" = "days of week" の cron parser 内部略 (scripts/check-workflow-hygiene.sh
# の parse_cron 実装で使用)。5-tuple (minutes, hours, doms, months, dows)
# の慣用命名。typos default は "does"/"down" を提案してくるが、
# cron 分野の慣用短縮。
dows = "dows"
