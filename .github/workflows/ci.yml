# Vokra CI quality gates (M0: 6 required checks — NFR-MT-07 subset, CLAUDE.md item 10).
# Job names (build / test / fmt / clippy / parity / license) are fixed: they are
# registered as branch-protection required checks in M0-01-T14. Matrix jobs expand
# to "build (<os>)" / "test (<os>)" check names.
#
# NFR-PF-13 5% regression gate: wired for mel-frontend task (M2-04).

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs of the same ref (saves runner minutes), but never
# cancel in-progress runs on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release
      # M2-11-T13 (R3): audit-trail CPU-only vokra-capi build for the UPM
      # package. `--no-default-features --features cpu` guarantees no metal /
      # cuda runtime linkage in the shipped Unity binaries (NVIDIA EULA
      # compliance, CLAUDE.md). The printf line makes the feature selection
      # discoverable in the CI log for auditors (Reviewer 3, plan §R3).
      - name: Build vokra-capi (CPU-only, UPM audit trail)
        run: |
          printf 'Package build features: --no-default-features --features cpu\n'
          cargo build --release -p vokra-capi --no-default-features --features cpu
      - name: Upload macOS libvokra.dylib
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vokra-capi-macos
          path: target/release/libvokra.dylib
          retention-days: 7
      - name: Upload Windows vokra.dll
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vokra-capi-windows
          path: target/release/vokra.dll
          retention-days: 7
      - name: Upload Linux libvokra.so
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vokra-capi-linux
          path: target/release/libvokra.so
          retention-days: 7

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (workspace)
        run: cargo test --workspace

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: rustfmt check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  # GPU backend feature gates (M2-01 Metal / M2-03 CUDA). The default build/test
  # jobs cover only the CPU path; this keeps the optional `metal` / `cuda`
  # features compiling and lint-clean. Metal builds/tests on the Apple-silicon
  # macOS runner (its GPU-backed parity tests actually execute); CUDA is
  # build/lint only on Linux — GitHub runners have no NVIDIA GPU, so the dlopen'd,
  # probe-gated device tests skip cleanly. Both are first-party `vokra-*` crates,
  # so the zero-dependency invariant (checked in `license`) is unaffected.
  gpu-backends:
    name: gpu-backends
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            feature: metal
          - os: ubuntu-latest
            feature: cuda
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build (--features ${{ matrix.feature }})
        run: cargo build -p vokra-models -p vokra-cli --features ${{ matrix.feature }}
      - name: Clippy (--features ${{ matrix.feature }})
        run: cargo clippy -p vokra-models -p vokra-cli --features ${{ matrix.feature }} --all-targets -- -D warnings
      - name: Test (--features ${{ matrix.feature }})
        run: cargo test -p vokra-models --features ${{ matrix.feature }}
      # M3-01-T22: also run vokra-backend-cuda's own probe/coverage/parity tests
      # on the CUDA arm (the crate has no `cuda` feature of its own — see
      # `Cargo.toml` — so it compiles unconditionally and its device-gated tests
      # skip cleanly on the ubuntu-latest runner without a GPU).
      - name: Test backend crate (${{ matrix.feature }})
        if: matrix.feature == 'cuda'
        run: cargo test -p vokra-backend-cuda

  # M4-15: CPU + Vulkan-only build target (FR-BE-09 partial — build target
  # only; ADR M4-15). Builds the shipped cdylib + CLI with
  # `--no-default-features --features vulkan`, proves the metal / cuda
  # backends stay OUT of the dependency graph (cargo tree audit + the
  # scripts/compliance/check-cpu-vulkan-only-no-nvidia.sh symbol scanner),
  # runs the vokra-models suite under the vulkan feature (GitHub runners have
  # no Vulkan device, so device-gated tests skip cleanly — same shape as the
  # gpu-backends cuda arm; the REAL dispatch legs live in
  # gpu-vulkan-parity.yml / M4-13), assembles the artifact dir (cdylib +
  # LICENSE + build-time NOTICE variant), generates the deterministic
  # SPDX 2.3 SBOM (NFR-MT-03 / X-07; release.yml attachment is a follow-up —
  # docs/handoff/m4-15.md §(d)), and runs the M4-15 neutral-wording gate.
  # Advisory job: required-check promotion is an owner decision after the
  # M4-13 Vulkan parity runs are stably green (docs/handoff/m4-15.md §(c)).
  # Zero-dep (NFR-DS-02): nothing here may touch the root Cargo.lock — the
  # last step is the same mutation tripwire riscv-cross-build uses.
  build-target-vulkan-only:
    name: build-target-vulkan-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build vokra-capi (CPU + Vulkan-only, audit trail)
        # The printf line makes the feature selection discoverable in the CI
        # log for auditors — same audit-trail pattern as the CPU-only UPM
        # build in the `build` job (M2-11-T13 / Reviewer 3).
        run: |
          printf 'Build-target features: --no-default-features --features vulkan\n'
          cargo build --release -p vokra-capi --no-default-features --features vulkan
      - name: Build vokra-cli (CPU + Vulkan-only)
        run: cargo build --release -p vokra-cli --no-default-features --features vulkan
      - name: Clippy (CPU + Vulkan-only, deny warnings)
        run: cargo clippy -p vokra-capi -p vokra-cli --no-default-features --features vulkan --all-targets -- -D warnings
      - name: Test vokra-models (--features vulkan)
        # No Vulkan device on GitHub-hosted runners: the device-gated tests
        # skip cleanly (announced skip, never a fabricated pass). The real
        # dispatch / parity legs are owned by gpu-vulkan-parity.yml (M4-13).
        run: cargo test -p vokra-models --features vulkan
      - name: Dependency-graph exclusion audit (FR-BE-09)
        # The SBOM documents the exclusion; this step ENFORCES it: the
        # CPU + Vulkan-only closure must contain vokra-backend-vulkan and
        # must not contain vokra-backend-metal / vokra-backend-cuda.
        run: |
          set -euo pipefail
          tree="$(cargo tree -p vokra-capi --no-default-features --features vulkan -e normal --prefix none)"
          printf '%s\n' "$tree"
          printf '%s\n' "$tree" | grep -q 'vokra-backend-vulkan' \
            || { echo '::error::vokra-backend-vulkan missing from the CPU + Vulkan-only graph'; exit 1; }
          if printf '%s\n' "$tree" | grep -qE 'vokra-backend-(metal|cuda)'; then
            echo '::error::excluded backend crate present in the CPU + Vulkan-only graph'
            exit 1
          fi
      - name: M4-15 tooling scratch-tree tests
        # NOTICE-variant generator + non-link scanner + neutral-wording gate,
        # exercised against scratch trees with real compiled negative
        # fixtures (undefined cudaMalloc / cuInit / objc_msgSend refs).
        run: bash scripts/compliance/test-m4-15-build-target.sh
      - name: Assemble artifact dir (cdylib + LICENSE + NOTICE variant)
        run: |
          set -euo pipefail
          mkdir -p dist/cpu-vulkan-only
          cp target/release/libvokra.so dist/cpu-vulkan-only/
          cp LICENSE dist/cpu-vulkan-only/LICENSE
          bash scripts/gen-notice-cpu-vulkan-only.sh --out dist/cpu-vulkan-only/NOTICE
      - name: Generate SPDX 2.3 SBOM (deterministic)
        run: |
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-capi \
            --no-default-features \
            --features vulkan \
            --doc-name vokra-capi-cpu-vulkan-only \
            --output dist/cpu-vulkan-only/vokra-capi.spdx.json
      - name: SBOM self-test (structure / exclusion / determinism)
        run: bash scripts/sbom/test-generate-spdx.sh
      - name: NVIDIA / Metal non-link scanner
        run: bash scripts/compliance/check-cpu-vulkan-only-no-nvidia.sh dist/cpu-vulkan-only
      - name: Neutral-wording gate (M4-15-T08)
        run: |
          bash scripts/compliance/check-no-market-claims.sh \
            dist/cpu-vulkan-only \
            CHANGELOG.md \
            scripts/gen-notice-cpu-vulkan-only.sh \
            scripts/sbom \
            scripts/compliance/check-cpu-vulkan-only-no-nvidia.sh \
            docs/handoff/m4-15.md
      - name: Upload CPU + Vulkan-only artifact (cdylib + legal files + SBOM)
        uses: actions/upload-artifact@v4
        with:
          name: vokra-cpu-vulkan-only-linux
          path: dist/cpu-vulkan-only/
          retention-days: 7
      - name: Verify root Cargo.lock unchanged
        # NFR-DS-02: neither the feature-selected build nor the SBOM
        # tooling may add anything to the root lockfile.
        run: git diff --exit-code Cargo.lock

  # RISC-V RVV 1.0 cross-build (M3-13-T10, FR-BE-01, NFR-PT-01). The completion
  # bar for M3-13 (milestones.md §7.2) is "RVV 1.0 target のクロスビルドが CI
  # で継続検証 + RVV dispatch path の単体テスト通過" — this job satisfies the
  # cross-build leg; the dispatch-path unit tests are exercised by the regular
  # `test` matrix (they compile on every host and only the /proc/cpuinfo parser
  # is riscv64-gated). GitHub-hosted runners have no RVV silicon and no
  # qemu-user pre-installed, so we do not attempt to *execute* the riscv64
  # binary here — the ADR (docs/adr/M3-13-riscv-rvv-1.0.md §d) explicitly scopes
  # this WP to cross-build + host-executable differential tests; real
  # SpacemiT K1 / Banana Pi BPI-F3 RTF measurement is an owner follow-up.
  #
  # `-p vokra-backend-cpu` is deliberately narrow: this is a library-only crate
  # so `cargo build` produces an rlib and does not invoke the target linker
  # (no cross-linker needed on the Ubuntu runner). Building the full workspace
  # would need `riscv64-linux-gnu-gcc` in PATH and pulls in every downstream
  # crate — orthogonal to the M3-13 completion condition. The zero-dep
  # invariant (NFR-DS-02, root Cargo.lock unchanged) is enforced by the
  # existing `license` job; adding a target does not alter dependencies.
  riscv-cross-build:
    name: riscv-cross-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-linux-gnu
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Cross-build vokra-backend-cpu (riscv64gc-unknown-linux-gnu)
        # Baseline rv64gc target. RVV 1.0 instructions land only inside the
        # `.option arch, +v` fences in `kernels::rvv::add` (see
        # docs/adr/M3-13-riscv-rvv-1.0.md §e); the surrounding binary stays at
        # rv64gc so the same artifact runs on RVV-less harts (probe returns
        # `rvv_v = false` → dispatch falls back to scalar within the CPU
        # backend, which is NOT the FR-EX-08 cross-backend silent-fallback rule).
        run: cargo build --release --target riscv64gc-unknown-linux-gnu -p vokra-backend-cpu
      - name: Clippy vokra-backend-cpu (riscv64gc)
        # Deny warnings on the riscv64 configuration too — catches
        # target-specific lint regressions in the `cfg(target_arch = "riscv64")`
        # blocks (`features::detect_riscv_caps`, `kernels::rvv`).
        run: cargo clippy --release --target riscv64gc-unknown-linux-gnu -p vokra-backend-cpu -- -D warnings
      - name: Verify RVV instructions land in the emitted binary
        # Belt-and-suspenders: `cargo build` succeeds even if `.option arch, +v`
        # is silently ignored by the LLVM integrated assembler in some future
        # regression, so we re-emit asm and grep for the four RVV mnemonics
        # our kernel uses. Any drop-out here is a hard error, not a warning.
        run: |
          set -euo pipefail
          cargo rustc --release --target riscv64gc-unknown-linux-gnu -p vokra-backend-cpu -- --emit=asm
          ASM=$(find target/riscv64gc-unknown-linux-gnu/release/deps -name 'vokra_backend_cpu-*.s' | head -n 1)
          test -n "$ASM"
          for mnemonic in vsetvli vle32 vfadd vse32; do
            if ! grep -q "$mnemonic" "$ASM"; then
              echo "M3-13 regression: $mnemonic missing from riscv64gc asm ($ASM)" >&2
              exit 1
            fi
          done
          echo "M3-13 RVV kernel: emitted asm contains vsetvli / vle32 / vfadd / vse32." >> "$GITHUB_STEP_SUMMARY"
      - name: Verify root Cargo.lock unchanged
        # NFR-DS-02: cross-building for riscv64 must not add any new crates to
        # the root Cargo.lock (the target is std-only). Any diff here means a
        # riscv64-only crate crept into vokra-backend-cpu — reject the PR.
        run: git diff --exit-code Cargo.lock

  # iOS build scaffold (M2-02, NFR-RL-03 static-only, NFR-RL-05 JIT-free,
  # FR-EX-08 no silent fallback). Cross-compiles vokra-capi to the 3 Apple
  # triples (device arm64 + simulator arm64/x86_64), assembles
  # `Vokra.xcframework` (2 slices: device + fat sim, static libvokra.a per
  # slice), and confirms the Swift Package resolves. Registered as a required
  # check on `main` per NFR-MT-07. cbindgen header drift is caught before the
  # cross-compile via `gen-c-abi.sh --check` (M2-02 T08/R3). Simulator boot is
  # deferred to an optional/nightly follow-up job (`ios-smoke-simulator`, D9);
  # physical iPhone RTF (NFR-PF-03) is owned by M2-14. CUDA is unconditionally
  # off for iOS (T04 red-line + `cfg(target_os = "ios")` compile_error in
  # `vokra-backend-cuda`); Metal is on via `vokra-models/metal`. No new
  # third-party crate deps — cbindgen stays build-only (MPL-2.0, D6) and the
  # zero-dep invariant (NFR-DS-02) is unchanged.
  ios-build:
    name: ios-build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustup iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Verify C header drift (gen-c-abi --check, R3)
        run: scripts/gen-c-abi.sh --check
      - name: Build iOS XCFramework
        run: scripts/build-ios.sh
      - name: Verify XCFramework (static-only, symbol whitelist)
        run: scripts/verify-ios-xcframework.sh build/ios/Vokra.xcframework
      - name: Verify Swift Package resolves
        run: swift package describe
      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vokra-xcframework
          path: build/ios/Vokra.xcframework
          retention-days: 7

  # Numerical parity harness (NFR-QL-01). At M0 this runs the tests/parity
  # placeholder harness; real per-model parity tests are added by M0-04/05/06.
  # M2-04: matrix expansion runs `parity_whisper` under both fusion states
  # (`VOKRA_DISABLE_FUSION=1` and `=0`) so the fused log-mel path stays
  # bit-close (FP32 atol=0.01, NFR-QL-01) to the imperative reference.
  # M2-08-T15: extends `parity` to run `quant_parity` (K-quant weight →
  # dequantize → GEMM parity against F32 reference, FP16 atol=0.01, INT8 branch
  # asserts `MinDtypeViolation`/`UnsupportedQuantPath`) and `policy_e2e` (offline
  # converter → runtime reload → `check_degradation` mel-loss 5% gate, and the
  # negative cases for Vocos/BigVGAN W8A8 rejection + HiFi-GAN opt-in verify).
  # Both are required checks so an M2-08 quant policy regression blocks the PR
  # in the same job that gates fused-frontend parity; `license` remains the
  # zero-dep enforcer (no new deps means cargo-deny continues passing).
  parity-matrix:
    name: parity-matrix
    strategy:
      fail-fast: false
      matrix:
        fusion: ["0", "1"]
    runs-on: ubuntu-latest
    env:
      VOKRA_DISABLE_FUSION: ${{ matrix.fusion }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Numerical parity tests (tests/parity)
        run: cargo test -p vokra-parity
      - name: Whisper frontend parity (fused vs unfused)
        run: cargo test -p vokra-models --test parity_whisper
      - name: Quant parity (M2-08, K-quant dequant → GEMM, FP16 atol=0.01)
        run: cargo test -p vokra-core --test quant_parity
      - name: Policy e2e (M2-08, converter → runtime → 5% mel-loss gate)
        run: cargo test -p vokra-cli --test policy_e2e

  # Aggregator job that fans in on the parity matrix so branch protection
  # can require a single `parity` check context instead of the per-matrix-
  # cell `parity (0)` / `parity (1)` names GitHub emits by default.
  #
  # Rationale: when a job with `strategy.matrix` runs, GitHub reports one
  # status check per matrix cell (e.g. `parity (0)`, `parity (1)`) and
  # NEVER a raw check with the bare job name (e.g. `parity`). If the
  # branch-protection required-check list references the bare name (as
  # ours does — `parity` is one of the 10 required contexts on `main`),
  # that context never gets a report and the PR stays permanently in
  # "Expected — Waiting for status to be reported" limbo.
  #
  # The classic fix: rename the matrix job (here `parity-matrix`) and add
  # a downstream job that `needs:` it and reports itself under the
  # required name. All matrix cells must pass (`needs: parity-matrix`
  # implicitly gates on ALL of them; a single cell failure short-circuits
  # this job to `skipped`, which the required-check list treats as fail).
  parity:
    name: parity
    needs: parity-matrix
    runs-on: ubuntu-latest
    steps:
      - name: All parity matrix cells passed
        run: echo "parity matrix (fusion=0, fusion=1) both green"

  # License / vulnerability / forbidden-dependency gate (NFR-LC-04, X-08).
  # deny.toml is owned by M0-02 (allow: Apache-2.0/MIT/BSD; deny: GPL/LGPL;
  # bans: protobuf/onnx-family crates). GPL/LGPL or onnx/protobuf deps block the PR.
  license:
    name: license
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure Cargo.lock exists (cargo-audit requires a lockfile)
        run: |
          if [ ! -f Cargo.lock ]; then
            cargo generate-lockfile
          fi
      - name: cargo-deny (licenses / advisories / bans)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo-audit (RustSec advisories)
        run: cargo audit
      - name: Zero-dependency invariant (NFR-DS-02)
        # The strict "only vokra-* crates in Cargo.lock" check. cargo-deny's
        # `bans` allows permitted third-party crates; this forbids ALL of them.
        # It runs in the pre-commit hook too, but the hook is bypassable
        # (`--no-verify`), so the invariant must also be enforced here.
        run: bash scripts/check-zero-deps.sh
      - name: Forbidden symbols / dependencies check
        run: bash scripts/check-forbidden-symbols.sh

  # Performance regression gate (NFR-PF-13, M2-04). Runs the fused log-mel
  # `mel-frontend` bench through `vokra-cli bench --baseline` against a
  # committed baseline (`docs/bench-baselines/mel_frontend_baseline.json`,
  # captured with fusion OFF). Fusion is ON by default here, so any run
  # slower than baseline * 1.05 fails with exit code 3 (bench.rs
  # REGRESSION_THRESHOLD = 0.05). Locked to `ubuntu-latest` for the
  # deterministic scalar + AVX2 path — NEON on macos-latest has too much
  # hardware skew to hold a strict 5% gate, so the gate stays off there.
  bench-regression:
    name: bench-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build vokra-cli (release)
        run: cargo build --release -p vokra-cli
      - name: mel-frontend regression check (5% gate, fusion enabled)
        # M2-04-T13 WP completion: fused log-mel PR merges only when this job
        # (regression), build/test/fmt/clippy/gpu-backends/license (zero-dep),
        # and `parity` (both fusion matrix legs) are all green. Reviewer
        # verifies via `gh pr checks`; two followup issues are linked in the
        # PR description: (a) Snake fusion kernel body + BigVGAN AMP fusion
        # co-delivered with FR-OP-13/11/14 consumer arrival, and (b) GPU fused
        # log-mel kernels (Metal MSL `MetalContext::fused_logmel_f32` + CUDA
        # NVRTC `fused_logmel_kernel`).
        run: |
          ./target/release/vokra-cli bench \
            --task mel-frontend \
            --iters 30 \
            --warmup 5 \
            --baseline docs/bench-baselines/mel_frontend_baseline.json \
            --format json

  # M2-09-T19 vokra-server single-binary deployment gate (FR-SV-01, NFR-DS-02,
  # NFR-MT-07). Verifies four properties of the OUT-OF-WORKSPACE
  # `integrations/vokra-server/` crate on every PR:
  #
  #   1. It cross-builds cleanly to `x86_64-unknown-linux-musl` as a
  #      statically-linked release binary (Docker-free deployment target).
  #      `file` confirms `statically linked`; `ldd` confirms no dynamic
  #      dependencies (glibc-free, portable across distros).
  #
  #   2. The static binary starts standalone and answers `GET /health` with
  #      200 OK — no Docker, no reverse proxy, no external runtime deps
  #      (FR-SV-01). Bind is 127.0.0.1 on a random high port to avoid
  #      collision on shared runners.
  #
  #   3. The runtime workspace stays uncontaminated: `cargo tree -p vokra-core`
  #      must not pull `hyper` / `tokio` / `axum` / `serde` / `onnx` /
  #      `protobuf` (server-only deps stay confined to integrations/, per the
  #      excluded-workspace pattern). Enforces NFR-DS-02 at the graph level in
  #      addition to the lockfile-level `check-zero-deps.sh`.
  #
  #   4. `scripts/check-zero-deps.sh` re-run against the root `Cargo.lock` —
  #      belt-and-suspenders with the `license` job, verifying the server
  #      dependencies did not leak into the root graph via any workspace
  #      member.
  #
  # The server crate is NOT in the root workspace (its Cargo.toml has an empty
  # `[workspace]` table and root `Cargo.toml` `exclude = ["integrations"]`),
  # so this job builds it explicitly via `--manifest-path` and does not
  # perturb the root workspace build cache.
  server-deployment:
    name: server-deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            integrations/vokra-server
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Runtime workspace non-contamination (cargo tree -p vokra-core)
        # FR-SV-01 / NFR-DS-02: the runtime graph must not know about the
        # server's HTTP / async / serde stack. `cargo tree -e normal` prints
        # the full normal-dep graph; grep -F fixed-string search rejects any
        # forbidden crate name. `set -o pipefail` propagates a `cargo tree`
        # failure past the tee.
        run: |
          set -euo pipefail
          echo "::group::cargo tree -p vokra-core"
          cargo tree -e normal -p vokra-core > /tmp/vokra-core-tree.txt
          cat /tmp/vokra-core-tree.txt
          echo "::endgroup::"
          forbidden="hyper tokio axum serde serde_json onnx onnxruntime protobuf prost tonic"
          fail=0
          for crate in $forbidden; do
            if grep -qE "^[^a-zA-Z0-9_-]*${crate}[[:space:]]v" /tmp/vokra-core-tree.txt; then
              echo "::error::vokra-core depends on forbidden crate: ${crate}"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::runtime workspace non-contamination check failed (FR-SV-01, NFR-DS-02)"
            exit 1
          fi
      - name: Zero-dependency invariant on root Cargo.lock (NFR-DS-02)
        # Belt-and-suspenders with the `license` job: the server crate's
        # third-party deps must not leak into the root Cargo.lock. This scans
        # the SAME root Cargo.lock and asserts vokra-* only.
        run: bash scripts/check-zero-deps.sh
      - name: Build vokra-server (release, x86_64-unknown-linux-musl)
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-musl \
            -p vokra-server \
            --manifest-path integrations/vokra-server/Cargo.toml
      - name: Verify statically linked (file)
        # A musl-linked release binary must be statically linked. Modern
        # toolchains (rustc >= 1.86 on Ubuntu 24.04 runners) default to PIE +
        # musl static, which `file` reports as either `statically linked` (old
        # binutils) or `static-pie linked` (new binutils). Both are the "no
        # dynamic dependencies" state we want — a shared-lib linkage would
        # instead read `dynamically linked` and would fail this gate. The
        # `ldd` step below is the belt-and-suspenders guard against `=>`
        # entries (see next step).
        run: |
          set -euo pipefail
          BIN=integrations/vokra-server/target/x86_64-unknown-linux-musl/release/vokra-server
          test -f "$BIN"
          file "$BIN"
          file "$BIN" | grep -Eq "statically linked|static-pie linked"
      - name: Verify no dynamic dependencies (ldd)
        # `ldd` on a truly-static binary prints "not a dynamic executable" (or
        # exits nonzero); either way, ANY `=>` line means a dyn dep was
        # pulled in, which breaks Docker-free portable deployment.
        run: |
          set -euo pipefail
          BIN=integrations/vokra-server/target/x86_64-unknown-linux-musl/release/vokra-server
          if ldd "$BIN" 2>&1 | grep -q "=>"; then
            echo "::error::vokra-server has dynamic dependencies (breaks FR-SV-01 single-binary deployment):"
            ldd "$BIN"
            exit 1
          fi
          ldd "$BIN" || true
      - name: Docker-less standalone startup smoke test (curl /health)
        # FR-SV-01: run the static binary directly (no Docker, no reverse
        # proxy, no launcher). Bind loopback on a random high port so the
        # test cannot collide with anything else on the runner and cannot
        # inadvertently expose a listener beyond the runner.
        run: |
          set -euo pipefail
          BIN=integrations/vokra-server/target/x86_64-unknown-linux-musl/release/vokra-server
          # Random ephemeral high port (49152-65535 range).
          PORT=$((49152 + RANDOM % 16000))
          echo "Starting vokra-server on 127.0.0.1:${PORT}"
          # `--http-bind` sets the HTTP listener (OpenAI / vLLM / piper-plus
          # endpoints). The Wyoming listener defaults to 127.0.0.1:10300;
          # since it is not what this smoke tests, letting it use its
          # default is fine (loopback + a different port, no collision on
          # the random ephemeral HTTP port).
          "$BIN" --http-bind "127.0.0.1:${PORT}" &
          SERVER_PID=$!
          # Ensure the background process is reaped even on failure.
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          # Poll /health for up to ~10s (startup should be well under 1s).
          for i in $(seq 1 20); do
            if curl -fsS --max-time 1 "http://127.0.0.1:${PORT}/health" > /tmp/health.txt; then
              echo "health probe succeeded on attempt $i:"
              cat /tmp/health.txt
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 0.5
          done
          echo "::error::vokra-server did not answer /health within 10s"
          kill "$SERVER_PID" 2>/dev/null || true
          exit 1
      - name: Verify root Cargo.lock unchanged
        # Sanity: the whole job must not have mutated the root workspace
        # lockfile. If cargo somehow touched it, the isolation pattern is
        # broken and the change must be reviewed.
        run: git diff --exit-code Cargo.lock

  # M2-09-T22 vokra-server 4-API compat + cross-target build + cargo-deny (FR-SV-01..05,
  # NFR-MT-07, NFR-LC-04). This job is REQUIRED on `main` PRs — it is what blocks a
  # break in any of the four documented compat surfaces (OpenAI `/v1/audio/transcriptions`,
  # vLLM `/v1/completions` + `/v1/chat/completions` schema, piper-plus `/api/tts`,
  # Wyoming Protocol) from landing. Complements `server-deployment` (T19), which owns
  # single-binary / static-link / non-contamination proof.
  #
  # Design notes (M2-09 plan §3.2 T22, §5 R1):
  #
  #   * Compat tests live under `integrations/vokra-server/tests/{openai_compat,
  #     vllm_compat, piper_http_compat, wyoming_compat}.rs` and speak the wire
  #     protocols (multipart, JSONL over TCP, application/json). They run via
  #     `--manifest-path integrations/vokra-server/Cargo.toml` so the excluded-
  #     workspace pattern (empty `[workspace]`, own Cargo.lock) is respected and
  #     the root workspace build cache is untouched.
  #
  #   * GGUF-gate: Whisper `base` is the per-PR default — CI writes a synthetic
  #     `.gguf` fixture path into `VOKRA_WHISPER_BASE_GGUF` (the tests treat an
  #     absent path as "skip", not "fail", per FR-EX-08 no-silent-fallback: model
  #     absence is an explicit skip, not a fabricated pass). Whisper `large-v3`
  #     stays nightly-only (`VOKRA_WHISPER_LARGE_V3_GGUF`) — we intentionally do
  #     NOT set it on per-PR runs so the large-v3 branch is skipped, keeping the
  #     PR path fast and avoiding a 1.5GB weight download per PR. The per-test
  #     skip decision + a summary counter is printed to `$GITHUB_STEP_SUMMARY`
  #     so reviewers can see at a glance which compat legs actually executed vs
  #     skipped (audit trail for the "GGUF-gated skip" pattern documented in
  #     `integrations/vokra-server/tests/openai_compat.rs`).
  #
  #   * Cross-target matrix: FR-SV-01 requires a single binary on Linux x86_64
  #     (musl static, handled in `server-deployment`), macOS ARM64 (Apple
  #     silicon default runner), and Windows x86_64. This matrix cross-builds
  #     the release binary on all three so a Windows-only build regression
  #     (e.g. tokio winsock, path separators in include_bytes!, MSVC linker
  #     flags) blocks the PR at the same gate as the Linux musl smoke test.
  #     macOS ARM64 uses the default apple-silicon runner triple so no extra
  #     `--target` flag is needed (build is native). Test execution runs on
  #     Ubuntu only (the compat tests are wire-protocol-level and OS-agnostic;
  #     testing on all three would triple runner minutes with no additional
  #     coverage).
  #
  #   * cargo-deny (NFR-LC-04): the server crate has its own `deny.toml`
  #     (integrations/vokra-server/deny.toml) permitting the HTTP / async /
  #     serde stack while banning GPL/LGPL and onnx/protobuf families. This job
  #     runs the check against the server workspace explicitly. The root
  #     `license` job continues to enforce zero-dep on the runtime workspace.
  server-compat:
    name: server-compat
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-musl
            run_tests: true
          - os: macos-latest
            triple: aarch64-apple-darwin
            run_tests: false
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            run_tests: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            integrations/vokra-server
      - name: Install musl toolchain (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Cross-build vokra-server (release, ${{ matrix.triple }})
        # FR-SV-01 cross-target proof: the server binary must build on the
        # three officially supported single-binary triples. macOS ARM64 is the
        # native runner triple (no --target needed on apple-silicon runners
        # but we pass it explicitly for symmetry); Windows uses the MSVC ABI;
        # Linux uses musl for static linkage (see T19 for the static-link
        # verification — this leg only proves the toolchain wiring compiles).
        shell: bash
        run: |
          cargo build --release \
            --target ${{ matrix.triple }} \
            -p vokra-server \
            --manifest-path integrations/vokra-server/Cargo.toml
      - name: cargo-deny (server crate, NFR-LC-04)
        if: matrix.os == 'ubuntu-latest'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans
          manifest-path: integrations/vokra-server/Cargo.toml
      - name: Locate Whisper base GGUF fixture (per-PR GGUF-gate)
        # Per M2-09 plan §3.2 T22: base is per-PR, large-v3 is nightly-only.
        # We set VOKRA_WHISPER_BASE_GGUF to a repo-committed tiny fixture if
        # one exists; otherwise leave unset so tests take the documented "skip"
        # branch (openai_compat.rs `whisper_gguf_for()` returns None → the
        # test asserts nothing and the skip is counted in the summary below).
        # This is the FR-EX-08 no-silent-fallback shape: absence → explicit
        # skip, never a fabricated pass. large-v3 is deliberately NOT set here.
        if: matrix.run_tests
        shell: bash
        run: |
          set -euo pipefail
          FIXTURE="$GITHUB_WORKSPACE/tests/fixtures/whisper-base.gguf"
          if [ -f "$FIXTURE" ]; then
            echo "VOKRA_WHISPER_BASE_GGUF=$FIXTURE" >> "$GITHUB_ENV"
            echo "Whisper base GGUF fixture: $FIXTURE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Whisper base GGUF fixture found; base-gated tests will skip." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Whisper large-v3 is nightly-only; large-v3-gated tests will skip on per-PR runs." >> "$GITHUB_STEP_SUMMARY"
      - name: Compat tests (openai / vllm / piper_http / wyoming)
        # M2-09-T22 required checks: these four test binaries speak the wire
        # protocols end-to-end. On main-PR builds this is where a compat break
        # is caught. Each test binds 127.0.0.1 on an ephemeral port picked by
        # the test itself (see openai_compat.rs / wyoming_compat.rs); no
        # coordination or shared-port setup is needed.
        if: matrix.run_tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test --release \
            --manifest-path integrations/vokra-server/Cargo.toml \
            -p vokra-server \
            --test openai_compat \
            --test vllm_compat \
            --test piper_http_compat \
            --test wyoming_compat \
            -- --nocapture
      - name: GGUF-gate skip summary
        # Print the compat matrix state to the job summary so reviewers see
        # which legs executed vs skipped without spelunking test logs. Base is
        # per-PR (may skip if fixture absent); large-v3 skips on per-PR runs
        # by design; nightly runs will set both env vars.
        if: matrix.run_tests && always()
        shell: bash
        run: |
          {
            echo "### server-compat GGUF-gate summary"
            echo ""
            echo "| model | env var | state on this run |"
            echo "|-------|---------|-------------------|"
            if [ -n "${VOKRA_WHISPER_BASE_GGUF:-}" ]; then
              echo "| whisper base | VOKRA_WHISPER_BASE_GGUF | present (tests executed) |"
            else
              echo "| whisper base | VOKRA_WHISPER_BASE_GGUF | absent (tests skipped) |"
            fi
            if [ -n "${VOKRA_WHISPER_LARGE_V3_GGUF:-}" ]; then
              echo "| whisper large-v3 | VOKRA_WHISPER_LARGE_V3_GGUF | present (nightly / cached) |"
            else
              echo "| whisper large-v3 | VOKRA_WHISPER_LARGE_V3_GGUF | absent (per-PR skip by design) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Verify root Cargo.lock unchanged
        # T22 mutation-guard: cross-building the server crate must never
        # perturb the root Cargo.lock — the excluded-workspace pattern is what
        # keeps the root zero-dep. Any diff here means server deps leaked into
        # the runtime graph (NFR-DS-02 breach, plan §5 R1).
        shell: bash
        run: git diff --exit-code Cargo.lock

  # M2-12-T16 Python binding license audit (NFR-LC-02, NFR-LC-04). Belt-and-
  # suspenders with the root `license` job (which owns the Rust side via
  # cargo-deny). This job enforces the Python-side allowlist on the build /
  # runtime deps declared in `bindings/python/pyproject.toml` so a GPL / LGPL
  # crate cannot creep in through a Python transitive dep (e.g. a hatchling
  # plugin flipping license, or a wheel-time build tool). Runs in an isolated
  # venv so the runner's ambient site-packages cannot mask a bad license.
  #
  # Allowlist (matches D13 / plan §1):
  #   Apache-2.0 ; MIT ; BSD-3-Clause ; BSD-2-Clause ; PSF-2.0 ; Python-2.0
  # (numpy = BSD-3, hatchling = MIT, pytest = MIT are all covered; anything
  # outside this set — GPL / LGPL / MPL / CC-BY-NC — fails the job.)
  python-license-audit:
    name: python-license-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create isolated venv and install binding + audit tool
        # `pip install .` reads bindings/python/pyproject.toml so build / runtime
        # deps materialize in this venv. `pip-licenses` (MIT) enumerates every
        # installed distribution and enforces --allow-only. Isolated venv so the
        # runner's ambient site-packages cannot mask a bad license.
        run: |
          set -euo pipefail
          python -m venv /tmp/vokra-py-audit
          # shellcheck disable=SC1091
          . /tmp/vokra-py-audit/bin/activate
          python -m pip install --upgrade pip
          if [ -f bindings/python/pyproject.toml ]; then
            python -m pip install ./bindings/python
          else
            echo "bindings/python/pyproject.toml not yet present — auditing pip-licenses toolchain only."
          fi
          python -m pip install pip-licenses
      - name: pip-licenses --allow-only (NFR-LC-02 GPL/LGPL block)
        # --allow-only fails nonzero if ANY installed dist reports a license
        # outside the allowlist. The venv holds only the binding's transitive
        # deps + pip-licenses itself; pip / setuptools / prettytable / wheel
        # are added to the allowlist so the toolchain itself does not trip the
        # gate (they are all MIT / BSD / Apache).
        #
        # Historical note: the flag `--with-system=false` used to hide
        # pip/setuptools, but pip-licenses 5.x turned `-s/--with-system` into a
        # store_true flag that no longer accepts `=false` (fails with "ignored
        # explicit argument"). Rather than pin an old release, we drop the
        # flag (default already omits system packages) and rely on the
        # allowlist expansion to cover the standard toolchain packages.
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . /tmp/vokra-py-audit/bin/activate
          pip-licenses \
            --format=markdown \
            --allow-only 'Apache-2.0;Apache Software License;MIT;MIT License;BSD-3-Clause;BSD License;BSD-2-Clause;PSF-2.0;Python-2.0' \
            | tee /tmp/pip-licenses.md
          {
            echo "### Python binding license audit"
            echo ""
            cat /tmp/pip-licenses.md
          } >> "$GITHUB_STEP_SUMMARY"

  # M2-11-T13 Unity Official Plugin package assembly (FR-API-04, NFR-MT-07/08,
  # NFR-RL-02/03/04, NFR-LC-01). Assembles the `com.vokra.unity` UPM package
  # from four native artifact sources:
  #   1. iOS static libvokra.a from `ios-build` job's Vokra-xcframework
  #      artifact (device slice only, __Internal linkage, NFR-RL-03).
  #   2. Desktop cdylibs (macOS libvokra.dylib / Windows vokra.dll /
  #      Linux libvokra.so) from the `build` job's per-OS upload-artifact
  #      steps (audit-trail CPU-only per plan §R3).
  #   3. Android arm64-v8a libvokra.so cross-compiled here via NDK.
  # Then runs structure lint (jq on package.json + asmdefs, find shape
  # assertion under Plugins/), the NVIDIA runtime non-bundle check (plan §R3
  # / CLAUDE.md NVIDIA EULA "installed only in a private (non-shared)
  # directory location"), and the UPM dependencies check (.dependencies=={},
  # no Sentis reference — zero-dep discipline for the Unity surface too).
  # Uploads the assembled UPM `.tgz` as `Vokra-unity-package` (retention 14d)
  # so the release train can promote the same tarball to GitHub Releases /
  # OpenUPM (release.yml companion job, T14). Registered as a required PR
  # check per NFR-MT-07 alongside build / test / fmt / clippy / parity /
  # license / ios-build. IL2CPP Player build is deferred to a nightly
  # workflow (game-ci) because Unity licensing isn't available on the
  # per-PR path — the shape lint here catches every regression a Unity
  # Editor open would also catch (asmdef parse, plugin layout, package.json
  # schema) without needing the Editor.
  unity-package:
    name: unity-package
    needs: [build, ios-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Download Vokra-xcframework (from ios-build)
        uses: actions/download-artifact@v4
        with:
          name: Vokra-xcframework
          path: build/ios/Vokra.xcframework
      - name: Download macOS libvokra.dylib (from build/macos-latest)
        uses: actions/download-artifact@v4
        with:
          name: vokra-capi-macos
          path: artifacts/macos
      - name: Download Windows vokra.dll (from build/windows-latest)
        uses: actions/download-artifact@v4
        with:
          name: vokra-capi-windows
          path: artifacts/windows
      - name: Download Linux libvokra.so (from build/ubuntu-latest)
        uses: actions/download-artifact@v4
        with:
          name: vokra-capi-linux
          path: artifacts/linux
      - name: Set up Android SDK / NDK
        uses: android-actions/setup-android@v3
      - name: Android cross-build (aarch64-linux-android, CPU-only, NDK)
        # scripts/build-android.sh reads $ANDROID_NDK_HOME (populated by
        # setup-android@v3), rustup-installs the aarch64-linux-android target,
        # builds `-p vokra-capi` release cdylib with no metal/cuda features,
        # and stages the resulting libvokra.so under
        # bindings/unity/com.vokra.unity/Plugins/Android/libs/arm64-v8a/.
        run: bash scripts/build-android.sh
      - name: Extract iOS libvokra.a from Vokra.xcframework
        # collect-ios-lib.sh runs verify-ios-xcframework.sh first (plan §R4),
        # then extracts ios-arm64/libvokra.a and asserts single-arch (lipo)
        # before staging under Plugins/iOS/.
        run: bash scripts/collect-ios-lib.sh build/ios/Vokra.xcframework
      - name: Stage desktop native libs into UPM Plugins/
        run: |
          set -euo pipefail
          PKG=bindings/unity/com.vokra.unity
          mkdir -p "$PKG/Plugins/macOS" "$PKG/Plugins/Windows/x86_64" "$PKG/Plugins/Linux/x86_64"
          cp artifacts/macos/libvokra.dylib "$PKG/Plugins/macOS/libvokra.dylib"
          cp artifacts/windows/vokra.dll   "$PKG/Plugins/Windows/x86_64/vokra.dll"
          cp artifacts/linux/libvokra.so   "$PKG/Plugins/Linux/x86_64/libvokra.so"
      - name: WebGL staticlib (wasm32-unknown-emscripten — M4-02)
        # rustc-only: Unity's own Emscripten performs the final link into the
        # player wasm, so NO emsdk is needed to produce the .a (ADR M4-02 §2;
        # forced -C panic=abort inside the script — Unity-era emcc cannot
        # link rust wasm-EH objects). `llvm-tools` provides llvm-nm for the
        # script's GPU-symbol non-mixin audit (Metal/CUDA/Vulkan/WebGPU
        # tokens); the production thread-free source gate
        # (check-capi-thread-free.sh) runs inside the script as well. The
        # root Cargo.lock tripwire is also internal to the script (NFR-DS-02).
        run: |
          rustup target add wasm32-unknown-emscripten
          rustup component add llvm-tools
          bash scripts/build-unity-webgl-lib.sh
      - name: Assemble UPM package (.tgz via build-unity-plugin.sh --pack)
        run: bash scripts/build-unity-plugin.sh --pack
      - name: Assert tarball ships the WebGL slice (M4-02)
        # `--pack` tars the whole package directory, so Plugins/WebGL/ rides
        # along automatically — this assert keeps that property load-bearing
        # (milestones §8 M4-02 completion: "CI 自動ビルドの Unity Package に
        # WebGL ターゲットが含まれる").
        run: |
          set -euo pipefail
          TARBALL="$(ls bindings/unity/com.vokra.unity-*.tgz)"
          tar -tzf "$TARBALL" | grep -q 'com.vokra.unity/Plugins/WebGL/libvokra.a$'
          tar -tzf "$TARBALL" | grep -q 'com.vokra.unity/Plugins/WebGL/libvokra.a.meta$'
          echo "OK: $TARBALL ships Plugins/WebGL/libvokra.a (+ .meta)"
      - name: Structure lint (package.json / asmdefs / Plugins shape)
        # Fails loudly on any missing native slice, malformed JSON in the two
        # asmdefs, or missing package.json — catches drift before the Unity
        # Editor would (which we cannot run per-PR).
        run: |
          set -euo pipefail
          PKG=bindings/unity/com.vokra.unity
          jq . "$PKG/package.json"                 > /dev/null
          jq . "$PKG/Runtime/Vokra.Runtime.asmdef" > /dev/null
          jq . "$PKG/Editor/Vokra.Editor.asmdef"   > /dev/null
          test -f "$PKG/Plugins/macOS/libvokra.dylib"
          test -f "$PKG/Plugins/Windows/x86_64/vokra.dll"
          test -f "$PKG/Plugins/Linux/x86_64/libvokra.so"
          test -f "$PKG/Plugins/iOS/libvokra.a"
          test -f "$PKG/Plugins/Android/libs/arm64-v8a/libvokra.so"
          test -f "$PKG/Plugins/WebGL/libvokra.a"
          # Hand-authored PluginImporter .meta lint (macOS/Win/Linux/WebGL —
          # M4-02 added the WebGL case). PyYAML ships on the runner image;
          # install it if the image ever drops it (required-check safety).
          python3 -c 'import yaml' 2>/dev/null || pip3 install --quiet pyyaml
          bash scripts/check-plugin-meta.sh
          find "$PKG/Plugins" -type f
      - name: NVIDIA runtime non-bundle check (CLAUDE.md EULA, plan §R3)
        run: bash scripts/check-unity-package-no-nvidia.sh bindings/unity/com.vokra.unity
      - name: UPM dependencies check (.dependencies=={} & no Sentis)
        run: bash scripts/check-unity-package-deps.sh bindings/unity/com.vokra.unity
      - name: Upload UPM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vokra-unity-package
          path: bindings/unity/com.vokra.unity-*.tgz
          retention-days: 14

  # M2-12-T15 Python wheel build gate (BR-08, FR-API-01, NFR-DS-02, NFR-DS-03,
  # NFR-LC-02, NFR-MT-02, NFR-MT-07, NFR-MT-08, NFR-RL-01). Registered as the
  # 8th required check on `main` PRs alongside build / test / fmt / clippy /
  # gpu-backends / parity / license.
  #
  # Design (M2-12 plan D5/D6/D12, T15):
  #
  #   * Pure-ctypes wrapper (D2) — no Rust code added, root Cargo.lock
  #     untouched. NFR-DS-02 zero-dep invariant is preserved (verified by the
  #     `license` job's check-zero-deps.sh; nothing new to enforce here).
  #
  #   * cibuildwheel (D6) generates platform-tagged wheels. The native lib is
  #     injected into `src/vokra/_lib/` via CIBW_BEFORE_BUILD: the wheel does
  #     NOT rebuild the Rust cdylib — it pulls the artifact produced by the
  #     `build` job (vokra-capi-{macos,windows,linux}) that this job depends
  #     on (`needs: build`). Same idiom the `unity-package` job uses to
  #     consume the same three artifacts.
  #
  #   * Matrix Linux/macOS/Windows (D10, NFR-MT-02 Tier 1). iOS/Android are
  #     out-of-scope for Python (Swift/Kotlin bindings own those). fail-fast:
  #     false so a wheel regression on one OS does not mask another's status.
  #
  #   * Fresh-venv install + smoke import (D12 step 2) proves the wheel is
  #     self-contained and platform-tagged correctly; a manylinux tag
  #     mismatch or missing native lib surfaces here rather than at PyPI
  #     upload time.
  #
  #   * pytest against `bindings/python/tests/` runs the four test categories
  #     (smoke / leak / error / negative); parity/asr/tts tests skip cleanly
  #     when GGUF fixtures are absent, following the same
  #     VOKRA_WHISPER_BASE_GGUF gated-skip pattern as `server-compat` (T22).
  #     FR-EX-08 no-silent-fallback shape: absence → explicit skip, never a
  #     fabricated pass.
  #
  #   * Artifact `vokra-python-wheels-{os}` (retention 7d, same as
  #     vokra-capi-*) is what `release.yml`'s `python-pypi-publish` job
  #     (M2-12 D11) downloads for dry-run / real upload. No upload happens
  #     here — that gate is owner-driven (T17, PYPI_API_TOKEN).
  python-wheel-build:
    name: python-wheel-build
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download macOS libvokra.dylib (from build/macos-latest)
        if: matrix.os == 'macos-latest'
        uses: actions/download-artifact@v4
        with:
          name: vokra-capi-macos
          path: bindings/python/native
      - name: Download Windows vokra.dll (from build/windows-latest)
        if: matrix.os == 'windows-latest'
        uses: actions/download-artifact@v4
        with:
          name: vokra-capi-windows
          path: bindings/python/native
      - name: Download Linux libvokra.so (from build/ubuntu-latest)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/download-artifact@v4
        with:
          name: vokra-capi-linux
          path: bindings/python/native
      - name: Build wheels (cibuildwheel)
        # CIBW_BEFORE_BUILD injects the vokra-capi cdylib artifact into
        # src/vokra/_lib/ (D5) so the wheel is self-contained. Rust is NOT
        # rebuilt inside cibuildwheel — the artifact from `build` is the
        # single source of truth for native binaries (audit-trail CPU-only,
        # NFR-DS-02).
        # cibuildwheel: pin to `v2.23.4` (last v2 release). Bare `v2`
        # stopped resolving (upstream deprecated the moving major alias in
        # favour of explicit `vX.Y[.Z]` tags), and jumping straight to v3+
        # trips a new "Build failed because a pure Python wheel was
        # generated" hard failure — cibuildwheel v3.0 assumes any user of
        # the tool is compiling native code inside the wheel. Our binding
        # is a hybrid: pure-Python at the Python layer with a pre-built
        # `libvokra.so` / `libvokra.dylib` / `vokra.dll` injected under
        # `src/vokra/_lib/` via `CIBW_BEFORE_BUILD_*`. Hatchling packs the
        # result as a pure-python wheel, which is exactly what we want
        # (one wheel per OS+arch, no per-Python native ABI). v2.23.4 is
        # the last release that accepts that shape without a repair step.
        # See https://github.com/pypa/cibuildwheel/blob/main/docs/changelog.md
        # (v3.0.0 changelog for the enforcement addition). Bump to v3+
        # only after threading a proper `CIBW_REPAIR_WHEEL_COMMAND` that
        # retags each wheel to a platform-specific slot.
        uses: pypa/cibuildwheel@v2.23.4
        with:
          package-dir: bindings/python
          output-dir: bindings/python/dist
        env:
          # Restrict to CPython 3.9-3.12; skip PyPy and 32-bit targets.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* pp* *-win32 *-manylinux_i686"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Inject the vokra-capi cdylib (downloaded above) into the package
          # tree before hatchling packs the wheel. `{package}` expands to the
          # cibuildwheel `package-dir` (bindings/python). The staged file
          # depends on the runner OS.
          CIBW_BEFORE_BUILD_LINUX: >-
            mkdir -p {package}/src/vokra/_lib &&
            cp {package}/native/libvokra.so {package}/src/vokra/_lib/libvokra.so
          CIBW_BEFORE_BUILD_MACOS: >-
            mkdir -p {package}/src/vokra/_lib &&
            cp {package}/native/libvokra.dylib {package}/src/vokra/_lib/libvokra.dylib
          CIBW_BEFORE_BUILD_WINDOWS: >-
            if not exist {package}\src\vokra\_lib mkdir {package}\src\vokra\_lib &&
            copy {package}\native\vokra.dll {package}\src\vokra\_lib\vokra.dll
          # Skip the platform-repair step (`auditwheel repair` on Linux,
          # `delocate-wheel` on macOS, `delvewheel repair` on Windows).
          # Rationale: cibuildwheel's repair pipeline is designed for
          # wheels that COMPILE native code — it rewrites RPATHs and
          # normalises the wheel tag to `manylinux2014` / `macosx_11_0`
          # / `win_amd64`. Our binding INJECTS a pre-built shared
          # library that was already produced by the sibling `build`
          # job against the runner's own glibc / macOS SDK / MSVCRT.
          # On Linux this trips
          #   auditwheel: error: cannot repair … because of the presence
          #   of too-recent versioned symbols
          # because the `libvokra.so` from the `build` job was built on
          # Ubuntu 24.04 (glibc 2.39) and auditwheel wants to reach
          # manylinux2014 (glibc 2.17). The wheels emitted here are for
          # CI smoke (install → import → pytest on the SAME runner OS),
          # not for PyPI publish (that pipeline lives in
          # release.yml/publish-pypi.yml and would rebuild the native
          # lib against manylinux-compatible SDKs). Non-empty repair
          # commands are the correct answer for a real publish flow;
          # here they are wrong.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""
      - name: Retag wheel to platform-manylinux / macosx / win form
        # cibuildwheel + hatch_build.py stamps the wheel with the raw
        # interpreter platform tag: `linux_x86_64` / `macosx_11_0_arm64` /
        # `win_amd64`. Modern pip (25.x+) refuses to install `linux_*`
        # tags because they are ambiguous about the glibc version — you
        # must retag to `manylinux_X_Y_x86_64`. Same treatment for macOS
        # (`macosx_11_0_arm64` is already accepted on macos-latest but
        # we normalise for consistency). Windows `win_amd64` needs no
        # retag. We call `python -m wheel tags` because it edits the
        # wheel's RECORD and Wheel-Version metadata correctly instead of
        # just renaming the file.
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          cd bindings/python/dist
          case "${{ matrix.os }}" in
            ubuntu-*)
              # Ubuntu 24.04 runner has glibc 2.39. `manylinux_2_28_x86_64`
              # is the modern PEP 600 tag that most pip / manylinux-aware
              # loaders accept — anything newer than 2_17 still installs
              # on the same-runner smoke test we do below.
              for whl in *.whl; do
                python -m wheel tags --platform-tag manylinux_2_28_x86_64 "$whl"
                rm "$whl"
              done ;;
            macos-*)
              # Already-tagged `macosx_11_0_arm64` is fine; no-op. If the
              # cibuildwheel matrix ever adds `macosx_10_9_x86_64` this
              # branch is where the retag would go.
              ls -la ;;
            windows-*)
              # `win_amd64` is pip's canonical Windows platform tag; no
              # retag needed.
              ls -la ;;
          esac
      - name: Fresh-venv install + smoke import
        # D12 step 2: proves platform tag / native-lib bundling is correct.
        # `pip install ./dist/*.whl` picks the wheel matching the runner's
        # (OS, arch, cpython) tuple; if no wheel matches, pip fails loudly.
        # `python -c "import vokra"` fires the ctypes.CDLL load path in
        # `_native.py`, so a missing / mis-named native lib surfaces here
        # rather than only in user reports post-release.
        shell: bash
        run: |
          set -euo pipefail
          python -m venv /tmp/vokra-venv
          # shellcheck disable=SC1091
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            source /tmp/vokra-venv/Scripts/activate
          else
            source /tmp/vokra-venv/bin/activate
          fi
          python -m pip install --upgrade pip
          # Install the freshly-built wheel from cibuildwheel output.
          # cibuildwheel emits one wheel per matrix cell (cp39 / cp310 /
          # cp311 / cp312). The runner's active Python here is 3.12
          # (setup-python step above), so a bare `pip install *.whl`
          # would ask pip to install every wheel — including cp39/10/11
          # ones that don't match — and fail with
          #   ERROR: vokra-...-cp310-cp310-*.whl is not a supported wheel
          #   on this platform.
          # `pip install --find-links dist vokra --no-index` instead lets
          # pip's own tag-compatibility resolver pick the wheel whose
          # `<pyver>-<abi>-<platform>` triple matches the runner. `--no-
          # index` blocks any PyPI fallback so we only ever use the freshly
          # built local wheels, and `--force-reinstall --no-deps` keeps
          # the smoke idempotent (a cached wheel from an earlier run
          # cannot mask a broken new build).
          python -m pip install \
              --find-links bindings/python/dist \
              --no-index \
              --force-reinstall \
              --no-deps \
              vokra
          python -c "import vokra; print('vokra imported OK, version:', getattr(vokra, '__version__', 'unknown'))"
      - name: pytest (bindings/python/tests, GGUF-gated skips)
        # Runs smoke / leak / error / negative unconditionally; parity /
        # asr / tts tests self-skip when VOKRA_WHISPER_BASE_GGUF is unset
        # (same FR-EX-08 no-silent-fallback pattern as server-compat T22).
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            source /tmp/vokra-venv/Scripts/activate
          else
            source /tmp/vokra-venv/bin/activate
          fi
          python -m pip install pytest
          pytest bindings/python/tests -v
      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: vokra-python-wheels-${{ matrix.os }}
          path: bindings/python/dist/*.whl
          retention-days: 7
      - name: Verify root Cargo.lock unchanged
        # D13 mutation-guard: pure-ctypes / hatchling wheel build must
        # never touch the root workspace lockfile. Any diff means a Rust
        # build snuck in and the zero-dep invariant is at risk.
        shell: bash
        run: git diff --exit-code Cargo.lock

