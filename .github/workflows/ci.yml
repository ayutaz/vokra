# Vokra CI quality gates (M0: 6 required checks — NFR-MT-07 subset, CLAUDE.md item 10).
# Job names (build / test / fmt / clippy / parity / license) are fixed: they are
# registered as branch-protection required checks in M0-01-T14. Matrix jobs expand
# to "build (<os>)" / "test (<os>)" check names.
#
# NFR-PF-13 5% regression gate: wired for mel-frontend task (M2-04).

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs of the same ref (saves runner minutes), but never
# cancel in-progress runs on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (workspace)
        run: cargo test --workspace

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: rustfmt check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  # GPU backend feature gates (M2-01 Metal / M2-03 CUDA). The default build/test
  # jobs cover only the CPU path; this keeps the optional `metal` / `cuda`
  # features compiling and lint-clean. Metal builds/tests on the Apple-silicon
  # macOS runner (its GPU-backed parity tests actually execute); CUDA is
  # build/lint only on Linux — GitHub runners have no NVIDIA GPU, so the dlopen'd,
  # probe-gated device tests skip cleanly. Both are first-party `vokra-*` crates,
  # so the zero-dependency invariant (checked in `license`) is unaffected.
  gpu-backends:
    name: gpu-backends
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            feature: metal
          - os: ubuntu-latest
            feature: cuda
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build (--features ${{ matrix.feature }})
        run: cargo build -p vokra-models -p vokra-cli --features ${{ matrix.feature }}
      - name: Clippy (--features ${{ matrix.feature }})
        run: cargo clippy -p vokra-models -p vokra-cli --features ${{ matrix.feature }} --all-targets -- -D warnings
      - name: Test (--features ${{ matrix.feature }})
        run: cargo test -p vokra-models --features ${{ matrix.feature }}

  # iOS build scaffold (M2-02, NFR-RL-03 static-only, NFR-RL-05 JIT-free,
  # FR-EX-08 no silent fallback). Cross-compiles vokra-capi to the 3 Apple
  # triples (device arm64 + simulator arm64/x86_64), assembles
  # `Vokra.xcframework` (2 slices: device + fat sim, static libvokra.a per
  # slice), and confirms the Swift Package resolves. Registered as a required
  # check on `main` per NFR-MT-07. cbindgen header drift is caught before the
  # cross-compile via `gen-c-abi.sh --check` (M2-02 T08/R3). Simulator boot is
  # deferred to an optional/nightly follow-up job (`ios-smoke-simulator`, D9);
  # physical iPhone RTF (NFR-PF-03) is owned by M2-14. CUDA is unconditionally
  # off for iOS (T04 red-line + `cfg(target_os = "ios")` compile_error in
  # `vokra-backend-cuda`); Metal is on via `vokra-models/metal`. No new
  # third-party crate deps — cbindgen stays build-only (MPL-2.0, D6) and the
  # zero-dep invariant (NFR-DS-02) is unchanged.
  ios-build:
    name: ios-build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustup iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Verify C header drift (gen-c-abi --check, R3)
        run: scripts/gen-c-abi.sh --check
      - name: Build iOS XCFramework
        run: scripts/build-ios.sh
      - name: Verify XCFramework (static-only, symbol whitelist)
        run: scripts/verify-ios-xcframework.sh build/ios/Vokra.xcframework
      - name: Verify Swift Package resolves
        run: swift package describe
      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vokra-xcframework
          path: build/ios/Vokra.xcframework
          retention-days: 7

  # Numerical parity harness (NFR-QL-01). At M0 this runs the tests/parity
  # placeholder harness; real per-model parity tests are added by M0-04/05/06.
  # M2-04: matrix expansion runs `parity_whisper` under both fusion states
  # (`VOKRA_DISABLE_FUSION=1` and `=0`) so the fused log-mel path stays
  # bit-close (FP32 atol=0.01, NFR-QL-01) to the imperative reference.
  # M2-08-T15: extends `parity` to run `quant_parity` (K-quant weight →
  # dequantize → GEMM parity against F32 reference, FP16 atol=0.01, INT8 branch
  # asserts `MinDtypeViolation`/`UnsupportedQuantPath`) and `policy_e2e` (offline
  # converter → runtime reload → `check_degradation` mel-loss 5% gate, and the
  # negative cases for Vocos/BigVGAN W8A8 rejection + HiFi-GAN opt-in verify).
  # Both are required checks so an M2-08 quant policy regression blocks the PR
  # in the same job that gates fused-frontend parity; `license` remains the
  # zero-dep enforcer (no new deps means cargo-deny continues passing).
  parity:
    name: parity
    strategy:
      fail-fast: false
      matrix:
        fusion: ["0", "1"]
    runs-on: ubuntu-latest
    env:
      VOKRA_DISABLE_FUSION: ${{ matrix.fusion }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Numerical parity tests (tests/parity)
        run: cargo test -p vokra-parity
      - name: Whisper frontend parity (fused vs unfused)
        run: cargo test -p vokra-models --test parity_whisper
      - name: Quant parity (M2-08, K-quant dequant → GEMM, FP16 atol=0.01)
        run: cargo test -p vokra-core --test quant_parity
      - name: Policy e2e (M2-08, converter → runtime → 5% mel-loss gate)
        run: cargo test -p vokra-cli --test policy_e2e

  # License / vulnerability / forbidden-dependency gate (NFR-LC-04, X-08).
  # deny.toml is owned by M0-02 (allow: Apache-2.0/MIT/BSD; deny: GPL/LGPL;
  # bans: protobuf/onnx-family crates). GPL/LGPL or onnx/protobuf deps block the PR.
  license:
    name: license
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure Cargo.lock exists (cargo-audit requires a lockfile)
        run: |
          if [ ! -f Cargo.lock ]; then
            cargo generate-lockfile
          fi
      - name: cargo-deny (licenses / advisories / bans)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo-audit (RustSec advisories)
        run: cargo audit
      - name: Zero-dependency invariant (NFR-DS-02)
        # The strict "only vokra-* crates in Cargo.lock" check. cargo-deny's
        # `bans` allows permitted third-party crates; this forbids ALL of them.
        # It runs in the pre-commit hook too, but the hook is bypassable
        # (`--no-verify`), so the invariant must also be enforced here.
        run: bash scripts/check-zero-deps.sh
      - name: Forbidden symbols / dependencies check
        run: bash scripts/check-forbidden-symbols.sh

  # Performance regression gate (NFR-PF-13, M2-04). Runs the fused log-mel
  # `mel-frontend` bench through `vokra-cli bench --baseline` against a
  # committed baseline (`docs/bench-baselines/mel_frontend_baseline.json`,
  # captured with fusion OFF). Fusion is ON by default here, so any run
  # slower than baseline * 1.05 fails with exit code 3 (bench.rs
  # REGRESSION_THRESHOLD = 0.05). Locked to `ubuntu-latest` for the
  # deterministic scalar + AVX2 path — NEON on macos-latest has too much
  # hardware skew to hold a strict 5% gate, so the gate stays off there.
  bench-regression:
    name: bench-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build vokra-cli (release)
        run: cargo build --release -p vokra-cli
      - name: mel-frontend regression check (5% gate, fusion enabled)
        # M2-04-T13 WP completion: fused log-mel PR merges only when this job
        # (regression), build/test/fmt/clippy/gpu-backends/license (zero-dep),
        # and `parity` (both fusion matrix legs) are all green. Reviewer
        # verifies via `gh pr checks`; two followup issues are linked in the
        # PR description: (a) Snake fusion kernel body + BigVGAN AMP fusion
        # co-delivered with FR-OP-13/11/14 consumer arrival, and (b) GPU fused
        # log-mel kernels (Metal MSL `MetalContext::fused_logmel_f32` + CUDA
        # NVRTC `fused_logmel_kernel`).
        run: |
          ./target/release/vokra-cli bench \
            --task mel-frontend \
            --iters 30 \
            --warmup 5 \
            --baseline docs/bench-baselines/mel_frontend_baseline.json \
            --format json

