# RVQ codec real-checkpoint parity CI (M4-04 T16).
#
# Converter-e2e + FULL-table verification for the standalone codec GGUFs:
#
#   Mimi:  kyutai/moshiko-pytorch-bf16 (pinned rev) tokenizer safetensors
#          → `vokra-cli convert --model mimi` → GGUF → binder → decode
#          vs a fresh `moshi` (Apache-2.0 code) reference dump.
#   DAC:   descriptinc/descript-audio-codec release tag 0.0.4
#          weights_24khz.pth (pinned URL + sha256)
#          → dac_prepare_checkpoint.py → `--model dac` → GGUF → binder →
#          decode vs a fresh `descript-audio-codec` (MIT) reference dump.
#
# HONEST SCOPE NOTE: the M4-04 exit criteria ("mimi_rvq / dac_rvq pass
# numerical parity CI", NFR-QL-01) is already satisfied in the per-PR
# required `parity` check by the COMMITTED sliced fixtures
# (crates/vokra-ops/tests/parity_{mimi,dac,encodec}_reference.rs — real
# sliced weights, no network). This workflow is the ADDITIONAL
# converter-e2e + full-table verification (per-tensor max |Δ| + verdict
# table in the step summary; one tensor over atol=0.01 fails the job —
# fabricated pass forbidden).
#
# EnCodec is deliberately ABSENT from this workflow: FR-OP-32 permanently
# excludes EnCodec pretrained weights, even from parity fetches. A grep
# guard step below asserts no download step for them ever creeps in.
#
# Operational posture (mirrors parity-kokoro-real.yml / parity-whisper-real.yml):
#   * workflow_dispatch (owner-driven — first dispatch is M4-04-T21) +
#     weekly cron + narrow PR paths filter.
#   * NOT a required check; per the M4-04 spec this workflow is NOT promoted
#     to required even after consecutive green weeks (HF flakiness posture;
#     any future promotion is an explicit owner decision outside this WP).
#   * Root Cargo.lock is untouched (zero-dep NFR-DS-02) — tripwire below.

name: parity-rvq-real

on:
  workflow_dispatch:
  schedule:
    # Weekly Tuesday 06:00 UTC — offset from the Kokoro (Mon 04:00), Whisper
    # (Mon 05:00) and Godot (Mon 06:00) crons so one hub outage morning does
    # not blank every scheduled gate at once.
    - cron: '0 6 * * 2'
  pull_request:
    # Phase 5a-3 (2026-07-23): Mimi + DAC codec ops / converter / dumper /
    # sliced parity fixtures / this workflow に加え、共有依存 (vokra-core =
    # OpKind / tensor / graph executor 定義) を追加。EnCodec は FR-OP-32 で
    # 常時除外 (grep guard step で workflow 自身の DL 混入を assert 継続)。
    paths:
      - '.github/workflows/parity-rvq-real.yml'
      - 'crates/vokra-convert/src/models/dac.rs'
      - 'crates/vokra-convert/src/models/mimi.rs'
      - 'crates/vokra-core/**'
      - 'crates/vokra-models/src/codec.rs'
      - 'crates/vokra-models/src/mimi/**'
      - 'crates/vokra-models/tests/real_codec_parity.rs'
      - 'crates/vokra-ops/src/dac_rvq.rs'
      - 'crates/vokra-ops/src/mimi_rvq.rs'
      - 'crates/vokra-ops/tests/parity_dac_reference.rs'
      - 'crates/vokra-ops/tests/parity_mimi_reference.rs'
      - 'tests/parity/dac/**'
      - 'tests/parity/mimi/**'
      - 'tools/parity/dac_prepare_checkpoint.py'
      - 'tools/parity/mimi_dump.py'

concurrency:
  group: parity-rvq-real-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Mimi checkpoint pin (ADR M4-04 §D-k): moshi-native tensor naming — the
  # format the M4-05 (Sesame CSM) / M4-06 (Moshi) consumers feed. Weights are
  # CC-BY 4.0 (attribution discharged by NOTICE §5).
  MIMI_REPO: kyutai/moshiko-pytorch-bf16
  MIMI_REVISION: 2bfc9ae6e89079a5cc7ed2a68436010d91a3d289
  MIMI_FILE: tokenizer-e351c8d8-checkpoint125.safetensors
  MIMI_SHA256: 09b782f0629851a271227fb9d36db65c041790365f11bbe5d3d59369cf863f50
  # DAC 24 kHz / 8 kbps zoo-primary variant pin (ADR M4-04 §T02): GitHub
  # release URL table in upstream dac/utils/__init__.py L18-39. MIT.
  DAC_URL: https://github.com/descriptinc/descript-audio-codec/releases/download/0.0.4/weights_24khz.pth
  DAC_SHA256: 44bad592fc393e03eb0be7a5120b7d487fe9612fa41269dc03fca3d4b87e20ad
  PARITY_VENV: /tmp/vokra-rvq-parity
  CARGO_TERM_COLOR: always

jobs:
  rvq-parity-real:
    name: rvq-parity-real
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HF_HOME: ${{ github.workspace }}/.hf-cache
      HF_HUB_CACHE: ${{ github.workspace }}/.hf-cache
    steps:
      - uses: actions/checkout@v7

      # FR-OP-32 grep guard: this workflow must never grow an EnCodec weight
      # download step. The word is assembled at runtime so the guard cannot
      # match its own source line.
      - name: FR-OP-32 guard — no EnCodec weight fetch in this workflow
        run: |
          set -euo pipefail
          WF=".github/workflows/parity-rvq-real.yml"
          BANNED="enco"
          BANNED="${BANNED}dec"
          # Any co-occurrence of the banned model name with a fetch verb /
          # hub host on one line is a violation (comments included — the
          # posture is that the name never appears next to a fetcher at all).
          if grep -inE "(curl|wget|hf_hub_download|huggingface\.co|resolve/main).*${BANNED}|${BANNED}.*(curl|wget|hf_hub_download|huggingface\.co|resolve/main)" "$WF"; then
            echo "::error::FR-OP-32 violation — ${BANNED} weight fetch found in $WF"
            exit 1
          fi
          echo "guard OK: no ${BANNED} fetch step present"

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Cache checkpoints
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.HF_HOME }}
            ${{ github.workspace }}/.dac-cache
          key: rvq-real-${{ env.MIMI_REVISION }}-dac004-v1

      # Reference-code venv. Pins mirror tests/parity/parity-requirements.txt
      # (the versions the committed sliced fixtures were generated with).
      # torch/torchaudio must be a matched pair.
      - name: Provision parity venv (moshi + descript-audio-codec)
        run: |
          set -euo pipefail
          python -m venv "${PARITY_VENV}"
          # shellcheck disable=SC1091
          . "${PARITY_VENV}/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install \
            'torch==2.9.1' \
            'torchaudio==2.9.1' \
            'numpy>=2,<3' \
            'safetensors>=0.4' \
            'moshi==0.2.13' \
            'descript-audio-codec==1.0.0'
          python - <<'PY'
          import torch, moshi, dac
          print(f"rvq parity venv OK: torch={torch.__version__}")
          PY

      # §8.2 canonical advisory pattern (see .github/workflows/README.md §8.2
      # and §8.4). `pins.yaml` declares this entry as
      # drift_policy.upstream_mismatch=advisory (Mimi: kyutai HF, DAC: descript
      # GitHub Release) — Vokra does not own byte-identity of the upstream
      # publish. A SHA mismatch or fetch failure is an EXTERNAL drift event,
      # not a Vokra regression, so this step downgrades to `::warning::` +
      # `codec_ok=false` and the downstream converter/dumper/parity steps
      # cascade-skip via `if: steps.<id>.outputs.codec_ok == 'true'`. When the
      # mirror block in pins.yaml is populated (WP X-10 pattern extended to
      # codecs), drift_policy.mirror_mismatch=hard_fail escalates automatically.
      - name: Download Mimi checkpoint @ pinned revision (advisory, record-only)
        id: mimi-download
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HF_HOME}"
          DEST="${HF_HOME}/${MIMI_FILE}"
          if [ ! -f "${DEST}" ]; then
            if ! curl -fsSL --retry 3 \
              "https://huggingface.co/${MIMI_REPO}/resolve/${MIMI_REVISION}/${MIMI_FILE}" \
              -o "${DEST}"; then
              echo "::warning::mimi checkpoint fetch failed from kyutai/moshiko-pytorch-bf16@${MIMI_REVISION} — advisory downgrade (upstream HF, not a Vokra regression). See pins.yaml entry mimi-codec."
              rm -f "${DEST}"
              echo "codec_ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if ! echo "${MIMI_SHA256}  ${DEST}" | sha256sum -c -; then
            echo "::warning::mimi checkpoint SHA drift at kyutai/moshiko-pytorch-bf16@${MIMI_REVISION} — advisory downgrade (upstream, not a Vokra regression). See pins.yaml entry mimi-codec."
            rm -f "${DEST}"
            echo "codec_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "mimi checkpoint: $(du -h "${DEST}" | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
          echo "codec_ok=true" >> "$GITHUB_OUTPUT"

      - name: Download DAC checkpoint @ pinned release URL (advisory, record-only)
        id: dac-download
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .dac-cache
          DEST=".dac-cache/weights_24khz.pth"
          if [ ! -f "${DEST}" ]; then
            if ! curl -fsSL --retry 3 "${DAC_URL}" -o "${DEST}"; then
              echo "::warning::dac checkpoint fetch failed from descript-audio-codec release 0.0.4 — advisory downgrade (upstream GitHub Release, not a Vokra regression). See pins.yaml entry dac-24khz-8kbps."
              rm -f "${DEST}"
              echo "codec_ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if ! echo "${DAC_SHA256}  ${DEST}" | sha256sum -c -; then
            echo "::warning::dac checkpoint SHA drift at descript-audio-codec release 0.0.4 — advisory downgrade (upstream, not a Vokra regression). See pins.yaml entry dac-24khz-8kbps."
            rm -f "${DEST}"
            echo "codec_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "dac checkpoint: $(du -h "${DEST}" | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
          echo "codec_ok=true" >> "$GITHUB_OUTPUT"

      - name: Prepare DAC checkpoint (.pth → safetensors + config side-car)
        if: steps.dac-download.outputs.codec_ok == 'true'
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . "${PARITY_VENV}/bin/activate"
          python tools/parity/dac_prepare_checkpoint.py \
            --pth .dac-cache/weights_24khz.pth \
            --output "${RUNNER_TEMP}/dac-24khz.safetensors" \
            --config-out "${RUNNER_TEMP}/dac-24khz-config.json" \
            | tee -a "$GITHUB_STEP_SUMMARY"

      # vokra-cli build cascade-skips too — with both codecs absent, no
      # downstream converter/parity work remains to gate on.
      - name: Build vokra-cli (release)
        if: steps.mimi-download.outputs.codec_ok == 'true' || steps.dac-download.outputs.codec_ok == 'true'
        run: cargo build --release -p vokra-cli

      - name: Convert Mimi → GGUF (converter e2e)
        if: steps.mimi-download.outputs.codec_ok == 'true'
        run: |
          set -euo pipefail
          ./target/release/vokra-cli convert --model mimi \
            --input "${HF_HOME}/${MIMI_FILE}" \
            --output "${RUNNER_TEMP}/mimi.gguf" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Convert DAC → GGUF (converter e2e)
        if: steps.dac-download.outputs.codec_ok == 'true'
        run: |
          set -euo pipefail
          ./target/release/vokra-cli convert --model dac \
            --input "${RUNNER_TEMP}/dac-24khz.safetensors" \
            --config "${RUNNER_TEMP}/dac-24khz-config.json" \
            --output "${RUNNER_TEMP}/dac.gguf" | tee -a "$GITHUB_STEP_SUMMARY"

      # FULL-table reference dumps: rows = the full codebook_size, so every
      # table row is compared (the committed PR fixtures are 48/192-row
      # slices; this is the full-fat pass). Runs iff at least one codec
      # download succeeded — the dumper commands are independent.
      - name: Dump full-table references (moshi / descript-audio-codec)
        if: steps.mimi-download.outputs.codec_ok == 'true' || steps.dac-download.outputs.codec_ok == 'true'
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . "${PARITY_VENV}/bin/activate"
          if [ "${{ steps.mimi-download.outputs.codec_ok }}" = "true" ]; then
            python tools/parity/mimi_dump.py mimi \
              --checkpoint "${HF_HOME}/${MIMI_FILE}" \
              --out "${RUNNER_TEMP}/mimi-ref" --seed 7 --time 64 --rows 2048 --books 8
          fi
          if [ "${{ steps.dac-download.outputs.codec_ok }}" = "true" ]; then
            python tools/parity/mimi_dump.py dac \
              --checkpoint .dac-cache/weights_24khz.pth \
              --out "${RUNNER_TEMP}/dac-ref" --seed 7 --time 64 --rows 1024 --books 32
          fi

      # Per-codec parity steps. Split from the single `Full-table parity` step
      # (2026-07-23 fix branch adversarial-final P1): the single-step form set
      # both VOKRA_{MIMI,DAC}_GGUF env vars unconditionally, so a mixed-success
      # scenario (e.g., Mimi HF SHA drift → codec_ok=false; DAC release fetch
      # → codec_ok=true) would run `cargo test --test real_codec_parity` which
      # includes BOTH real_mimi_gguf_full_table_parity and real_dac_gguf_full_table_parity;
      # the Mimi test would then panic on `GgufFile::open` because the Convert
      # Mimi step was skipped, hard-failing the job on a scenario the header
      # (lines 163-164) explicitly documents as `cascade-skip via own codec_ok`.
      # Splitting per-codec + narrowing `cargo test` to the codec-specific test
      # name restores the advisory contract while keeping the single-codec
      # success path bit-identical to the pre-fix behaviour.
      - name: Full-table parity — Mimi (per-tensor max |Δ| + verdict, advisory, record-only, X-10)
        if: steps.mimi-download.outputs.codec_ok == 'true'
        run: |
          set -euo pipefail
          set +e
          VOKRA_MIMI_GGUF="${RUNNER_TEMP}/mimi.gguf" \
          VOKRA_MIMI_REF_DIR="${RUNNER_TEMP}/mimi-ref" \
            cargo test -p vokra-models --release --test real_codec_parity \
              real_mimi_gguf_full_table_parity -- --nocapture \
            2>&1 | tee "${RUNNER_TEMP}/parity-mimi-log.txt"
          PARITY_EXIT=${PIPESTATUS[0]}
          set -e
          {
            echo ""
            echo "## RVQ real-checkpoint parity — Mimi (atol = 0.01, NFR-QL-01)"
            echo ""
            echo '| tensor | max abs diff | verdict |'
            echo '| ------ | ------------ | ------- |'
            grep '^PARITY ' "${RUNNER_TEMP}/parity-mimi-log.txt" \
              | awk '{gsub("max\\|Δ\\|=", "", $3); gsub("atol=", "", $4); print "| " $2 " | " $3 " | " $5 " |"}'
            echo ""
            if [ "${PARITY_EXIT}" -ne 0 ]; then
              echo '**VERDICT: FAIL — at least one tensor exceeded atol (or the harness errored).**'
            else
              echo '**VERDICT: PASS — every tensor within atol.**'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${PARITY_EXIT}"

      - name: Full-table parity — DAC (per-tensor max |Δ| + verdict, advisory, record-only, X-10)
        if: steps.dac-download.outputs.codec_ok == 'true'
        run: |
          set -euo pipefail
          set +e
          VOKRA_DAC_GGUF="${RUNNER_TEMP}/dac.gguf" \
          VOKRA_DAC_REF_DIR="${RUNNER_TEMP}/dac-ref" \
            cargo test -p vokra-models --release --test real_codec_parity \
              real_dac_gguf_full_table_parity -- --nocapture \
            2>&1 | tee "${RUNNER_TEMP}/parity-dac-log.txt"
          PARITY_EXIT=${PIPESTATUS[0]}
          set -e
          {
            echo ""
            echo "## RVQ real-checkpoint parity — DAC (atol = 0.01, NFR-QL-01)"
            echo ""
            echo '| tensor | max abs diff | verdict |'
            echo '| ------ | ------------ | ------- |'
            grep '^PARITY ' "${RUNNER_TEMP}/parity-dac-log.txt" \
              | awk '{gsub("max\\|Δ\\|=", "", $3); gsub("atol=", "", $4); print "| " $2 " | " $3 " | " $5 " |"}'
            echo ""
            if [ "${PARITY_EXIT}" -ne 0 ]; then
              echo '**VERDICT: FAIL — at least one tensor exceeded atol (or the harness errored).**'
            else
              echo '**VERDICT: PASS — every tensor within atol.**'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${PARITY_EXIT}"

      # Zero-dep tripwire (NFR-DS-02): nothing in this job may have touched
      # the root Cargo.lock (Python lives in the venv, never in the workspace).
      - name: Zero-dep tripwire — root Cargo.lock unchanged
        run: git diff --exit-code Cargo.lock
