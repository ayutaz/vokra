# Vokra release / CD workflow.
#
# M2-02-T09: iOS XCFramework artifact registration on release tags.
#
# Trigger: git tag matching `v*` OR manual workflow_dispatch (dry-run).
# Actual release invocation is gated by 依頼者 (tag push); this workflow
# only wires the steps. workflow_dispatch supports dry-run without upload.
#
# Steps on a tagged release:
#   1. Reuse `scripts/build-ios.sh` to produce `build/ios/Vokra.xcframework`
#      (static-only, NFR-RL-03; JIT-free, NFR-RL-05; CUDA compile-error-gated
#      on iOS via T04). Metal ON by default.
#   2. `ditto -c -k --sequesterRsrc --keepParent …` to preserve XCFramework
#      bundle structure inside the zip (Apple's recommended archiver for
#      framework bundles — `zip -r` mangles symlinks / resource forks).
#   3. `shasum -a 256` → `Vokra.xcframework.zip.sha256` (Swift Package
#      `binaryTarget(url:checksum:)` requires the SHA256 hex).
#   4. `gh release upload <tag>` publishes both artifacts to the GitHub
#      Release created by the tag push.
#   5. Post-release: patch `Package.swift` on a release branch (or a
#      dedicated `vokra-swift-package` mirror repo — final split decided in
#      T01 ADR 000N-ios-build.md) from the local `path:` binaryTarget to
#      `url:` + `checksum:` form pointing at the uploaded asset.
#
# Zero-dep invariant unchanged (NFR-DS-02): all steps are shell + Xcode CLI
# + `gh` (preinstalled on macos-latest); no new workspace crate, no cargo
# dep added.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (build + hash, skip gh release upload and Package.swift patch)"
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # X-07-T18: semver tag gate. The tag glob `v*` (on.push.tags) accepts any
  # `v…` string, including a non-semver one like `vfoo` that the per-job version
  # derivation (`GITHUB_REF_NAME#v`) silently mis-parses. This job rejects a
  # non-semver tag fail-loud so the whole release train refuses to run on a
  # malformed tag.
  #
  # CRITICAL — non-tag refs ANNOUNCED-SKIP (pass): the entire dry-run / dispatch
  # verification path runs on `workflow_dispatch` (a non-tag ref). If this job
  # failed on non-tag refs, then `needs: validate-tag` on every other job would
  # block the whole dry-run path (and T35's regression verify with it). So on a
  # non-tag ref it emits a ::notice:: and PASSES — an announced skip (the gate
  # is inapplicable when there is no tag to judge), NOT a fabricated pass.
  # The current default version is 0.1.0-alpha.0 (Cargo.toml:21); the first
  # release tag must be a valid `vX.Y.Z[-prerelease]` (e.g. v1.0.0-rc.1).
  # ---------------------------------------------------------------------------
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag (announced-skip on non-tag refs)
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "::notice::validate-tag: non-tag ref (${GITHUB_REF}) — semver gate not applicable (workflow_dispatch / branch). Passing (announced skip, not a fabricated pass)."
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          # v-prefixed semver: vX.Y.Z with optional -prerelease and +build.
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "validate-tag: OK — '$TAG' is a valid semver tag"
          else
            echo "validate-tag: FAIL — tag '$TAG' is not semver (expected vX.Y.Z[-prerelease][+build])" >&2
            exit 1
          fi

  ios-xcframework:
    name: ios-xcframework
    needs: [validate-tag]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install rustup iOS targets
        run: |
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - name: Install cbindgen (locked)
        run: cargo install cbindgen --locked

      - name: Verify header drift (scripts/gen-c-abi.sh --check)
        run: bash scripts/gen-c-abi.sh --check

      - name: Build iOS XCFramework (Step 1 — reuse scripts/build-ios.sh)
        run: bash scripts/build-ios.sh

      - name: Verify XCFramework (static-only + symbol whitelist)
        run: bash scripts/verify-ios-xcframework.sh build/ios/Vokra.xcframework

      - name: Package XCFramework (Step 2 — ditto with sequesterRsrc + keepParent)
        working-directory: build/ios
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            Vokra.xcframework Vokra.xcframework.zip

      - name: Compute SHA256 (Step 3 — for Swift Package binaryTarget checksum)
        working-directory: build/ios
        run: |
          shasum -a 256 Vokra.xcframework.zip | awk '{print $1}' \
            > Vokra.xcframework.zip.sha256
          echo "sha256=$(cat Vokra.xcframework.zip.sha256)" >> "$GITHUB_ENV"
          echo "Artifact SHA256: $(cat Vokra.xcframework.zip.sha256)"

      # X-07-T03: first-party SPDX SBOM for the shipped XCFramework closure.
      # Feature selection MATCHES the shipped build (scripts/build-ios.sh:96
      # FEATURES="vokra-models/metal"; `--features metal` does NOT exist on
      # vokra-capi and would fail `cargo tree`). SOURCE_DATE_EPOCH pins the
      # `created` field so the document is reproducible (NFR-MT-03).
      - name: Generate SPDX SBOM (X-07-T03, first-party, NFR-MT-03)
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-capi \
            --no-default-features \
            --features vokra-models/metal \
            --doc-name vokra-ios-xcframework \
            --output build/ios/vokra-ios-xcframework.spdx.json

      - name: Upload workflow artifact (always, for inspection)
        uses: actions/upload-artifact@v7
        with:
          name: Vokra-xcframework-release
          path: |
            build/ios/Vokra.xcframework.zip
            build/ios/Vokra.xcframework.zip.sha256
            build/ios/vokra-ios-xcframework.spdx.json
          retention-days: 30

      - name: Upload to GitHub Release (Step 4 — gh release upload)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            build/ios/Vokra.xcframework.zip \
            build/ios/Vokra.xcframework.zip.sha256 \
            build/ios/vokra-ios-xcframework.spdx.json \
            --clobber

      - name: Patch Package.swift on release branch (Step 5)
        # NOTE: mirror-repo vs release-branch split is decided in T01 ADR
        # 000N-ios-build.md. This step targets the release branch path; if
        # the ADR selects a dedicated `vokra-swift-package` mirror repo,
        # this step is replaced by a repository_dispatch to that repo.
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA256: ${{ env.sha256 }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${GITHUB_REPOSITORY}"
          URL="https://github.com/${REPO}/releases/download/${TAG}/Vokra.xcframework.zip"
          BRANCH="release/${TAG}"
          git config user.name "vokra-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # Replace the local `path:` binaryTarget with the `url:` + `checksum:`
          # form. There is NO sentinel comment in Package.swift (X-07-T22
          # correction: the earlier note referenced a
          # `// M2-02-T09: release binaryTarget` sentinel that does not exist);
          # the regex below matches the actual `.binaryTarget(name: "Vokra",
          # path: "…")` form present at Package.swift:20-22 directly.
          python3 - <<'PY'
          import os
          import pathlib
          import re
          url = os.environ["URL"]
          checksum = os.environ["SHA256"]
          p = pathlib.Path("Package.swift")
          src = p.read_text()
          # Match the local path form emitted by T07:
          #   .binaryTarget(name: "Vokra", path: "build/ios/Vokra.xcframework")
          pat = re.compile(
              r'\.binaryTarget\(\s*name:\s*"Vokra"\s*,\s*path:\s*"[^"]+"\s*\)'
          )
          if not pat.search(src):
              raise SystemExit(
                  "Package.swift: expected local "
                  ".binaryTarget(name: \"Vokra\", path: \"…\") form not found "
                  "(Package.swift:20-22 shape changed?)."
              )
          new_target = (
              f'.binaryTarget(name: "Vokra", url: "{url}", '
              f'checksum: "{checksum}")'
          )
          p.write_text(pat.sub(new_target, src))
          PY
          git add Package.swift
          git commit -m "release(${TAG}): pin Vokra.xcframework binaryTarget to release asset"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release(${TAG}): pin Vokra.xcframework binaryTarget" \
            --body "Automated by .github/workflows/release.yml (M2-02-T09). URL: ${URL}  SHA256: ${SHA256}"

      - name: Dry-run summary
        if: inputs.dry_run == true || !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "== DRY RUN =="
          echo "Would upload:"
          ls -la build/ios/Vokra.xcframework.zip build/ios/Vokra.xcframework.zip.sha256
          echo "SHA256: ${{ env.sha256 }}"
          echo "Skipping: gh release upload, Package.swift patch."

  # ---------------------------------------------------------------------------
  # M2-11-T14: Unity UPM Package CD auto-publish (NFR-MT-08 / FR-API-04).
  #
  # Assembles the com.vokra.unity-<version>.tgz release-signed tarball on
  # tag push (v*), uploads it (plus .sha256) to the GitHub Release, and
  # optionally publishes to OpenUPM when secrets.OPENUPM_TOKEN is present.
  #
  # Cross-compile strategy: iOS device slice is reused from the
  # ios-xcframework job artifact (needs dep). Linux libvokra.so is built
  # natively on the ubuntu-latest runner. Android arm64-v8a libvokra.so is
  # cross-compiled via scripts/build-android.sh using the NDK preset on the
  # runner (ANDROID_NDK_ROOT). macOS/Windows desktop cdylibs are attempted
  # via `gh run download` from the matching ci.yml run for the tag SHA;
  # missing platforms are non-fatal for the initial CD wire-up so the
  # tarball still assembles with iOS + Linux + Android — a follow-up will
  # add explicit macos-latest / windows-latest matrix runners (or a
  # `unity-cross-compile` companion job) to guarantee all five platforms
  # are always present in the release-signed .tgz.
  #
  # Reproducibility (M2-11 plan §5 R5): SOURCE_DATE_EPOCH is derived from
  # the HEAD commit timestamp and consumed by scripts/build-unity-plugin.sh
  # --pack, which normalizes tar mtimes / ownership / file order. The
  # emitted .sha256 is uploaded alongside the tarball so downstream
  # (OpenUPM, GitHub Release) checksum reconciliation is deterministic.
  #
  # NVIDIA runtime non-bundled (D7 / T12 / NFR-LC-01): vokra-capi is built
  # with --no-default-features on both Linux and Android (build-android.sh
  # already does this); scripts/check-unity-package-no-nvidia.sh is a
  # required check on the assembled package tree.
  #
  # Zero-dep invariant unchanged: no new Rust crate; no Cargo.lock churn;
  # only shell + tar + gh + npm (npm gated on OPENUPM_TOKEN presence).
  # ---------------------------------------------------------------------------
  unity-package-release:
    name: unity-package-release
    needs: [validate-tag, ios-xcframework]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Compute release version (semver from tag, v-prefix stripped)
        id: version
        run: |
          # Tag path: refs/tags/v0.1.0-preview.1 -> version=0.1.0-preview.1
          # workflow_dispatch path: fall back to package.json version so
          # dry-runs are still meaningful.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(awk -F'"' '/^[[:space:]]*"version"[[:space:]]*:/ { print $4; exit }' \
              bindings/unity/com.vokra.unity/package.json)"
          fi
          if [ -z "$V" ]; then
            echo "unity-package-release: FAIL could not derive version" >&2
            exit 1
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${V}"

      - name: Download iOS XCFramework artifact from ios-xcframework job
        uses: actions/download-artifact@v8
        with:
          name: Vokra-xcframework-release
          path: build/ios/

      - name: Extract iOS libvokra.a via scripts/collect-ios-lib.sh
        run: |
          # ios-xcframework packaged the XCFramework via `ditto -c -k
          # --sequesterRsrc --keepParent`, producing Vokra.xcframework.zip
          # with the bundle structure preserved. Unzip to recreate the
          # XCFramework layout before running collect-ios-lib.sh (which
          # itself invokes verify-ios-xcframework.sh + lipo checks per R4).
          cd build/ios
          unzip -q -o Vokra.xcframework.zip
          cd "$GITHUB_WORKSPACE"
          bash scripts/collect-ios-lib.sh build/ios/Vokra.xcframework

      - name: Build Linux vokra-capi (CPU-only, no NVIDIA runtime — D7)
        run: |
          # --no-default-features guarantees no Metal (macOS-only path,
          # inert on Linux) and no CUDA (would statically pull cudart on
          # some feature paths) reach the shipped Linux .so. Matches
          # scripts/build-android.sh policy.
          cargo build --release -p vokra-capi --no-default-features
          mkdir -p bindings/unity/com.vokra.unity/Plugins/Linux/x86_64
          cp target/release/libvokra.so \
            bindings/unity/com.vokra.unity/Plugins/Linux/x86_64/libvokra.so

      - name: Build Android arm64-v8a vokra-capi via scripts/build-android.sh
        env:
          # ubuntu-latest ships the NDK under $ANDROID_NDK_ROOT; forward it
          # to the script's expected ANDROID_NDK_HOME variable.
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: bash scripts/build-android.sh

      - name: Build WebGL staticlib via scripts/build-unity-webgl-lib.sh (M4-02)
        # FAIL-LOUD policy (deliberate asymmetry, recorded per M4-02-T14):
        # the desktop macOS/Windows cdylibs below are REUSED from ci.yml
        # artifacts on a best-effort basis (continue-on-error) because they
        # cannot be cross-built on this Linux runner; WebGL — like Linux and
        # Android above — is built IN this job, so a build failure fails the
        # release outright. Whether to unify the desktop reuse steps onto
        # fail-loud is a release-train-wide policy change, out of scope here
        # (owner note in docs/handoff/m4-02.md).
        # rustc-only: no emsdk (Unity's bundled Emscripten performs the final
        # link — ADR M4-02 §2); llvm-tools supplies llvm-nm for the script's
        # GPU-symbol audit.
        run: |
          rustup target add wasm32-unknown-emscripten
          rustup component add llvm-tools
          bash scripts/build-unity-webgl-lib.sh

      - name: Reuse macOS + Windows cdylibs from ci.yml artifacts (advisory, record-only, best-effort)
        id: reuse-desktop-cdylibs
        # T13 unity-package CI job produces per-OS cdylibs. Attempt to fetch
        # them via `gh run download` scoped to the tag SHA so the release
        # tarball ships all five platforms. Missing artifacts are non-fatal
        # for this wire-up; the summary flags any absence for owner review.
        # §8.2 canonical form: name suffix `(advisory, record-only)` + explicit
        # `id:` — required by scripts/check-workflow-advisory-suffix.sh
        # (§8.2 tripwire, Commit L). "best-effort" retained as an operational
        # descriptor after the canonical suffix.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          RUN_ID="$(gh run list \
            --workflow=ci.yml \
            --branch="${GITHUB_REF_NAME}" \
            --limit=20 \
            --json databaseId,headSha,conclusion \
            --jq ".[] | select(.headSha==\"${GITHUB_SHA}\" and .conclusion==\"success\") | .databaseId" \
            | head -n 1)"
          if [ -z "$RUN_ID" ]; then
            echo "unity-package-release: no successful ci.yml run for SHA ${GITHUB_SHA}; skipping desktop reuse"
            exit 0
          fi
          echo "unity-package-release: reusing ci.yml run ${RUN_ID} for desktop cdylibs"
          for artifact in vokra-capi-macos vokra-capi-windows; do
            gh run download "$RUN_ID" --name "$artifact" --dir "reuse/${artifact}" \
              || echo "unity-package-release: ${artifact} not available (T13 pending?)"
          done
          if [ -f reuse/vokra-capi-macos/libvokra.dylib ]; then
            mkdir -p bindings/unity/com.vokra.unity/Plugins/macOS
            cp reuse/vokra-capi-macos/libvokra.dylib \
              bindings/unity/com.vokra.unity/Plugins/macOS/libvokra.dylib
          fi
          if [ -f reuse/vokra-capi-windows/vokra.dll ]; then
            mkdir -p bindings/unity/com.vokra.unity/Plugins/Windows/x86_64
            cp reuse/vokra-capi-windows/vokra.dll \
              bindings/unity/com.vokra.unity/Plugins/Windows/x86_64/vokra.dll
          fi
          set -e

      - name: Enforce NVIDIA runtime non-bundled (D7 / T12 / NFR-LC-01)
        run: bash scripts/check-unity-package-no-nvidia.sh

      - name: Assert all 6 platform slices before packing (deliverables §3.2)
        # macOS/Win/Linux/iOS/Android/WebGL — milestones §8 M4-02 completion
        # ("CI 自動ビルドの Unity Package に WebGL ターゲットが含まれる") is
        # machine-verified at tag time here. macOS/Windows come from the
        # best-effort reuse step above: absence fails HERE, loudly, instead
        # of shipping a 4-platform tarball labelled as 6.
        run: |
          set -euo pipefail
          PKG=bindings/unity/com.vokra.unity
          for f in \
            "Plugins/macOS/libvokra.dylib" \
            "Plugins/Windows/x86_64/vokra.dll" \
            "Plugins/Linux/x86_64/libvokra.so" \
            "Plugins/iOS/libvokra.a" \
            "Plugins/Android/libs/arm64-v8a/libvokra.so" \
            "Plugins/WebGL/libvokra.a"; do
            if [ ! -f "$PKG/$f" ]; then
              echo "unity-package-release: FAIL missing platform slice: $f" >&2
              exit 1
            fi
          done
          echo "OK: all 6 platform slices present"

      # X-07-T04: first-party SPDX SBOM for the Unity package, placed INSIDE the
      # package tree so it ships in the tarball (pack step below picks it up).
      # Base doc = the UPM audit build's feature selection (--no-default-features
      # --features cpu = ci.yml:49); the Linux slice's bare --no-default-features
      # resolves to the same closure (`cpu = []` is an empty stub). The Apple
      # (iOS/macOS) slice additionally links vokra-backend-metal — that closure
      # is documented by the ios-xcframework SBOM (X-07-T03, --features
      # vokra-models/metal), assembled from the SAME XCFramework build reused by
      # this job. `metal` alone is NOT a vokra-capi feature (would fail cargo tree).
      - name: Generate SPDX SBOM (X-07-T04, first-party, NFR-MT-03)
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-capi \
            --no-default-features \
            --features cpu \
            --doc-name vokra-unity-package \
            --output bindings/unity/com.vokra.unity/vokra-unity-package.spdx.json

      - name: Pack UPM tarball (R5 reproducibility, SOURCE_DATE_EPOCH pinned)
        run: |
          # Reproducibility per M2-11 plan §5 R5:
          #   * SOURCE_DATE_EPOCH from HEAD commit timestamp.
          #   * tar --sort=name --mtime='@0' --owner=0 --group=0
          #     --numeric-owner (build-unity-plugin.sh --pack does this
          #     via the GNU tar branch on ubuntu-latest).
          #   * `find | sort` deterministic file listing (implicit in
          #     tar --sort=name, but explicit here for the audit trail).
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
          # Deterministic file-listing audit line (R5 explicit).
          ( cd bindings/unity/com.vokra.unity \
            && find . -type f | LC_ALL=C sort | head -n 40 )
          # --no-build: cdylibs are already assembled by prior steps.
          bash scripts/build-unity-plugin.sh --pack --no-build

      - name: Verify tarball + compute .sha256
        id: pack
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # build-unity-plugin.sh names the tarball from package.json's
          # version. On tag push the CD flow expects that version to have
          # been bumped by a preceding commit; assert alignment or fail
          # loudly so version drift never ships silently.
          TARBALL="bindings/unity/com.vokra.unity-${VERSION}.tgz"
          if [ ! -f "$TARBALL" ]; then
            echo "unity-package-release: FAIL tarball not produced at $TARBALL" >&2
            echo "  (package.json version likely != tag version ${VERSION})" >&2
            ls -la bindings/unity/ >&2
            exit 1
          fi
          sha256sum "$TARBALL" | awk '{print $1}' > "${TARBALL}.sha256"
          {
            echo "tarball=${TARBALL}"
            echo "sha256=$(cat "${TARBALL}.sha256")"
          } >> "$GITHUB_OUTPUT"
          echo "== UPM tarball =="
          ls -la "$TARBALL" "${TARBALL}.sha256"
          echo "sha256 = $(cat "${TARBALL}.sha256")"

      - name: Upload workflow artifact (always, for inspection)
        uses: actions/upload-artifact@v7
        with:
          name: Vokra-unity-package-release
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sha256
          retention-days: 30

      - name: Upload to GitHub Release (tag + non-dry-run)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            "${{ steps.pack.outputs.tarball }}" \
            "${{ steps.pack.outputs.tarball }}.sha256" \
            bindings/unity/com.vokra.unity/vokra-unity-package.spdx.json \
            --clobber

      - name: OpenUPM publish (optional, gated on secrets.OPENUPM_TOKEN)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          OPENUPM_TOKEN: ${{ secrets.OPENUPM_TOKEN }}
        run: |
          if [ -z "${OPENUPM_TOKEN:-}" ]; then
            echo "unity-package-release: OPENUPM_TOKEN not set — skipping OpenUPM publish."
            echo "  (GitHub Release asset is the baseline distribution channel; OpenUPM is opt-in.)"
            exit 0
          fi
          # Compose an authenticated .npmrc scoped to the OpenUPM registry.
          # npm is preinstalled on ubuntu-latest; no extra setup step needed.
          umask 077
          cat > "$HOME/.npmrc" <<EOF
          //package.openupm.com/:_authToken=${OPENUPM_TOKEN}
          registry=https://package.openupm.com
          always-auth=true
          EOF
          npm publish "${{ steps.pack.outputs.tarball }}" \
            --registry=https://package.openupm.com \
            --access public

      - name: Dry-run summary
        if: inputs.dry_run == true || !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "== DRY RUN (unity-package-release) =="
          echo "Version : ${{ steps.version.outputs.version }}"
          echo "Tarball : ${{ steps.pack.outputs.tarball }}"
          echo "SHA256  : ${{ steps.pack.outputs.sha256 }}"
          echo "Skipping: gh release upload, OpenUPM publish."

  # ---------------------------------------------------------------------------
  # M2-12-T15: Python wheel PyPI publish (NFR-MT-08 / FR-API-01 / NFR-MT-03).
  #
  # Downloads platform-tagged wheels produced by the ci.yml `python-wheel-build`
  # job for the tag SHA, generates an SPDX SBOM (NFR-MT-03) per wheel, and
  # publishes to PyPI via OIDC trusted publishing (fallback: PYPI_API_TOKEN
  # secret). Dry-run mode runs `twine check` + uploads wheels and SBOMs as
  # GitHub Release assets without touching PyPI, mirroring the
  # unity-package-release dry-run idiom.
  #
  # SBOM generation (X-07-T07): the FIRST-PARTY generator
  # `scripts/sbom/generate_spdx.py` emits deterministic SPDX-JSON (replacing the
  # earlier third-party `anchore/sbom-action`, which stamped a wall-clock
  # timestamp + random-UUID namespace and so was never reproducible). It
  # documents the Rust dependency closure of the native library BUNDLED IN the
  # wheel (vokra-capi). The wheel's Python metadata layer is a different scope
  # (the vokra wheel declares no third-party Python runtime deps).
  #
  # PyPI upload path (D11): OIDC trusted publisher configured via
  # `id-token: write` permission scope; account + trusted publisher config
  # provisioned by owner in T17. Actual first-release upload is gated by
  # human sign-off (`inputs.dry_run != true` + tag push).
  #
  # Zero-dep invariant unchanged (NFR-DS-02): no new Rust crate; no Cargo.lock
  # churn; shell + gh + pypa/gh-action-pypi-publish + python3 (first-party SBOM).
  # ---------------------------------------------------------------------------
  python-pypi-publish:
    name: python-pypi-publish
    needs: [validate-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # OIDC for PyPI trusted publishing (T17)
    steps:
      - uses: actions/checkout@v7

      # X-07-T07: the first-party SBOM generator drives `cargo tree`, so this
      # job (previously wheel-only, no Rust) now needs the toolchain. The graph
      # this SBOM documents is vokra-*-only, so the toolchain is used purely to
      # read the dependency closure — no crate is built here.
      - uses: dtolnay/rust-toolchain@stable

      - name: Reuse python-wheel-build artifacts from ci.yml (per-OS wheels)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          RUN_ID="$(gh run list \
            --workflow=ci.yml \
            --branch="${GITHUB_REF_NAME}" \
            --limit=20 \
            --json databaseId,headSha,conclusion \
            --jq ".[] | select(.headSha==\"${GITHUB_SHA}\" and .conclusion==\"success\") | .databaseId" \
            | head -n 1)"
          if [ -z "$RUN_ID" ]; then
            echo "python-pypi-publish: no successful ci.yml run for SHA ${GITHUB_SHA}; wheels unavailable" >&2
            exit 1
          fi
          echo "python-pypi-publish: reusing ci.yml run ${RUN_ID} for wheels"
          mkdir -p dist
          for os in ubuntu-latest macos-latest windows-latest; do
            gh run download "$RUN_ID" \
              --name "vokra-python-wheels-${os}" \
              --dir "reuse/${os}" \
              || echo "python-pypi-publish: wheels for ${os} missing (build red?)"
            if [ -d "reuse/${os}" ]; then
              cp reuse/${os}/*.whl dist/ || true
            fi
          done
          echo "== Collected wheels =="
          ls -la dist/
          set -e

      # X-07-T07: first-party SPDX SBOM, replacing anchore/sbom-action@v0.
      # WHY: the first-party generator is DETERMINISTIC (SOURCE_DATE_EPOCH-pinned
      # `created`, git-SHA namespace, sorted keys — reproducible per NFR-MT-03),
      # whereas anchore stamps a wall-clock timestamp + a random UUID namespace,
      # so its output is never byte-identical across two runs (defeats the
      # reproducible-build verify, X-07-T34). It also removes a third-party
      # action from the release path (zero-dep spirit). SCOPE (honest): this SBOM
      # documents the Rust dependency closure of the native library BUNDLED IN
      # the wheel (built from vokra-capi). The wheel's PYTHON metadata layer
      # (pip/PyPI package name, Python deps) is a DIFFERENT scope not covered
      # here — the vokra Python wheel bundles the native lib and declares no
      # third-party Python runtime deps, so the cargo closure is the material
      # supply-chain surface. See ADR docs/adr/X-07-release-train.md §sbom.
      - name: Generate SPDX SBOM (X-07-T07, first-party, NFR-MT-03)
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-capi \
            --doc-name vokra-python-wheel \
            --output dist/vokra-python-wheel.spdx.json

      - name: twine check (metadata validation, dry-run safe)
        run: |
          python3 -m pip install --user twine
          python3 -m twine check dist/*.whl

      - name: Upload workflow artifact (wheels + SBOM, for inspection)
        uses: actions/upload-artifact@v7
        with:
          name: vokra-python-release
          path: |
            dist/*.whl
            dist/vokra-python-wheel.spdx.json
          retention-days: 30

      - name: Publish to PyPI (OIDC trusted publishing preferred, token fallback)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # OIDC trusted publisher path (T17 owner config): when the PyPI
          # project has a trusted publisher entry pointing at this
          # workflow (and `permissions: id-token: write` above), the
          # action mints an OIDC token and ignores `password`.
          # Fallback path: if OIDC is not yet provisioned, the action
          # authenticates via the API token supplied here — `password`
          # being empty is treated as "OIDC-only", non-empty as "token".
          # Both wired so owner T17 can flip modes with zero edits.
          password: ${{ secrets.PYPI_API_TOKEN }}
          # Immutable index — fail loudly on duplicate version instead of
          # silently skipping (inverse of unity-package-release --clobber).
          skip-existing: false
          verbose: true

      - name: Upload wheels + SBOM to GitHub Release (tag + non-dry-run)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" dist/*.whl dist/vokra-python-wheel.spdx.json --clobber

      # Dry-run path: mirror the unity-package-release baseline — always
      # ship wheels as GitHub Release assets even when PyPI upload is
      # skipped, so the release commit produces a downloadable artifact
      # without external secrets. `--clobber` allows re-running the
      # dry-run on the same tag without manual cleanup.
      - name: Upload wheels to GitHub Release (dry-run baseline)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ls dist/*.whl >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.whl dist/vokra-python-wheel.spdx.json --clobber
          else
            echo "python-pypi-publish (dry-run): no wheels to upload."
          fi

      - name: Dry-run summary
        if: inputs.dry_run == true || !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "== DRY RUN (python-pypi-publish) =="
          echo "Wheels  :"
          ls -la dist/*.whl 2>/dev/null || echo "  (no wheels collected)"
          echo "SBOM    : dist/vokra-python-wheel.spdx.json (first-party SPDX-JSON, X-07-T07)"
          echo "Skipping: pypa/gh-action-pypi-publish (real upload)."
          echo "Dry-run path uploaded wheels to GitHub Release assets only."

  # ---------------------------------------------------------------------------
  # M3-11-T17: Godot GDExtension AssetLib package CD auto-publish
  # (NFR-MT-08 / FR-API-05 / ADR-0011 §D10).
  #
  # Assembles the vokra-godot-<version>.zip release-signed AssetLib package
  # on tag push (v*), runs the T18 compliance scanner (no NVIDIA runtime
  # + LICENSE / NOTICE / vokra.gdextension presence), and uploads the zip
  # + .sha256 to the GitHub Release. Optional Godot AssetLib official
  # registration is documented but NOT wired here (initial submission is
  # manual per ADR-0011 §D10; the second-and-onward `update` call is
  # opt-in via a follow-up workflow once the AssetLib API auth flow is
  # documented — mirrors the OPENUPM_TOKEN posture in unity-package-release).
  #
  # Cross-compile strategy: the godot-crossbuild.yml (T16) matrix already
  # produces per-target cdylib artifacts (`vokra-godot-<triple>`). This
  # release job pulls them via `gh run download` scoped to the tag SHA,
  # reassembles the AssetLib layout, and packs the zip via
  # scripts/build-godot-gdextension.sh --no-build --pack. Missing per-target
  # artifacts are non-fatal for the initial CD wire-up so the zip still
  # assembles with whatever platforms did build — matches unity-package-release
  # `continue-on-error` idiom for reuse of ci.yml artifacts.
  #
  # Reproducibility (build-godot-gdextension.sh --pack § SOURCE_DATE_EPOCH):
  # the pack path derives SOURCE_DATE_EPOCH from the HEAD commit timestamp
  # and consumes it via `zip -X` (bypasses local timestamp variability).
  # The emitted .sha256 is uploaded alongside the zip so downstream
  # (GitHub Release, Godot AssetLib) checksum reconciliation is
  # deterministic.
  #
  # NVIDIA runtime non-bundled (ADR-0011 §D7 / NFR-LC-01): the T18
  # scanner runs on the assembled AssetLib tree BEFORE the zip is packed
  # (belt-and-suspenders — a bundled cudart on any per-target artifact
  # would fail loudly rather than shipping in the released .zip).
  #
  # Zero-dep invariant unchanged (NFR-DS-02): no new Rust crate; no
  # Cargo.lock churn; only shell + gh + zip (all preinstalled on
  # ubuntu-latest).
  # ---------------------------------------------------------------------------
  godot-package-release:
    name: godot-package-release
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute release version (semver from tag, v-prefix stripped)
        id: version
        run: |
          # Tag path: refs/tags/v0.1.0-preview.1 -> version=0.1.0-preview.1
          # workflow_dispatch path: fall back to the Cargo.toml version so
          # dry-runs are still meaningful. build-godot-gdextension.sh --pack
          # names the zip from that Cargo.toml value; asserting alignment
          # here surfaces version drift before the tarball ships silently.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(awk -F'"' '/^[[:space:]]*version[[:space:]]*=/ { print $2; exit }' \
              integrations/vokra-godot/Cargo.toml)"
          fi
          if [ -z "$V" ]; then
            echo "godot-package-release: FAIL could not derive version" >&2
            exit 1
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${V}"

      - name: Reuse per-target cdylibs from godot-crossbuild.yml matrix (advisory, record-only)
        id: reuse-godot-cdylibs
        # T16 crossbuild produces one vokra-godot-<triple> artifact per
        # platform. Fetch each via `gh run download` scoped to the tag
        # SHA and reassemble under integrations/vokra-godot/pkg/lib/.
        # Missing artifacts are non-fatal so the release zip still
        # assembles with whichever platforms did land — the T18 scan
        # will then note the empty per-platform slot as a package
        # completeness gap rather than a bundled-NVIDIA failure.
        # §8.2 canonical form: name suffix + explicit `id:` — see the
        # sibling step above.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          RUN_ID="$(gh run list \
            --workflow=godot-crossbuild.yml \
            --branch="${GITHUB_REF_NAME}" \
            --limit=20 \
            --json databaseId,headSha,conclusion \
            --jq ".[] | select(.headSha==\"${GITHUB_SHA}\" and .conclusion==\"success\") | .databaseId" \
            | head -n 1)"
          if [ -z "$RUN_ID" ]; then
            echo "godot-package-release: no successful godot-crossbuild.yml run for SHA ${GITHUB_SHA}; skipping matrix reuse"
            exit 0
          fi
          echo "godot-package-release: reusing godot-crossbuild.yml run ${RUN_ID}"
          mkdir -p integrations/vokra-godot/pkg/lib
          for TRIPLE in \
            x86_64-apple-darwin \
            aarch64-apple-darwin \
            x86_64-unknown-linux-gnu \
            x86_64-pc-windows-msvc \
            aarch64-linux-android; do
            gh run download "$RUN_ID" \
              --name "vokra-godot-${TRIPLE}" \
              --dir "integrations/vokra-godot/pkg/lib/${TRIPLE}" \
              || echo "godot-package-release: ${TRIPLE} artifact missing (crossbuild leg red?)"
          done
          echo "== Collected per-target artifacts =="
          find integrations/vokra-godot/pkg/lib -type f | LC_ALL=C sort
          set -e

      - name: Reassemble AssetLib layout from staged cdylibs
        run: |
          set -euo pipefail
          mkdir -p dist/godot/vokra-godot/addons/vokra/bin
          declare -A DEST_SUBDIR=(
            [x86_64-apple-darwin]=macos/x86_64
            [aarch64-apple-darwin]=macos/arm64
            [x86_64-unknown-linux-gnu]=linux/x86_64
            [x86_64-pc-windows-msvc]=windows/x86_64
            [aarch64-linux-android]=android/arm64-v8a
          )
          for TRIPLE in "${!DEST_SUBDIR[@]}"; do
            SRC_DIR="integrations/vokra-godot/pkg/lib/${TRIPLE}"
            DEST="dist/godot/vokra-godot/addons/vokra/bin/${DEST_SUBDIR[$TRIPLE]}"
            if [ -d "$SRC_DIR" ] && [ "$(ls -A "$SRC_DIR" 2>/dev/null)" ]; then
              mkdir -p "$DEST"
              cp -f "$SRC_DIR"/* "$DEST/" || true
            fi
          done
          ADDON=dist/godot/vokra-godot/addons/vokra
          cp -f integrations/vokra-godot/vokra.gdextension "$ADDON/vokra.gdextension"
          for f in LICENSE NOTICE README.md; do
            if [ -f "integrations/vokra-godot/$f" ]; then
              cp -f "integrations/vokra-godot/$f" "$ADDON/$f"
            elif [ -f "$f" ]; then
              cp -f "$f" "$ADDON/$f"
            fi
          done
          echo "== AssetLib tree =="
          find dist/godot/vokra-godot -type f | LC_ALL=C sort

      - name: Compliance scan (T18 — no NVIDIA runtime + LICENSE/NOTICE)
        run: bash scripts/compliance/check-godot-package-no-nvidia.sh dist/godot/vokra-godot

      # X-07-T05: first-party SPDX SBOM for the excluded Godot workspace closure.
      # vokra-godot lives in integrations/ (its own Cargo.toml / Cargo.lock,
      # invisible to the root manifest), so --manifest-dir points cargo tree
      # there (X-07-T02). Written into the addon tree BEFORE the pack step so it
      # ships inside the AssetLib zip; git SHA / SOURCE_DATE_EPOCH still derive
      # from the repo root.
      - name: Generate SPDX SBOM (X-07-T05, excluded workspace, NFR-MT-03)
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-godot \
            --manifest-dir integrations/vokra-godot \
            --doc-name vokra-godot-assetlib \
            --output dist/godot/vokra-godot/addons/vokra/vokra-godot-assetlib.spdx.json

      - name: Pack AssetLib zip (SOURCE_DATE_EPOCH pinned, --no-build)
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
          bash scripts/build-godot-gdextension.sh --no-build --pack

      - name: Verify zip + compute .sha256
        id: pack
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # build-godot-gdextension.sh names the zip from
          # integrations/vokra-godot/Cargo.toml's version. On tag push
          # the CD flow expects that version to have been bumped by a
          # preceding commit; assert alignment or fail loudly so version
          # drift never ships silently. (Mirrors unity-package-release.)
          ZIP="dist/godot/vokra-godot-${VERSION}.zip"
          if [ ! -f "$ZIP" ]; then
            echo "godot-package-release: FAIL zip not produced at $ZIP" >&2
            echo "  (integrations/vokra-godot/Cargo.toml version likely != tag version ${VERSION})" >&2
            ls -la dist/godot/ >&2
            exit 1
          fi
          # build-godot-gdextension.sh --pack already emits ${ZIP}.sha256
          # (via shasum/sha256sum). Assert it exists so the release upload
          # is deterministic; recompute if the script's coreutils branch
          # didn't fire.
          if [ ! -f "${ZIP}.sha256" ]; then
            sha256sum "$ZIP" > "${ZIP}.sha256"
          fi
          {
            echo "zip=${ZIP}"
            echo "sha256=$(awk '{print $1}' "${ZIP}.sha256")"
          } >> "$GITHUB_OUTPUT"
          echo "== AssetLib zip =="
          ls -la "$ZIP" "${ZIP}.sha256"
          echo "sha256 = $(cat "${ZIP}.sha256")"

      - name: Upload workflow artifact (always, for inspection)
        uses: actions/upload-artifact@v7
        with:
          name: Vokra-godot-assetlib-release
          path: |
            ${{ steps.pack.outputs.zip }}
            ${{ steps.pack.outputs.zip }}.sha256
          retention-days: 30

      - name: Upload to GitHub Release (tag + non-dry-run)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            "${{ steps.pack.outputs.zip }}" \
            "${{ steps.pack.outputs.zip }}.sha256" \
            dist/godot/vokra-godot/addons/vokra/vokra-godot-assetlib.spdx.json \
            --clobber

      # Godot AssetLib official registration: NOT auto-wired here. The
      # initial submission is a manual form-fill against
      # https://godotengine.org/asset-library/asset per ADR-0011 §D10.
      # A follow-up workflow can add the AssetLib API `update` call once
      # the owner registers the asset and stashes the auth secret. Until
      # then the GitHub Release asset is the baseline distribution
      # channel (same posture unity-package-release takes toward OpenUPM).

      - name: Dry-run summary
        if: inputs.dry_run == true || !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "== DRY RUN (godot-package-release) =="
          echo "Version : ${{ steps.version.outputs.version }}"
          echo "Zip     : ${{ steps.pack.outputs.zip }}"
          echo "SHA256  : ${{ steps.pack.outputs.sha256 }}"
          echo "Skipping: gh release upload, Godot AssetLib API update."

  # ---------------------------------------------------------------------------
  # M4-01-T23: npm Web package publish (NFR-MT-08 = npm CD auto-release;
  # deliverables §3.2 "Web | WASM (+SIMD/Threads) + WebGPU、npm パッケージ").
  #
  # Assembles the T20 layout (scripts/build-wasm.sh pkg = simd128/base .wasm
  # + hand-written glue/worker/loader/.d.ts + LICENSE/NOTICE), stamps the tag
  # semver into package.json, packs deterministically (SOURCE_DATE_EPOCH =
  # HEAD commit timestamp — the godot-package-release idiom), uploads the
  # tarball + SHA-256 as Release assets, and publishes to registry.npmjs.org
  # **gated on secrets.NPM_TOKEN** (absent = honest skip annotation — the
  # OPENUPM_TOKEN pattern; the owner registers the @vokra scope + token in
  # M4-01-T27). Dry-run path (workflow_dispatch or no tag) runs
  # `npm publish --dry-run` so the CD wiring is verifiable token-free.
  # Prerelease semver (1.0.0-rc.N) requires an explicit dist-tag: `rc` for
  # -rc.* tags, `dev` otherwise (npm refuses prerelease publishes to
  # `latest`).
  # ---------------------------------------------------------------------------
  npm-web-release:
    name: npm-web-release
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Compute release version (semver from tag, v-prefix stripped)
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          case "$V" in
            *-rc.*) echo "disttag=rc" >> "$GITHUB_OUTPUT" ;;
            *-*)    echo "disttag=dev" >> "$GITHUB_OUTPUT" ;;
            *)      echo "disttag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Assemble web/pkg (2-artifact build + layout)
        run: ./scripts/build-wasm.sh pkg

      - name: Root Cargo.lock unchanged (zero-dep tripwire)
        run: git diff --exit-code Cargo.lock

      - name: Stamp version into package.json
        working-directory: web/pkg
        run: npm version --no-git-tag-version "${{ steps.version.outputs.version }}"

      # X-07-T06: first-party SPDX SBOM for the npm web package. The shipped
      # artifact is built from vokra-wasm-harness (build-wasm.sh:106 =
      # `cargo build ... -p vokra-wasm-harness --no-default-features`), NOT
      # vokra-capi; the closure is vokra-wasm-harness + backend-webgpu + models
      # + backend-cpu + core + mmap + ops + piper-plus (8 packages). Written
      # into web/pkg (listed in package.json "files") BEFORE npm pack so it
      # ships inside the tarball. Runs AFTER the Cargo.lock tripwire above; the
      # generator provably leaves Cargo.lock untouched (test-generate-spdx.sh b8).
      - name: Generate SPDX SBOM (X-07-T06, first-party, NFR-MT-03)
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-wasm-harness \
            --no-default-features \
            --doc-name vokra-npm-web \
            --output web/pkg/vokra-npm-web.spdx.json

      - name: Deterministic pack + SHA-256
        id: pack
        working-directory: web/pkg
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          TARBALL="$(npm pack --pack-destination . | tail -1)"
          SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          printf '%s' "$SHA" > "$TARBALL.sha256"
          echo "tarball=web/pkg/$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Upload Release assets (tag builds)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            "${{ steps.pack.outputs.tarball }}" \
            "${{ steps.pack.outputs.tarball }}.sha256" \
            web/pkg/vokra-npm-web.spdx.json \
            --clobber

      - name: npm publish (gated on secrets.NPM_TOKEN)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: web/pkg
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::notice::npm-web-release: NPM_TOKEN not set — skipping npm publish (the GitHub Release tarball is the baseline channel; registry publish is owner opt-in, M4-01-T27)."
            exit 0
          fi
          umask 077
          cat > "$HOME/.npmrc" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          EOF
          npm publish --access public --tag "${{ steps.version.outputs.disttag }}"

      - name: npm publish --dry-run (dispatch / non-tag builds)
        if: inputs.dry_run == true || !startsWith(github.ref, 'refs/tags/v')
        working-directory: web/pkg
        run: |
          echo "== DRY RUN (npm-web-release) =="
          echo "Version : ${{ steps.version.outputs.version }} (dist-tag ${{ steps.version.outputs.disttag }})"
          echo "Tarball : ${{ steps.pack.outputs.tarball }}"
          echo "SHA256  : ${{ steps.pack.outputs.sha256 }}"
          npm publish --dry-run --access public --tag "${{ steps.version.outputs.disttag }}"
          echo "Skipping: gh release upload, npm publish."

  # ---------------------------------------------------------------------------
  # X-07-T11: crates.io publish dry-run (NFR-DS-03 "Cargo crate", token-free).
  #
  # Validates that the 15-crate publish set (topological closure of vokra-capi +
  # vokra-cli, derived by tools/release/crates_publish_order.py) packages
  # cleanly, WITHOUT contacting the registry for a real publish. Runs on tag AND
  # workflow_dispatch (no upload, so no gating needed).
  #
  # HONEST LIMITATION (recorded in ADR §crates.io): `cargo publish --dry-run`
  # resolves each crate's `version` dep against the LIVE crates.io index, so only
  # the graph LEAF (vokra-core, no path deps) can fully dry-run before the first
  # real publish — every downstream crate fails with "no matching package named
  # vokra-* found" until its deps are actually on the registry. The pre-publish
  # package-ability gate for ALL 15 crates is therefore `cargo package --list`
  # (uses local path deps, no registry); the downstream publish chain is
  # validated end-to-end incrementally by crates-io-publish (owner, T12/T14).
  #
  # Zero-dep (NFR-DS-02): shell + python3 stdlib + cargo (pinned toolchain).
  # ---------------------------------------------------------------------------
  crates-io-dry-run:
    name: crates-io-dry-run
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify publish order is a valid topological order (X-07-T10)
        run: python3 tools/release/crates_publish_order.py --verify

      - name: cargo package --list for every crate in the set (topo order)
        run: |
          set -euo pipefail
          ORDER="$(python3 tools/release/crates_publish_order.py)"
          echo "== crates.io publish set (topological order) =="
          echo "$ORDER"
          COUNT=0
          for c in $ORDER; do
            echo "--- cargo package --list -p $c ---"
            # --list uses LOCAL path deps (no registry), so it works for every
            # crate before any publish. This is the pre-publish package-ability
            # gate the completion condition depends on.
            cargo package --list -p "$c" >/dev/null
            COUNT=$((COUNT + 1))
          done
          echo "OK: all ${COUNT} crates package cleanly"

      - name: cargo publish --dry-run for the graph leaf (vokra-core)
        run: |
          # Only the leaf can fully dry-run pre-first-publish (see job header).
          # This proves the publish=false guard is lifted (X-07-T09) and the
          # crate resolves against the registry shape.
          cargo publish --dry-run --no-verify -p vokra-core

      - name: Downstream dry-run status (honest, registry-gated)
        run: |
          N="$(python3 tools/release/crates_publish_order.py | wc -l | tr -d ' ')"
          echo "::notice::crates-io-dry-run: cargo package --list passed for all ${N} crates. Downstream cargo publish --dry-run is gated on deps existing on crates.io (chicken-and-egg of first-time multi-crate publishing); the chain is validated incrementally by crates-io-publish (owner, X-07-T12/T14)."

      - name: Root Cargo.lock unchanged (zero-dep tripwire)
        run: git diff --exit-code Cargo.lock

  # ---------------------------------------------------------------------------
  # X-07-T12: crates.io real publish (NFR-MT-08 CD auto-publish, NFR-LC-02).
  #
  # Publishes the 15-crate set in topological order (deps before dependents) on
  # tag push, gated on secrets.CRATES_IO_TOKEN. Token absent = honest ::notice::
  # skip (the OPENUPM_TOKEN / NPM_TOKEN idiom) — the GitHub Release assets remain
  # the baseline channel and the owner opts into crates.io in X-07-T14. crates.io
  # is an IMMUTABLE index, so a duplicate version FAILS LOUD (no --allow-dirty,
  # no skip-existing).
  #
  # X-09b: this job's existence is the precondition for docs.rs auto-doc (docs.rs
  # builds published crates); it is why X-07 is sequenced before X-09b.
  #
  # Zero-dep (NFR-DS-02): shell + python3 stdlib + cargo.
  # ---------------------------------------------------------------------------
  crates-io-publish:
    name: crates-io-publish
    needs: [validate-tag, crates-io-dry-run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Pre-publish license re-check (NFR-LC-02, immutable-index safety)
        run: |
          # crates.io cannot be un-published: a GPL/LGPL or otherwise
          # non-permitted crate in the closure would be an UNRECOVERABLE license
          # incident. Re-assert zero-dep (every Cargo.lock package is vokra-* =
          # Apache-2.0) right before publishing — stricter than cargo-deny's
          # allow-list. NFR-LC-02 mechanized (not a bare declaration). See ADR.
          bash scripts/check-zero-deps.sh

      - name: cargo publish (topo order, token-gated, immutable-index fail-loud)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::notice::crates-io-publish: CRATES_IO_TOKEN not set — skipping crates.io publish (owner opt-in, X-07-T14). GitHub Release assets remain the baseline channel; crates-io-dry-run validated the package set."
            exit 0
          fi
          set -euo pipefail
          ORDER="$(python3 tools/release/crates_publish_order.py)"
          for c in $ORDER; do
            echo "== cargo publish -p $c =="
            # Clean tag checkout (no --allow-dirty). No skip-existing: a
            # duplicate version FAILS LOUD (immutable index). Modern cargo waits
            # for the crate to appear on the index before returning, so the next
            # crate's dep resolves.
            cargo publish -p "$c"
          done

      - name: Dry-run / dispatch summary
        if: inputs.dry_run == true || !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "== crates-io-publish (dry-run / dispatch) =="
          echo "Would publish (topological order):"
          python3 tools/release/crates_publish_order.py
          echo "Skipping: cargo publish (real). Requires tag + dry_run=false + secrets.CRATES_IO_TOKEN."

  # ---------------------------------------------------------------------------
  # X-07-T16: attach CHANGELOG-derived release notes to the GitHub Release
  # (NFR-MT-03 changelog automation). A bare tag push produces a Release with
  # empty notes; this job extracts the matching CHANGELOG section
  # (scripts/release/extract-changelog.py, X-07-T15) and sets it as the body.
  #
  # Version resolution: on a tag it prefers the rolled `[X.Y.Z]` section
  # (X-07-T17 roll-changelog is the owner's pre-tag step), falling back to
  # `[Unreleased]` if the changelog was not rolled. If BOTH are absent/empty it
  # FAILS LOUD rather than publishing blank/fabricated notes (FR-EX-08).
  # Dry-run / dispatch writes the notes to the step summary only.
  # ---------------------------------------------------------------------------
  release-notes:
    name: release-notes
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract release notes from CHANGELOG (X-07-T15/T16)
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="Unreleased"
          fi
          # Prefer the rolled [X.Y.Z] section; fall back to [Unreleased]. Never
          # fabricate: if both are absent/empty, fail loud.
          if python3 scripts/release/extract-changelog.py --version "$VERSION" --output release-notes.md 2>/dev/null; then
            echo "release-notes: using [$VERSION]"
          elif python3 scripts/release/extract-changelog.py --version Unreleased --output release-notes.md; then
            echo "release-notes: [$VERSION] absent — using [Unreleased]"
          else
            echo "release-notes: no non-empty [$VERSION] or [Unreleased] section — refusing to publish blank notes (FR-EX-08)" >&2
            exit 1
          fi
          echo "== release notes ($VERSION) =="
          cat release-notes.md

      - name: Attach notes to the GitHub Release (tag + non-dry-run)
        if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Create the Release with the notes if it does not exist yet, else set
          # its body. Idempotent across re-runs of the same tag.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md --verify-tag
          fi

      - name: Dry-run summary (notes to step summary only)
        if: inputs.dry_run == true || !startsWith(github.ref, 'refs/tags/v')
        run: |
          {
            echo "## Release notes (dry-run, X-07-T16)"
            echo ""
            echo '```markdown'
            cat release-notes.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "== DRY RUN (release-notes): notes written to step summary only =="

  # ---------------------------------------------------------------------------
  # X-07-T29/T30: desktop shared-library + CLI release publish (SCAFFOLD).
  #
  # This closes the NFR-MT-08 gap recorded in docs/handoff/m4-11.md §(c):
  # ci.yml#build uploads per-OS cdylibs (7-day retention) but release.yml had no
  # desktop-lib/CLI publish job. It publishes the per-OS shared library
  # (.dylib/.dll/.so) + C header + the per-OS `vokra` CLI, INCLUDING the
  # x86_64-unknown-linux-musl static CLI (deliverables §3.5), with SBOM + sha256.
  #
  # T32-GATED (owner-undecided): the M4-11-T13 gap-flow 3-choice (M4 follow-up /
  # M5 / requirement revision) is pending. Until the owner sets the repo
  # variable DESKTOP_AAR_ENABLED=true after that decision (X-07-T32), the
  # effectful steps are skipped and the job ANNOUNCES the gated state
  # (announced skip, FR-EX-08 — NOT a fabricated pass). Asset filenames match
  # tools/release/gen_package_managers.py ASSETS so the winget/Debian manifests
  # can reference them.
  # ---------------------------------------------------------------------------
  desktop-release:
    name: desktop-release
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: T32 gate (M4-11-T13 desktop/AAR gap-flow)
        id: gate
        run: |
          if [ "${{ vars.DESKTOP_AAR_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "desktop-release: T32 enabled (vars.DESKTOP_AAR_ENABLED=true)."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::desktop-release: T32-gated scaffold — M4-11-T13 gap-flow (M4 follow-up / M5 / requirement revision) is owner-undecided; NOT building/uploading the desktop lib + CLI. Set repo variable DESKTOP_AAR_ENABLED=true after the decision (X-07-T32)."
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.gate.outputs.enabled == 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.gate.outputs.enabled == 'true'

      - name: Build Linux CLI (glibc + musl static) and reuse ci.yml cdylibs
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          mkdir -p dist/desktop
          # Linux glibc CLI (built here) + musl static CLI (deliverables §3.5).
          cargo build --release -p vokra-cli
          cp target/release/vokra-cli "dist/desktop/vokra-cli-${V}-x86_64-linux"
          rustup target add x86_64-unknown-linux-musl
          cargo build --release -p vokra-cli --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/vokra-cli \
            "dist/desktop/vokra-cli-${V}-x86_64-linux-musl"
          # Linux cdylib + C header (T29).
          cargo build --release -p vokra-capi
          cp target/release/libvokra.so "dist/desktop/libvokra-${V}-x86_64-linux.so"
          cp include/vokra.h "dist/desktop/vokra.h"
          # macOS/Windows cdylibs + CLI reused from the ci.yml run for this SHA
          # (best-effort; a follow-up adds native macos/windows CLI builds).
          RUN_ID="$(gh run list --workflow=ci.yml --branch="${GITHUB_REF_NAME}" \
            --limit=20 --json databaseId,headSha,conclusion \
            --jq ".[] | select(.headSha==\"${GITHUB_SHA}\" and .conclusion==\"success\") | .databaseId" \
            | head -n 1 || true)"
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name vokra-capi-macos --dir reuse/macos || true
            gh run download "$RUN_ID" --name vokra-capi-windows --dir reuse/windows || true
            [ -f reuse/macos/libvokra.dylib ] && cp reuse/macos/libvokra.dylib "dist/desktop/libvokra-${V}-macos.dylib" || echo "desktop-release: macOS cdylib not available (follow-up)"
            [ -f reuse/windows/vokra.dll ] && cp reuse/windows/vokra.dll "dist/desktop/vokra-${V}-windows.dll" || echo "desktop-release: Windows cdylib not available (follow-up)"
          else
            echo "desktop-release: no ci.yml run for SHA ${GITHUB_SHA}; shipping Linux slices only this run."
          fi

      - name: SBOM + sha256 for desktop assets
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-capi --doc-name vokra-desktop \
            --output dist/desktop/vokra-desktop.spdx.json
          ( cd dist/desktop && for f in *; do
              [ -f "$f" ] || continue
              case "$f" in *.sha256) continue;; esac
              sha256sum "$f" > "$f.sha256"
            done )
          echo "== desktop assets ==" && ls -la dist/desktop

      - name: Upload desktop assets to GitHub Release (enabled + tag + non-dry-run)
        if: steps.gate.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" dist/desktop/* --clobber

  # ---------------------------------------------------------------------------
  # X-07-T31: Android standalone AAR release publish (SCAFFOLD).
  #
  # Closes docs/handoff/m4-11.md §(c): no CD job produces a standalone AAR (the
  # arm64 .so is only bundled into the Unity UPM / Godot addon). Packs the
  # arm64-v8a libvokra.so (scripts/build-android.sh) into a standalone .aar with
  # the persistentDataPath helper (deliverables §3.5 / VokraAndroidAssets), with
  # SBOM + sha256. SAME T32 gate as desktop-release (announced skip until owner
  # sets DESKTOP_AAR_ENABLED=true).
  # ---------------------------------------------------------------------------
  android-aar-release:
    name: android-aar-release
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: T32 gate (M4-11-T13 desktop/AAR gap-flow)
        id: gate
        run: |
          if [ "${{ vars.DESKTOP_AAR_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "android-aar-release: T32 enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::android-aar-release: T32-gated scaffold — standalone AAR NOT built/uploaded until M4-11-T13 gap-flow is decided (X-07-T32). Set DESKTOP_AAR_ENABLED=true to enable."
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.gate.outputs.enabled == 'true'

      - name: Build arm64 .so + pack standalone AAR
        if: steps.gate.outputs.enabled == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          bash scripts/build-android.sh
          # Assemble a minimal standalone AAR layout: jni/<abi>/libvokra.so +
          # AndroidManifest.xml. The persistentDataPath extraction helper
          # (VokraAndroidAssets) ships as the consumer-side Kotlin/Java shim; a
          # follow-up embeds it as a classes.jar. This scaffold packs the .so so
          # the AAR is installable; owner refines the manifest metadata on enable.
          AAR_DIR="dist/android/aar"
          mkdir -p "$AAR_DIR/jni/arm64-v8a"
          SO="$(find target -type f -path '*aarch64-linux-android*release*/libvokra.so' | head -n1)"
          if [ -z "$SO" ]; then
            echo "android-aar-release: FAIL arm64 libvokra.so not found after build-android.sh" >&2
            exit 1
          fi
          cp "$SO" "$AAR_DIR/jni/arm64-v8a/libvokra.so"
          cat > "$AAR_DIR/AndroidManifest.xml" <<XML
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="dev.vokra.runtime" />
          XML
          ( cd "$AAR_DIR" && zip -X -qr "../vokra-${V}.aar" . )

      - name: SBOM + sha256 for the AAR
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python3 scripts/sbom/generate_spdx.py \
            --package vokra-capi --no-default-features \
            --doc-name vokra-android-aar \
            --output "dist/android/vokra-${V}-android-aar.spdx.json"
          ( cd dist/android && sha256sum "vokra-${V}.aar" > "vokra-${V}.aar.sha256" )
          echo "== AAR assets ==" && ls -la dist/android

      - name: Upload AAR to GitHub Release (enabled + tag + non-dry-run)
        if: steps.gate.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          V="${TAG#v}"
          gh release upload "$TAG" \
            "dist/android/vokra-${V}.aar" \
            "dist/android/vokra-${V}.aar.sha256" \
            "dist/android/vokra-${V}-android-aar.spdx.json" \
            --clobber
