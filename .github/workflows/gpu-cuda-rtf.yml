# M3-01 CUDA RTF regression gate (WP M3-01-T13/T14/T15/T16, ADR docs/adr/M3-01-cuda-complete.md §2 (d)).
#
# Purpose (milestones.md §7.2 M3-01 completion condition #2):
#   Whisper large-v3 CUDA RTF < 0.10 (NFR-PF-04) under 5% regression judgment
#   (NFR-PF-13). Baseline: docs/perf/cuda-large-v3-baseline.json
#   (median 0.1133 from the M2-14 vast.ai variance harness, N=10).
#
# Design red line (M2-14 hand-off):
#   * vast.ai spot RTX 4090 single-shot RTF is 0.081-0.115 across independent
#     probes (GPU individual variance + thermal + PCIe). A single measurement
#     is NOT reliable as a required check — it would false-fail PRs and break
#     the merge flow. Hence: this workflow is workflow_dispatch + weekly cron,
#     NOT registered as a branch-protection required check.
#   * Promotion to required check happens only after (a) M2-14 self-hosted
#     RTX 4090 runner stands up, (b) the first N=10 median measurement lands
#     and updates the baseline JSON, and (c) the owner explicitly approves the
#     promotion (ADR M3-01 §2 (d)).
#
# Honest reporting (FR-EX-08, fabricated pass prohibited):
#   * When the self-hosted runner is unavailable, the workflow emits an
#     explicit "## Skipped: no self-hosted CUDA runner" step summary and
#     returns green — the same pattern parity-whisper-real.yml uses for
#     absent audio fixtures. A green run without an actual measurement is
#     annotated as such; it never claims RTF < 0.10 was verified.
#   * The gate expression is documented in the baseline JSON and rendered on
#     the step summary along with the measured median, both baseline and the
#     computed thresholds.
#
# Skip conditions (M3-01-T15):
#   * GPU model: primary target = RTX 4090 (SM 8.9). H100 (SM 9.0) leg =
#     M4-07 reference measurement (`--fa-mode decomposed|v2|v3`, N=10 per
#     mode, owner-run per docs/m4-07-hopper-bench-handover.md; results land
#     in docs/perf/cuda-large-v3-h100-fa-v3-baseline.json — a SEPARATE
#     baseline file, never merged into the RTX 4090 gate baseline, and never
#     a required check). Ampere (SM 8.6) is reference measurement only. The
#     runner reports its device via nvidia-smi; on a non-matching GPU we
#     still run the measurement but flag it as reference in the step summary.
#   * Driver: CUDA 12.0+ / driver 525.60.13 (Linux) / 528.02 (Windows) is the
#     lower bound. Below that the workflow emits a "skipped: driver too old"
#     annotation and exits green — the runner environment is a host-side
#     concern, not a code regression.

name: gpu-cuda-rtf

on:
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of measurement iterations (default 10; larger N = tighter median CI, longer wall time)'
        required: false
        default: '10'
      gguf_path:
        description: 'Absolute path to whisper-large-v3.gguf on the runner (must be pre-staged)'
        required: false
        default: ''
  schedule:
    # Weekly Monday 06:00 UTC. Same off-peak window the other parity CI jobs
    # use (parity-kokoro-real @ 04:00 UTC, parity-whisper-real @ 05:00 UTC),
    # spaced so a runner used by all three doesn't stack them.
    - cron: '0 6 * * 1'
  # Phase 5a-2 (2026-07-23): narrow PR path filter — CUDA backend / RTF sanity
  # / baseline docs / this workflow。self-hosted runner 未提供時は
  # check-runner-availability gate が clean skip する既存 pattern を
  # 維持 (fabricated pass 禁止 FR-EX-08)。
  pull_request:
    paths:
      - '.github/workflows/gpu-cuda-rtf.yml'
      - 'crates/vokra-core/**'
      - 'crates/vokra-ops/**'
      - 'crates/vokra-backend-cuda/**'
      - 'crates/vokra-models/src/whisper/**'
      - 'crates/vokra-models/src/compute.rs'
      - 'crates/vokra-convert/src/models/whisper.rs'
      - 'docs/perf/cuda-large-v3-baseline.json'

# All jobs treat the self-hosted runner as **optional infrastructure**. A
# stand-in `check-runner-availability` job is the entry: it emits the skip
# annotation when no self-hosted CUDA runner is registered, so the workflow
# still resolves green with a clean skip note (never fabricated pass).
jobs:
  # Gate #1: is the self-hosted CUDA runner available? Runs on GitHub-hosted
  # ubuntu-latest so it can always execute; its job output tells the measure
  # job to skip vs proceed.
  check-runner-availability:
    name: check-runner-availability
    runs-on: ubuntu-latest
    outputs:
      run_available: ${{ steps.check.outputs.run_available }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
    steps:
      - name: Check whether the self-hosted CUDA runner label is present
        id: check
        run: |
          # Two conditions must hold for the measure leg to proceed:
          #   1. `VOKRA_CUDA_SELF_HOSTED_RUNNER` repo variable is set to "true".
          #   2. The owner has staged a whisper-large-v3.gguf on the runner
          #      (either via the workflow_dispatch input or a pre-set env var).
          # Both default to unset in the M3-01 land state — the workflow is
          # scaffolding, not yet exercising a real runner.
          #
          # Falling through with a skip reason is the honest-report path per
          # FR-EX-08; the reason ends up on the step summary of the "measure"
          # job even when that job skips.
          if [ "${{ vars.VOKRA_CUDA_SELF_HOSTED_RUNNER }}" = "true" ]; then
            echo "run_available=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
          else
            echo "run_available=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no self-hosted CUDA runner: set repository variable VOKRA_CUDA_SELF_HOSTED_RUNNER=true and register a runner with the 'cuda-rtx-4090' label to enable" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit skip annotation when unavailable
        if: steps.check.outputs.run_available != 'true'
        run: |
          echo "## Skipped: no self-hosted CUDA runner" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow requires a self-hosted RTX 4090 runner registered with the label \`cuda-rtx-4090\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Reason**: ${{ steps.check.outputs.skip_reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This job is workflow_dispatch + weekly cron only and is **not registered as a required check** (see ADR docs/adr/M3-01-cuda-complete.md §2 (d) — promotion pending M2-14 self-hosted runner + owner approval)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The measured baseline (\`docs/perf/cuda-large-v3-baseline.json\`) currently holds \`median_rtf = 0.1133\` from the M2-14 vast.ai variance harness (see \`docs/m2-cuda-rtf-variance-2026-07-08.md\`). Refreshing that baseline requires a real measurement — which this skip has not produced." >> "$GITHUB_STEP_SUMMARY"

  # Gate #2: run the RTF measurement on the self-hosted runner. Currently
  # entirely guarded off with `if: false` so the workflow can land / lint /
  # validate on GitHub Actions without a runner in the fleet. When M2-14
  # stands the runner up + the owner sets VOKRA_CUDA_SELF_HOSTED_RUNNER=true,
  # this leg starts firing and its output updates the baseline JSON.
  measure:
    name: measure-rtf
    needs: check-runner-availability
    # DELIBERATE `if: false` — this leg needs a self-hosted CUDA runner that
    # does not exist yet in the fleet. Removing the `false` before M2-14
    # stands the runner would cause every weekly cron run to fail with
    # "no matching runner". ADR M3-01 §2 (d): "self-hosted runner is
    # optional infrastructure until owner sign-off".
    if: false && needs.check-runner-availability.outputs.run_available == 'true'
    runs-on: [self-hosted, linux, cuda-rtx-4090]
    steps:
      - uses: actions/checkout@v7

      - name: Emit device + driver + toolkit versions to the summary
        # Belt-and-suspenders: even if the check-runner job passed, we still
        # want the exact device model + driver + CUDA version on the summary
        # so a baseline update carries the same context M2-14 recorded.
        run: |
          echo "## Runner environment" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          nvidia-smi --query-gpu=name,driver_version,compute_cap --format=csv >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build vokra-cli with --features cuda
        # Release build so the RTF number is the one the user would see.
        run: cargo build --release -p vokra-cli --features cuda

      - name: Run the M3-01 RTF measurement (N iterations, median report)
        env:
          # The gguf path is a workflow_dispatch input; the owner sets it when
          # kicking off manually. On cron this is empty and the step skips
          # cleanly (fabricated pass prohibited).
          VOKRA_WHISPER_LARGE_V3_GGUF: ${{ inputs.gguf_path }}
          MEASUREMENT_RUNS: ${{ inputs.runs || '10' }}
        run: |
          set -euo pipefail
          if [ -z "${VOKRA_WHISPER_LARGE_V3_GGUF:-}" ]; then
            echo "## Skipped: no GGUF path" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Set the \`gguf_path\` workflow_dispatch input to the absolute path of whisper-large-v3.gguf on the runner. cron runs are expected to skip until the runner has a persistent path staged." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ ! -f "$VOKRA_WHISPER_LARGE_V3_GGUF" ]; then
            echo "## Skipped: GGUF file not found" >> "$GITHUB_STEP_SUMMARY"
            echo "\`$VOKRA_WHISPER_LARGE_V3_GGUF\` does not exist on this runner." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Run the sanity test in release mode with --nocapture so the RTF
          # number lands in the step log (the sanity test itself is < 0.15
          # only; the formal < 0.10 comparison is done here in shell against
          # the baseline JSON so a self-hosted regression fails the job).
          RTFS=()
          for i in $(seq 1 "$MEASUREMENT_RUNS"); do
            OUT=$(cargo test --release -p vokra-backend-cuda \
              --features vokra-models/cuda \
              whisper_cuda_large_v3_rtf_below_0_15_sanity \
              -- --nocapture --ignored 2>&1 | tee -a rtf-runs.log)
            # Parse "RTF=0.0912 ..." from the sanity test's stdout.
            RTF=$(echo "$OUT" | grep -oE 'RTF=[0-9.]+' | head -1 | cut -d= -f2)
            if [ -n "$RTF" ]; then
              RTFS+=("$RTF")
              echo "iter $i: RTF=$RTF"
            fi
          done

          # Median of the collected RTFs (jq is on every ubuntu-latest, but
          # this may also be a truly self-hosted host — fall back to sort+awk).
          MEDIAN=$(printf '%s\n' "${RTFS[@]}" | sort -n | awk '
            {
              a[NR] = $1
            }
            END {
              n = NR
              if (n == 0) { print "NaN"; exit }
              if (n % 2 == 1) { print a[(n+1)/2] } else { printf "%.6f\n", (a[n/2] + a[n/2+1]) / 2 }
            }')
          BASELINE=$(python3 -c "import json; print(json.load(open('docs/perf/cuda-large-v3-baseline.json'))['median_rtf'])")
          HARD_CEILING=$(python3 -c "import json; print(json.load(open('docs/perf/cuda-large-v3-baseline.json'))['hard_ceiling'])")
          REG=$(python3 -c "import json; print(json.load(open('docs/perf/cuda-large-v3-baseline.json'))['regression_threshold'])")
          THRESHOLD=$(python3 -c "print($BASELINE * (1 + $REG))")

          echo "## RTF measurement" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| median_rtf | $MEDIAN |" >> "$GITHUB_STEP_SUMMARY"
          echo "| baseline_median_rtf | $BASELINE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| regression_threshold (5%) | $THRESHOLD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| hard_ceiling | $HARD_CEILING |" >> "$GITHUB_STEP_SUMMARY"
          echo "| N iterations | ${#RTFS[@]} |" >> "$GITHUB_STEP_SUMMARY"

          # Gate expression: fail if regression 5% exceeded OR hard ceiling breached.
          FAIL=$(python3 -c "print(1 if ($MEDIAN > $THRESHOLD or $MEDIAN > $HARD_CEILING) else 0)")
          if [ "$FAIL" -eq 1 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**FAIL**: median RTF $MEDIAN exceeds either baseline * 1.05 ($THRESHOLD) or the hard ceiling ($HARD_CEILING)." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**PASS**: median RTF $MEDIAN is within both the 5% regression bound and the 0.10 hard ceiling." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload measurement log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cuda-rtf-runs-${{ github.run_id }}
          path: rtf-runs.log
          retention-days: 30
