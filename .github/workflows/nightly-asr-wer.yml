# Vokra nightly ASR-WER — X-06 quality-verification leg (ADVISORY).
#
# `docs/milestones.md` §10 X-06 splits nightly quality verification into
# "CI job definition + threshold-breach revert/block operation = CC" and
# "Tier 2 device lab (self-hosted runners) = owner". This workflow is the
# CC half, open since M1. It measures Whisper WER on a pinned LibriSpeech
# dev-clean subset every night and reports a verdict against a threshold
# seeded from a real measurement.
#
# SCOPE — the ASR-WER leg only
# ----------------------------
# X-06 also names two things this workflow deliberately does NOT do:
#   * the LJSpeech TTS UTMOS/MOS leg — belongs to M5-15, which owns the
#     UTMOS un-defer (weights + license sign-off). Wiring a UTMOS job here
#     would either need weights that do not exist yet or a fabricated
#     score; both are barred (NFR-QL-04).
#   * the Tier-2 device matrix (iOS / Android / WASM / Pi 3-5 / RK3588 /
#     Jetson) — that is the owner's self-hosted lab, gated on hardware
#     procurement (§11 machine-acquisition row). GitHub-hosted runners
#     cannot stand in for it.
# The VCTK VC-similarity leg named in X-06 is likewise out of scope here.
#
# MODEL-RTF COMPANION (X-06-T11/T12, ADVISORY, record-only)
# ---------------------------------------------------------
# Two companion steps ride this leg to guard the M5-14 CPU wins without an
# extra download: (T11) the SAME whisper-base GGUF this leg already converts
# is benched for RTF, and (T12) a piper-plus TTS RTF leg that clean-skips
# until a piper GGUF is staged (open question #7). Both are placeholder-gated
# (docs/bench-baselines/*_nightly_baseline.json) and record-only: a
# regression is annotated but does NOT fail the nightly (open question #6 —
# full-model RTF on a shared runner is noisier than the mel gate). The WER
# breach below is the actionable gate; the RTF companion is a measurement.
#
# ADVISORY POSTURE
# ----------------
# Not a required check, and there is no `pull_request:` trigger — this leg
# must never block a merge. It does FAIL the run on a threshold breach, so
# the nightly goes red and is actionable: X-06's exit criteria require that
# a breach drives revert/block (NFR-MT-07), which a job that always exits 0
# could not support. Same posture as the parity-*-real workflows: they
# assert, but they are not in the required set.
#
# CORPUS PROVENANCE FAILURE MODES
# -------------------------------
# The advisory posture applies to two categories of failure with opposite
# meanings:
#   (a) upstream CDN drift (curl failure or sha256 mismatch on the OpenSLR
#       tarball, tar extraction failure, or missing/empty archive member)
#       → NOT a Vokra regression, so it is downgraded to `::warning::`,
#       records corpus_ok=false on the step output, and skips every
#       downstream step (WER + both RTF companions) via
#       `if: steps.<id>.outputs.corpus_ok == 'true'`. The local drift blob
#       is removed (`rm -f "$TARBALL"`) so the post-step `actions/cache@v6`
#       save does not persist a bad blob in the current cache-MISS run;
#       actual re-fetch on the NEXT run relies on either a cache-key SHA
#       change (bump `DEV_CLEAN_SHA256`) or the WP X-10 self-mirror flip,
#       NOT on a magical re-fetch of the same SHA-keyed blob. Owner WP
#       X-10 (self-mirror) tracks the recurrence fix (self-mirror the
#       tarball under Vokra's control so upstream CDN drift stops
#       surfacing as nightly red).
#   (b) WER > slice-calibrated threshold → real regression, still hard-
#       fails per NFR-MT-07. The Score WER step's gate character is intact:
#       it runs iff corpus_ok=true, and exits 1 on breach. corpus_ok=true
#       is only emitted on the success path of both Download and Extract;
#       any other state (unset, false) cascades skip through downstream.
#
# THRESHOLD PROVENANCE
# --------------------
# Nightly default: 6.0%, against a measured whisper-base baseline of 4.3689%
# (9 word edits over 206 reference words) on the pinned 8-utterance subset.
#
# The baseline is NOT the 3.947% headline in
# docs/bench-baselines/m1-real-weight-eval-2026-07-16/report.md: that figure
# is the 9-file aggregate including jfk-30s.wav, which this leg does not
# score. It was recomputed over the LibriSpeech utterances alone, then
# reproduced end-to-end from the OpenSLR tarball (delta +0.0000%).
#
# Each corpus slice carries its OWN measured baseline and threshold
# (tools/eval/librispeech_wer.py CALIBRATIONS), because slice choice moves
# WER more than the gate width: the full 15-utterance chapter measures
# 6.1765% (21 edits / 340 words) — above the 8-utterance slice's 6.0%
# threshold — since the 7 utterances the campaign excluded are harder. One
# shared threshold would therefore have made `all_in_chapter` runs fail for
# reasons that are not regressions. A slice with no calibration is reported
# as a plain measurement with no verdict rather than judged against a number
# from a different corpus.
#
# Both thresholds come from one rule: baseline + 1.6pp, rounded up to the
# nearest 0.2pp. The rationale lives next to HEADROOM_PP in the scorer
# (single source); tools/eval/test_librispeech_wer.py holds this file's
# WER_THRESHOLD mirror to it and re-derives both thresholds.
#
# DETERMINISM
# -----------
# Whisper greedy decode is deterministic, and flac→WAV decoding was verified
# bit-identical (int16, sample-for-sample, all 8 utterances) to the WAVs the
# campaign measured. So run-to-run variance is zero and the headroom exists
# only for upstream checkpoint re-uploads and benign refactor churn — it is
# not a noise budget.
#
# Zero-dep invariant (NFR-DS-02): root Cargo.lock is never modified. The
# Python stack lives in a /tmp venv; a `git diff --exit-code` guard catches
# accidental mutation. No Cargo dependency is added by this leg.
#
# Corpus: LibriSpeech dev-clean (OpenSLR resource 12), CC BY 4.0,
# Panayotov et al. 2015. Downloaded at run time, never committed.

name: nightly-asr-wer

on:
  schedule:
    # 05:17 UTC daily. The nightly ladder is staggered off the top of the
    # hour to dodge GH Actions cron congestion: nightly-il2cpp 04:17,
    # nightly-webgl 04:47, this leg 05:17. It also clears the weekly Monday
    # series entirely (Kokoro 04:00, Whisper 05:00, Vulkan 05:30, CUDA-RTF
    # 06:00, CSM 06:30, web-wasm 07:00, Moshi 07:30, UTMOS 08:00, Godot
    # 08:30). test_librispeech_wer.py re-derives this from the workflow tree
    # rather than trusting this comment.
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      threshold:
        description: "Override the WER pass threshold (fraction, e.g. 0.06). Blank = the slice's own calibrated threshold."
        required: false
        default: ""
      all_in_chapter:
        description: "Score all 15 utterances of 1272/128104 instead of the campaign 8. Uses the chapter-15 calibration (baseline 6.1765%, threshold 7.8%)."
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: nightly-asr-wer
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Mirror of tools/eval/librispeech_wer.py DEFAULT_THRESHOLD. The oracle
  # test asserts the two stay equal, so this cannot silently drift.
  WER_THRESHOLD: "0.06"
  HF_ID: openai/whisper-base
  GGUF: whisper-base.gguf
  SPEAKER: "1272"
  CHAPTER: "128104"
  # sha256 of the OpenSLR dev-clean tarball (337,926,286 bytes) as used by
  # the 2026-07-16 campaign, computed from that exact file. A mismatch means
  # the corpus changed under us — advisory-downgraded because it is not a
  # Vokra regression; the WER breach in the next step remains the actionable
  # gate. Owner WP X-10 tracks the self-mirror that would eliminate the
  # drift class entirely (see CORPUS PROVENANCE FAILURE MODES above).
  DEV_CLEAN_SHA256: "76f87d090650617fca0cac8f88b9416e0ebf80350acb97b343a85fa903728ab3"
  DEV_CLEAN_URL: "https://www.openslr.org/resources/12/dev-clean.tar.gz"
  HF_HOME: ${{ github.workspace }}/.hf-cache
  HF_HUB_CACHE: ${{ github.workspace }}/.hf-cache

jobs:
  asr-wer:
    name: whisper-base WER (LibriSpeech dev-clean)
    runs-on: ubuntu-latest
    # HF DL (~290 MB) + convert + corpus DL (~338 MB) + 8 transcriptions of
    # ~98 s total audio. Comfortably inside 45 min; the cap only bounds a
    # genuinely stuck run.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-asr-wer

      - name: Cache HF checkpoint
        uses: actions/cache@v6
        with:
          path: ${{ env.HF_HOME }}
          key: hf-hub-whisper-base-asr-wer
          restore-keys: |
            hf-hub-whisper-base-

      - name: Cache LibriSpeech dev-clean tarball
        # Keyed on the pinned digest: if the digest constant changes, the
        # cache misses and the new corpus is fetched, which is exactly the
        # behaviour a deliberate corpus bump needs.
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.corpus-cache
          key: librispeech-dev-clean-${{ env.DEV_CLEAN_SHA256 }}

      - name: Install Python scoring deps
        # jiwer = WER/CER. transformers = whisper's EnglishTextNormalizer
        # (pure-python; torch is NOT needed and is deliberately not
        # installed — see load_normalizer() for the equivalence check
        # against the openai-whisper implementation the campaign used).
        # soundfile = flac→WAV. huggingface_hub = checkpoint download.
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv /tmp/vokra-py-asrwer
          # shellcheck disable=SC1091
          . /tmp/vokra-py-asrwer/bin/activate
          python -m pip install --upgrade pip
          python -m pip install \
            "jiwer>=3,<4" \
            "transformers>=4.44,<4.60" \
            "soundfile>=0.12,<1" \
            "huggingface_hub>=0.24,<1"
          python -m pip list | grep -Ei '^(jiwer|transformers|soundfile|huggingface[-_]hub)\b'

      - name: Unit-test the scorer and this workflow's surface
        # The oracle is stdlib-only, so it runs before the heavy assets are
        # fetched: a broken threshold mirror or a cron collision should fail
        # in seconds, not after a 600 MB download.
        shell: bash
        run: python3 tools/eval/test_librispeech_wer.py

      - name: Build vokra-cli (release)
        run: cargo build --release -p vokra-cli

      - name: Download whisper-base checkpoint
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . /tmp/vokra-py-asrwer/bin/activate
          python3 - <<'PYEOF'
          import os
          from huggingface_hub import snapshot_download
          local = snapshot_download(
              repo_id=os.environ["HF_ID"],
              allow_patterns=["model.safetensors", "config.json", "normalizer.json"],
          )
          with open("/tmp/hf-paths.env", "w") as f:
              f.write(f"HF_SAFETENSORS={local}/model.safetensors\n")
              # normalizer.json ships the English spelling map the scorer
              # needs; taking it from the checkpoint keeps normalization
              # version-matched to the weights being scored.
              f.write(f"HF_NORMALIZER={local}/normalizer.json\n")
          print("snapshot_download OK:", local)
          PYEOF
          cat /tmp/hf-paths.env >> "$GITHUB_ENV"
          set -a
          # shellcheck disable=SC1091
          . /tmp/hf-paths.env
          set +a
          test -f "$HF_SAFETENSORS"
          test -f "$HF_NORMALIZER"

      - name: Convert safetensors → GGUF
        # No --quantize: the baseline was measured on fp32 weights, so
        # quantization error must not be folded into the WER being gated.
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/vokra-cli convert \
            --model whisper \
            --input "$HF_SAFETENSORS" \
            --output "$GGUF"
          ls -lh "$GGUF"

      - name: Download LibriSpeech dev-clean
        id: corpus-download
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.corpus-cache"
          TARBALL="$GITHUB_WORKSPACE/.corpus-cache/dev-clean.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            echo "fetching $DEV_CLEAN_URL"
            if ! curl -fL --retry 3 --retry-delay 10 -o "$TARBALL" "$DEV_CLEAN_URL"; then
              echo "::warning::LibriSpeech dev-clean download from $DEV_CLEAN_URL failed;" \
                   "upstream CDN drift is not a Vokra regression — advisory downgrade." \
                   "Owner WP X-10 (self-mirror) tracks the recurrence fix."
              rm -f "$TARBALL"
              echo "corpus_ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "cache hit: $TARBALL"
          fi
          if ! echo "${DEV_CLEAN_SHA256}  ${TARBALL}" | sha256sum -c -; then
            echo "::warning::LibriSpeech dev-clean checksum mismatch at" \
                 "$DEV_CLEAN_URL — the corpus changed under us; not a Vokra" \
                 "regression, so advisory-downgraded. Local drift blob is" \
                 "removed (rm -f) so the post-step actions/cache save does" \
                 "not persist a bad blob in the current cache-MISS run;" \
                 "actual re-fetch on the NEXT run relies on cache-key SHA" \
                 "change (bump DEV_CLEAN_SHA256) or the WP X-10 self-mirror" \
                 "flip, not on a magical re-fetch of the same SHA-keyed" \
                 "blob. Owner WP X-10 (self-mirror) tracks the recurrence" \
                 "fix; re-measure the baseline before repinning" \
                 "DEV_CLEAN_SHA256 if this becomes intentional."
            rm -f "$TARBALL"
            echo "corpus_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "corpus_ok=true" >> "$GITHUB_OUTPUT"

      - name: Extract the pinned corpus subset
        id: corpus-extract
        if: steps.corpus-download.outputs.corpus_ok == 'true'
        shell: bash
        env:
          CORPUS_DIR: ${{ github.workspace }}/.corpus
        run: |
          set -euo pipefail
          mkdir -p "$CORPUS_DIR"
          echo "CORPUS_DIR=$CORPUS_DIR" >> "$GITHUB_ENV"
          # <<<subset-extract
          # Pull ONLY speaker/chapter $SPEAKER/$CHAPTER out of the 338 MB
          # archive. Extracting the whole corpus would cost minutes and disk
          # for utterances nothing scores. Missing member / empty extraction
          # was previously a hard error; it is now advisory-downgraded
          # (corpus_ok=false + downstream skip) because it means upstream
          # repackaging rather than a Vokra regression — same class as sha
          # mismatch above (see CORPUS PROVENANCE FAILURE MODES).
          #
          # The `tar xzf` call is wrapped in `if ! ... ; then` so a tar-level
          # failure (BSD tar exit 1, GNU tar exit 2 on missing member, or any
          # nonzero exit) becomes advisory rather than killing the step via
          # `set -euo pipefail`. Two distinct failure modes flow through this
          # block:
          #   (i)  tar itself exited nonzero — caught by the `if ! ... ; then`
          #        wrap directly below. Typical cause: upstream repackaged
          #        without the requested member.
          #   (ii) tar exited 0 but the extracted tree does not contain the
          #        expected chapter subdir — caught by `[ ! -d "$src" ]`
          #        below. Typical cause: upstream kept the dev-clean subtree
          #        but replaced 1272/128104 with something else.
          # Both emit corpus_ok=false with the same downstream cascade.
          stage="$(mktemp -d)"
          trap 'rm -rf "$stage"' EXIT
          member="LibriSpeech/dev-clean/${SPEAKER}/${CHAPTER}"
          if ! tar xzf "$TARBALL" -C "$stage" "$member" 2>"$stage/tar.err"; then
            echo "::warning::tar failed to extract $member from $TARBALL —" \
                 "advisory downgrade (tar itself exited nonzero; typically" \
                 "GNU tar exit 2 / BSD tar exit 1 on missing member, i.e." \
                 "upstream repackaging, not a Vokra regression). Owner WP" \
                 "X-10 (self-mirror) tracks the recurrence fix."
            cat "$stage/tar.err" >&2 || true
            echo "corpus_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          src="$stage/$member"
          if [ ! -d "$src" ]; then
            echo "::warning::archive member $member not found in $TARBALL —" \
                 "advisory downgrade (tar succeeded but the extracted tree" \
                 "does not contain the expected chapter subdir; upstream" \
                 "repackaging, not a Vokra regression). Owner WP X-10 (self-" \
                 "mirror) tracks the recurrence fix."
            echo "corpus_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          n_flac="$(find "$src" -type f -name '*.flac' | wc -l | tr -d ' ')"
          if [ "$n_flac" -eq 0 ]; then
            echo "::warning::no .flac extracted from $member — advisory" \
                 "downgrade (upstream repackaging, not a Vokra regression)." \
                 "Owner WP X-10 (self-mirror) tracks the recurrence fix."
            echo "corpus_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$CORPUS_DIR/dev-clean/${SPEAKER}"
          rm -rf "$CORPUS_DIR/dev-clean/${SPEAKER}/${CHAPTER}"
          mv "$src" "$CORPUS_DIR/dev-clean/${SPEAKER}/"
          echo "extracted $n_flac flac from $member"
          # subset-extract>>>
          ls -la "$CORPUS_DIR/dev-clean/${SPEAKER}/${CHAPTER}" | head
          echo "corpus_ok=true" >> "$GITHUB_OUTPUT"

      - name: Decode flac → 16 kHz mono WAV
        if: steps.corpus-extract.outputs.corpus_ok == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . /tmp/vokra-py-asrwer/bin/activate
          mkdir -p "$GITHUB_WORKSPACE/.wav"
          echo "WAV_DIR=$GITHUB_WORKSPACE/.wav" >> "$GITHUB_ENV"
          WAV_DIR="$GITHUB_WORKSPACE/.wav" python3 - <<'PYEOF'
          import os, sys
          from pathlib import Path
          import soundfile as sf

          corpus = Path(os.environ["CORPUS_DIR"]) / "dev-clean"
          out = Path(os.environ["WAV_DIR"])
          n = 0
          for flac in sorted(corpus.rglob("*.flac")):
              data, sr = sf.read(flac, dtype="int16")
              # LibriSpeech is 16 kHz mono by construction. Assert rather
              # than resample: a silent resample here would change what the
              # baseline measured, and vokra-cli only accepts mono WAV.
              if sr != 16000 or data.ndim != 1:
                  sys.exit(f"::error::{flac} is {sr} Hz, ndim={data.ndim}; expected 16 kHz mono")
              sf.write(out / f"{flac.stem}.wav", data, sr, subtype="PCM_16")
              n += 1
          print(f"decoded {n} utterances")
          if n == 0:
              sys.exit("::error::no audio decoded")
          PYEOF

      - name: Transcribe with vokra-cli
        if: steps.corpus-extract.outputs.corpus_ok == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TR="$GITHUB_WORKSPACE/.transcripts"
          mkdir -p "$TR"
          echo "TRANSCRIPTS=$TR" >> "$GITHUB_ENV"
          for wav in "$WAV_DIR"/*.wav; do
            stem="$(basename "$wav" .wav)"
            if ! out="$(./target/release/vokra-cli run --model "$GGUF" --input "$wav")"; then
              echo "::error::vokra-cli run failed on $stem" >&2
              exit 1
            fi
            # `run` prints the transcript as `asr: <text>`. A missing line
            # means the CLI contract changed; failing here keeps that from
            # masquerading as a WER regression.
            text="$(printf '%s\n' "$out" | sed -n 's/^asr: //p' | head -1)"
            if [ -z "$text" ]; then
              echo "::error::no 'asr: ' line for $stem; got:" >&2
              printf '%s\n' "$out" >&2
              exit 1
            fi
            printf '%s\n' "$text" > "$TR/$stem.txt"
          done
          echo "transcribed $(find "$TR" -type f -name '*.txt' | wc -l | tr -d ' ') utterances"

      - name: Whisper base RTF companion (X-06-T11, advisory record-only)
        # Model-level RTF of the SAME whisper-base GGUF already converted above
        # — no extra download. Placeholder-gated: while the baseline is a
        # placeholder we measure for the record and claim no verdict; once the
        # owner seeds it (ubuntu-latest, then commits), a >5% regression is
        # ANNOTATED but does NOT fail the nightly (open question #6). The
        # actionable gate on this workflow is the WER breach in the next step.
        # Arch-routed: whisper → ModelTask::Asr; --task is deliberately absent.
        if: steps.corpus-extract.outputs.corpus_ok == 'true'
        shell: bash
        env:
          RTF_BASE: docs/bench-baselines/whisper_base_asr_nightly_baseline.json
        run: |
          set -euo pipefail
          # -type f: WAV_DIR's basename is `.wav`, so `-name '*.wav'` on its
          # own matches the directory itself and `head -1` hands back a
          # directory path that would crash the bench downstream. -type f
          # restricts the glob to regular files — the latent hazard fires on
          # every successful run, not just failure branches, so this hygiene
          # fix belongs alongside the advisory-posture rework.
          WAV="$(find "$WAV_DIR" -type f -name '*.wav' | sort | head -1)"
          if [ -z "$WAV" ]; then
            echo "::warning::no decoded WAV for the RTF companion — skipping (the WER leg is the gate)"
            exit 0
          fi
          STATE="$(python3 tools/bench/baseline_gate.py "$RTF_BASE")"
          {
            echo "### Whisper base RTF companion (advisory, X-06-T11)"
            echo ""
            echo '```json'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$STATE" = placeholder ]; then
            echo "::notice::whisper-base RTF baseline is a placeholder — measuring for the record, no regression verdict."
            # Advisory contract requires this branch to survive bench
            # failures the same way the seeded branch does — otherwise a
            # bench crash while the baseline is a placeholder would fail
            # the nightly for a record-only measurement (implementation
            # drift from the advisory self-declaration above).
            set +e
            ./target/release/vokra-cli bench --model "$GGUF" --input "$WAV" \
              --iters 5 --warmup 2 --format json | tee -a "$GITHUB_STEP_SUMMARY"
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "::warning::whisper-base bench (placeholder) failed with rc=$rc — advisory record, not gating"
            fi
          else
            set +e
            ./target/release/vokra-cli bench --model "$GGUF" --input "$WAV" \
              --iters 5 --warmup 2 --baseline "$RTF_BASE" --format json | tee -a "$GITHUB_STEP_SUMMARY"
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "::warning::whisper-base RTF regressed >5% vs the seeded baseline (advisory record — see open question #6 before promoting to a hard gate)"
            fi
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Piper TTS RTF companion (X-06-T12, advisory, staged-GGUF-gated)
        # No piper GGUF is committed (open question #7 — source unsettled), so
        # this CLEAN-SKIPS unless the owner stages one and sets the repo
        # variable VOKRA_PIPER_GGUF. Never fabricates a measurement (FR-EX-08).
        # TTS is --text-driven (not --input); the text is pinned for
        # determinism. Arch-routed: piper → ModelTask::Tts (no --task).
        # The corpus_ok guard keeps every downstream step under a single
        # skip predicate for consistent reasoning; piper does not read the
        # corpus, but running only companions after a corpus-provenance
        # failure would leave the nightly claiming a partial pass while the
        # actual quality gate never ran.
        if: steps.corpus-extract.outputs.corpus_ok == 'true'
        shell: bash
        env:
          PIPER_GGUF: ${{ vars.VOKRA_PIPER_GGUF }}
          RTF_BASE: docs/bench-baselines/piper_tts_nightly_baseline.json
        run: |
          set -euo pipefail
          if [ -z "${PIPER_GGUF:-}" ] || [ ! -f "${PIPER_GGUF:-}" ]; then
            echo "::notice::no staged piper GGUF (repo variable VOKRA_PIPER_GGUF unset or path absent) — clean skip, not a pass. Committed piper GGUF is open question #7."
            exit 0
          fi
          STATE="$(python3 tools/bench/baseline_gate.py "$RTF_BASE")"
          if [ "$STATE" = placeholder ]; then
            echo "::notice::piper RTF baseline is a placeholder — measuring for the record, no verdict."
            # Advisory contract requires this branch to survive bench
            # failures the same way the seeded branch does — otherwise a
            # bench crash while the baseline is a placeholder would fail
            # the nightly for a record-only measurement.
            set +e
            ./target/release/vokra-cli bench --model "$PIPER_GGUF" \
              --text "the quick brown fox jumps over the lazy dog" \
              --iters 5 --warmup 2 --format json | tee -a "$GITHUB_STEP_SUMMARY"
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "::warning::piper bench (placeholder) failed with rc=$rc — advisory record"
            fi
          else
            set +e
            ./target/release/vokra-cli bench --model "$PIPER_GGUF" \
              --text "the quick brown fox jumps over the lazy dog" \
              --iters 5 --warmup 2 --baseline "$RTF_BASE" --format json | tee -a "$GITHUB_STEP_SUMMARY"
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "::warning::piper RTF regressed >5% (advisory record)"
            fi
          fi

      - name: Score WER and apply the threshold
        id: score
        # corpus_ok guard skips this step iff Download or Extract advisory-
        # downgraded (upstream CDN drift). When it DOES run — i.e. corpus
        # provenance is intact — the WER-breach exit 1 is preserved, so the
        # NFR-MT-07 revert/block driver stays actionable. This is the gate;
        # never soften the threshold or the exit 1.
        if: steps.corpus-extract.outputs.corpus_ok == 'true'
        shell: bash
        # Dispatch inputs reach the script through the environment, never by
        # `${{ }}` interpolation into the `run:` body. `threshold` is a
        # free-text field, so interpolating it would splice attacker-chosen
        # text into the shell (GitHub's script-injection guidance); via env
        # it is only ever a value.
        env:
          THRESHOLD_IN: ${{ github.event.inputs.threshold }}
          ALL_IN_CHAPTER: ${{ github.event.inputs.all_in_chapter }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . /tmp/vokra-py-asrwer/bin/activate
          EXTRA=()
          # Only forward --threshold when the dispatcher actually supplied
          # one. Passing $WER_THRESHOLD unconditionally would override each
          # slice's own calibrated threshold — which is exactly the bug that
          # would make an `all_in_chapter` run fail against the 8-utterance
          # slice's number.
          if [ -n "${THRESHOLD_IN:-}" ]; then
            EXTRA+=(--threshold "$THRESHOLD_IN")
          fi
          if [ "${ALL_IN_CHAPTER:-}" = "true" ]; then
            EXTRA+=(--all-in-chapter)
          fi
          set +e
          python3 tools/eval/librispeech_wer.py \
            --librispeech-root "$CORPUS_DIR" \
            --transcripts "$TRANSCRIPTS" \
            --normalizer-json "$HF_NORMALIZER" \
            --model whisper-base \
            --json-out "$GITHUB_WORKSPACE/asr-wer-report.json" \
            --summary-out /tmp/asr-wer-summary.md \
            "${EXTRA[@]}"
          rc=$?
          set -e
          cat /tmp/asr-wer-summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          exit "$rc"

      - name: Upload WER report
        # Runs even on a breach: the report is the evidence the revert/block
        # decision (NFR-MT-07) is made from.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: asr-wer-report
          path: asr-wer-report.json
          if-no-files-found: warn

      - name: Guard the root Cargo.lock (NFR-DS-02)
        if: always()
        shell: bash
        run: git diff --exit-code Cargo.lock
