# Vokra UTMOS parity (M4-18 T12 CI wiring; the M4-18 defer was lifted
# 2026-07-18 and M5-15 landed the implementation side).
#
# Purpose: run the UTMOS parity harness (crates/vokra-eval/tests/parity_utmos.rs)
# against a real converted GGUF. Two of the three original blockers are gone:
# the reference fixture IS committed (generated by importing the real upstream
# implementation, not a mirror), and the converter HAS landed (M5-15 T14).
#
# What still blocks the parity leg is exactly one owner artifact: the weight
# URL. The checkpoint is never committed (the repo ships no weights), so CI
# needs tests/parity/utmos/source.env to know where to fetch it, and that file
# waits on the docs/license-audit.md §3.1 UTMOS sign-off. Rather than
# fabricating a result (NFR-QL-04 ban), the setup job detects the artifact and
# SKIPS CLEANLY with an explicit annotation — the same "missing input is
# announced, never silently substituted" posture as parity-whisper-real.yml's
# audio-fixture gate.
#
# Artifacts the setup job requires:
#   1. tests/parity/utmos/source.env with at least one non-comment line —
#      NOT YET COMMITTED (this is the live blocker), owner-supplied as:
#          CKPT_URL=<https url of the upstream UTMOS checkpoint>
#          CKPT_SHA256=<sha256 of that file>
#   2. tests/parity/utmos/score.json — the upstream-generated reference
#      fixture. ALREADY COMMITTED; the check stays as a guard against it
#      being removed, not because it is pending.
#
# The parity leg then: downloads + sha256-verifies the checkpoint, converts
# it with `vokra-convert --model utmos` (M5-15 T14), and runs
# `VOKRA_UTMOS_GGUF=... cargo test -p vokra-eval --test parity_utmos`.
#
# Zero-dep invariant (NFR-DS-02): root Cargo.lock is never modified; a final
# `git diff --exit-code Cargo.lock` guard catches accidental mutation.
#
# NOT a required check: workflow_dispatch + weekly cron + narrow PR path
# filter only, matching the Kokoro/Whisper real-parity workflows (promote to
# required only after weeks of consecutive green, owner decision).

name: parity-utmos

on:
  workflow_dispatch:
  # Weekly cadence alongside the other real-parity workflows; offset to
  # Monday 08:00 UTC — its own slot in the weekly stagger (Kokoro 04:00,
  # Whisper 05:00, Vulkan 05:30, CUDA-RTF 06:00, CSM 06:30, web-wasm 07:00,
  # Moshi 07:30, UTMOS 08:00, Godot 08:30).
  schedule:
    - cron: "0 8 * * 1"
  pull_request:
    paths:
      - "crates/vokra-eval/src/metrics/utmos.rs"
      - "crates/vokra-eval/tests/parity_utmos.rs"
      - "tests/parity/utmos/**"
      - ".github/workflows/parity-utmos.yml"

permissions:
  contents: read

concurrency:
  group: parity-utmos-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Preflight: detect whether the owner has supplied the weight source.
  # Absent artifact => clean skip with an explicit annotation (the honest
  # posture while the weight URL is unpublished — never a fabricated pass).
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.flip.outputs.ready }}
    steps:
      - uses: actions/checkout@v5
      - name: Detect M4-18 flip artifacts
        id: flip
        shell: bash
        run: |
          set -euo pipefail
          SRC=tests/parity/utmos/source.env
          FIX=tests/parity/utmos/score.json
          src_has_content=0
          if [ -f "$SRC" ] && grep -vE '^\s*(#|$)' "$SRC" | grep -q .; then
            src_has_content=1
          fi
          if [ "$src_has_content" -eq 1 ] && [ -f "$FIX" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            {
              echo "### parity-utmos"
              echo ""
              echo "flip artifacts: **present** (\`$SRC\` + \`$FIX\`) — running the parity leg."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            missing_reason="unknown"
            expected=1
            if [ ! -f "$SRC" ]; then
              missing_reason="source.env not committed (weight URL undetermined)"
            elif [ "$src_has_content" -eq 0 ]; then
              missing_reason="source.env is placeholder-only (no non-comment line)"
            elif [ ! -f "$FIX" ]; then
              # Not the expected cause: score.json is committed, so its
              # absence is a regression rather than the pending blocker.
              missing_reason="score.json reference fixture MISSING (unexpected — it is committed; did something delete it?)"
              expected=0
            fi
            {
              echo "### parity-utmos"
              echo ""
              echo "Parity leg skipping — \`$missing_reason\`."
              echo ""
              if [ "$expected" -eq 1 ]; then
                echo "This is the one remaining blocker. The M4-18 defer was lifted"
                echo "2026-07-18: the reference fixture is committed (upstream-generated)"
                echo "and the converter landed (M5-15 T14). What is left is the weight"
                echo "URL — the checkpoint is never committed (the repo ships no weights),"
                echo "so CI needs \`source.env\` to fetch it, and that waits on the"
                echo "\`docs/license-audit.md\` §3.1 UTMOS sign-off."
              else
                echo "This is NOT the expected blocker and should be investigated."
              fi
              echo ""
              echo "Skipping rather than substituting anything is the honest posture"
              echo "(NFR-QL-04). Recipe: \`tests/parity/utmos/README.md\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning file=tests/parity/utmos/README.md::parity-utmos skipping: $missing_reason (FR-EX-08 explicit skip, not a synthetic fallback)"
          fi

  parity-utmos:
    name: parity-utmos
    needs: setup
    if: needs.setup.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Download + verify the upstream checkpoint (owner-declared URL)
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source tests/parity/utmos/source.env
          : "${CKPT_URL:?source.env must define CKPT_URL}"
          : "${CKPT_SHA256:?source.env must define CKPT_SHA256}"
          curl -fL --retry 3 -o /tmp/utmos-checkpoint "$CKPT_URL"
          echo "${CKPT_SHA256}  /tmp/utmos-checkpoint" | sha256sum -c -
      - name: Prepare the checkpoint (torch pickle -> safetensors + config)
        shell: bash
        run: |
          set -euo pipefail
          # The Lightning .ckpt is a torch pickle, which the zero-dep Rust
          # converter deliberately does not parse (FR-LD-05 / NFR-DS-02).
          # The offline prepare step bridges it, in a venv so the root
          # Cargo.lock is untouched — the same split DAC and Kokoro use.
          python3 -m venv /tmp/utmos-venv
          /tmp/utmos-venv/bin/pip install --quiet --upgrade pip
          /tmp/utmos-venv/bin/pip install --quiet "torch==2.8.0" safetensors
          /tmp/utmos-venv/bin/python tools/parity/utmos_prepare_checkpoint.py \
            --ckpt /tmp/utmos-checkpoint \
            --output /tmp/utmos.safetensors \
            --config-out /tmp/utmos-config.json
      - name: Convert to a vokra.utmos.* GGUF (M5-15 T14 converter)
        shell: bash
        run: |
          set -euo pipefail
          # --config is REQUIRED for utmos (the side-car the prepare step
          # emitted). A missing one is a loud usage error, never a guess.
          cargo run --release -p vokra-convert -- \
            --model utmos \
            --input /tmp/utmos.safetensors \
            --config /tmp/utmos-config.json \
            --output /tmp/utmos.gguf
      - name: Run the parity harness (final score vs the committed fixture)
        shell: bash
        run: |
          set -euo pipefail
          VOKRA_UTMOS_GGUF=/tmp/utmos.gguf \
            cargo test --release -p vokra-eval --test parity_utmos -- --nocapture
      - name: Stage-by-stage parity (skips here — needs an upstream dump)
        shell: bash
        run: |
          set -euo pipefail
          # parity_utmos_stages additionally needs VOKRA_UTMOS_REFDIR, i.e. a
          # dump from tools/parity/utmos_dump_reference.py, which imports
          # fairseq @ d03f4e77 (Python 3.9 only — see docs/adr/M5-15-utmos.md
          # §(d)). CI does not build that environment, so this leg SKIPS
          # cleanly and says so, rather than silently passing a test that
          # compared nothing.
          cargo test --release -p vokra-eval --test parity_utmos_stages -- --nocapture
          echo "::notice::stage parity skipped in CI (VOKRA_UTMOS_REFDIR unset); the developer-side recipe is in tests/parity/utmos/README.md" 
      - name: Zero-dep tripwire (root Cargo.lock untouched)
        shell: bash
        run: git diff --exit-code Cargo.lock
