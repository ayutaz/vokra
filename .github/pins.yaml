# .github/pins.yaml
#
# Vokra CI pinned-external catalog. INFORMATIONAL: this file is a
# derived-and-verified index of every URL/SHA/HF-revision pinned in
# `.github/workflows/*.yml`. The SoT for the value actually consumed at
# runtime remains in-workflow (env: KEY: VALUE) — this catalog is kept in
# sync by `.github/workflows/pins-sync-check.yml` (commit E), and monitored
# for drift by `.github/workflows/corpus-drift-detector.yml` (commit D).
#
# Editing rules:
#   * Bump `schema_version` on any breaking schema change.
#   * NEVER edit a `pinned_value` here without also editing the owning
#     workflow at `owning_workflow:owning_line`; the sync tripwire will
#     fail otherwise.
#   * `mirror:` block is OPTIONAL. Populate it once WP X-10-T02 lands a
#     Vokra-controlled mirror. When present, `drift_policy.mirror_mismatch`
#     escalates to `hard_fail` because Vokra owns byte-identity.
#   * `notes:` is free-text but should cite the WP ID (M-nn-Txx / X-nn-Txx)
#     that governs the pin.
#   * `owning_line` is best-effort at commit time; the sync tripwire
#     locates the pin by string-match, not by line number, so a routine
#     edit that shifts lines does NOT require pins.yaml churn — only a
#     `pinned_value` change does.

schema_version: 1

