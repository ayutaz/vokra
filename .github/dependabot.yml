# Dependabot 設定 (SoT: このファイル)
#
# 対象 ecosystem:
#   - GitHub Actions のみ (`.github/workflows/*.yml` の `uses:` に載る action の pin バージョン)
#
# 対象外 (意図的除外):
#   - Rust crate: root `Cargo.lock` は `vokra-*` のみを許す zero-dep 不変条件
#     (NFR-DS-02) を持つため、`cargo` ecosystem を dependabot 対象にすると
#     `zero-dep` gate を巻き込みで壊す PR が量産される。crate 更新は
#     除外 workspace 側 (integrations/*, vokra-server, vokra-godot 等) に
#     限定して手動で行う。
#   - Python / npm: 補助 tool は venv/isolated build のみで、production 面には
#     bundle しないため dependabot 対象外 (M4/M5 tickets で運用継続を判断)。
#
# schedule:
#   毎週月曜 UTC 00:00 = JST 09:00。週次 parity cron 群 (Monday 04:00-10:00 UTC =
#   §3 stagger、workflows/README.md 参照) より前に投げるので、PR がその週の parity
#   結果を巻き込みで反映しやすい。
#
# limit / labels / reviewer:
#   - open-pull-requests-limit: 5 (同時にレビュー可能な上限を controlled に保つ)
#   - labels: ci + dependencies (Kill switch 監視や release note で機械的に filter するため)
#   - reviewers: ayutaz (依頼者が唯一の maintainer)
#
# grouping:
#   `production-actions` に全 action を集約し、major/minor/patch を 1 PR に束ねる。
#   個別 PR が量産されるのを防ぎ、branch protection の required check 消費を最小化する。

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "00:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
    reviewers:
      - "ayutaz"
    commit-message:
      prefix: "chore(deps)"
    # ignore:
    #   下記は「単なる version tag ではない」pin で、dependabot に自動 bump
    #   させると CI が false-pass 化 (msrv) or hard fail (cibuildwheel) する。
    #
    #   - dtolnay/rust-toolchain@1.89
    #       MSRV pin。2026-07-23 の PR #14 で `@1.89` → `@1.100` に誤 bump
    #       されて msrv job が事実上 stable check になっていた実績。
    #       MSRV 変更は docs/abi-changelog.md + X-08-T32 の owner 判断で手動更新。
    #
    #   - pypa/cibuildwheel@v2.23.4
    #       v3.0.0 が「hybrid pure-python wheel = pre-built native lib inject」
    #       スキームを hard reject する破壊的変更を導入 (Vokra はまさに
    #       hatchling + `src/vokra/_lib/` に cdylib inject する hybrid スキーム
    #       ゆえ v3+ 移行は CIBW_REPAIR_WHEEL_COMMAND 追加設計が必要)。
    #       詳細は .github/workflows/ci.yml:660-676 のコメント。
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
      - dependency-name: "pypa/cibuildwheel"
    groups:
      production-actions:
        patterns:
          - "*"
