# cargo-deny configuration for the Vokra workspace.
#
# - License gate: M0-02-T04 (NFR-LC-02, NFR-LC-04).
# - Dependency bans: M0-01-T12(b), delegated to M0-02 (FR-LD-05, NFR-DS-02, X-08).
#
# Run locally with:  cargo deny check licenses bans
# CI wiring (PR blocker) is owned by M0-01 (license / vulnerability check job,
# NFR-MT-07 required check (6)); this file is the single config it consumes.

[graph]
all-features = true

[licenses]
# NFR-LC-02 (verbatim policy): dependency crates may be Apache 2.0 / MIT / BSD
# only. GPL/LGPL are forbidden. MPL-2.0 (symphonia etc.) may be used in a
# limited fashion only after evaluating its file-level copyleft.
#
# cargo-deny semantics: every license NOT in this allow list is rejected, so
# all GPL / LGPL / AGPL / SSPL / proprietary licenses are denied without
# needing a separate deny list. Keep this list tight; extend it only together
# with an entry in docs/license-audit.md.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
]
# The allow list above is the forward-looking NFR-LC-02 policy; with zero
# external dependencies most entries are unused for now, which is expected —
# don't warn about it.
unused-allowed-license = "allow"
# MPL-2.0 policy (M0-02-T04): NOT allowed by default. If a limited use is
# approved, do BOTH in the same PR:
#   1. add a crate-scoped exception here, e.g.
#        exceptions = [{ crate = "symphonia", allow = ["MPL-2.0"] }]
#   2. record the evaluation in docs/license-audit.md.

[bans]
multiple-versions = "warn"
# FR-LD-05 (permanent constraint) / NFR-DS-02 / X-08: Vokra NEVER loads ONNX
# graphs at runtime and never links the protobuf / abseil / onnx stack; ONNX
# is handled exclusively by the offline conversion tooling, outside the
# runtime dependency graph. The list below is a representative, explicit ban
# of the protobuf / ONNX-runtime crate families — extend it whenever a new
# crate from these families appears.
deny = [
    # protobuf family
    { crate = "protobuf", reason = "FR-LD-05 / NFR-DS-02 / X-08: no protobuf in the runtime dependency graph" },
    { crate = "protobuf-codegen", reason = "FR-LD-05 / NFR-DS-02 / X-08: no protobuf in the runtime dependency graph" },
    { crate = "protobuf-parse", reason = "FR-LD-05 / NFR-DS-02 / X-08: no protobuf in the runtime dependency graph" },
    { crate = "prost", reason = "FR-LD-05 / NFR-DS-02 / X-08: no protobuf in the runtime dependency graph" },
    { crate = "prost-build", reason = "FR-LD-05 / NFR-DS-02 / X-08: no protobuf in the runtime dependency graph" },
    { crate = "prost-derive", reason = "FR-LD-05 / NFR-DS-02 / X-08: no protobuf in the runtime dependency graph" },
    { crate = "prost-types", reason = "FR-LD-05 / NFR-DS-02 / X-08: no protobuf in the runtime dependency graph" },
    # ONNX / onnxruntime family (ONNX is offline-conversion-only, FR-LD-05)
    { crate = "onnx", reason = "FR-LD-05 / X-08: ONNX graphs are never loaded by the runtime" },
    { crate = "onnxruntime", reason = "FR-LD-05 / X-08: ONNX graphs are never loaded by the runtime" },
    { crate = "onnxruntime-sys", reason = "FR-LD-05 / X-08: ONNX graphs are never loaded by the runtime" },
    { crate = "ort", reason = "FR-LD-05 / X-08: ONNX graphs are never loaded by the runtime" },
    { crate = "ort-sys", reason = "FR-LD-05 / X-08: ONNX graphs are never loaded by the runtime" },
    { crate = "tract-onnx", reason = "FR-LD-05 / X-08: ONNX graphs are never loaded by the runtime" },
    # NNAPI is permanently unsupported (FR-BE-07, project design constraint 8,
    # README §4 (2)): Google deprecated NNAPI in Android 15 (2024-10). Vokra's
    # Android GPU path is Vulkan 1.1+ ONLY (M3-02). Ban the NNAPI shim crate
    # family so a stray dependency cannot pull it in — M3-02-T38 wiring.
    { crate = "android_neuralnetworks", reason = "FR-BE-07 / M3-02 red line: NNAPI is permanently unsupported; use Vulkan on Android" },
    { crate = "neuralnetworks-sys", reason = "FR-BE-07 / M3-02 red line: NNAPI is permanently unsupported; use Vulkan on Android" },
    { crate = "android-nnapi", reason = "FR-BE-07 / M3-02 red line: NNAPI is permanently unsupported; use Vulkan on Android" },
    { crate = "android-nnapi-sys", reason = "FR-BE-07 / M3-02 red line: NNAPI is permanently unsupported; use Vulkan on Android" },
    { crate = "nnapi", reason = "FR-BE-07 / M3-02 red line: NNAPI is permanently unsupported; use Vulkan on Android" },
    { crate = "nnapi-sys", reason = "FR-BE-07 / M3-02 red line: NNAPI is permanently unsupported; use Vulkan on Android" },
    # Vulkan binding crates — M3-02 red line (NFR-DS-02 / T01(b)): the Vulkan
    # backend loads libvulkan.so.1 / vulkan-1.dll at RUNTIME via dlopen and
    # transmutes each symbol to its exact C signature. Binding crates would add
    # non-`vokra-*` entries to Cargo.lock. Ban the common ones so a stray
    # dependency cannot introduce them.
    { crate = "ash", reason = "M3-02 red line / NFR-DS-02: Vokra loads libvulkan via dlopen; no binding crate allowed" },
    { crate = "ash-window", reason = "M3-02 red line / NFR-DS-02: Vokra loads libvulkan via dlopen; no binding crate allowed" },
    { crate = "vulkano", reason = "M3-02 red line / NFR-DS-02: Vokra loads libvulkan via dlopen; no binding crate allowed" },
    { crate = "vulkano-shaders", reason = "M3-02 red line / NFR-DS-02: Vokra ships pre-compiled SPIR-V; no shader-toolchain crate" },
    { crate = "erupt", reason = "M3-02 red line / NFR-DS-02: Vokra loads libvulkan via dlopen; no binding crate allowed" },
    { crate = "gpu-alloc", reason = "M3-02 red line / NFR-DS-02: Vokra allocates VkDeviceMemory directly; no allocator crate" },
    { crate = "gpu-alloc-ash", reason = "M3-02 red line / NFR-DS-02: Vokra allocates VkDeviceMemory directly; no allocator crate" },
    { crate = "gpu-alloc-vulkanalia", reason = "M3-02 red line / NFR-DS-02: Vokra allocates VkDeviceMemory directly; no allocator crate" },
    { crate = "vulkanalia", reason = "M3-02 red line / NFR-DS-02: Vokra loads libvulkan via dlopen; no binding crate allowed" },
    { crate = "vulkanalia-sys", reason = "M3-02 red line / NFR-DS-02: Vokra loads libvulkan via dlopen; no binding crate allowed" },
    # Shader-toolchain crates — Vokra ships pre-compiled SPIR-V (`kernels/precompiled/*.spv`)
    # committed to the repo. build.rs never invokes `glslc`; runtime never generates SPIR-V
    # (NFR-RL-05 W^X constraint). Ban shader-toolchain crates so no build-time toolchain leaks
    # in via a transitive dep.
    { crate = "spirv-tools", reason = "M3-02 T13 red line / NFR-DS-02: SPIR-V is committed pre-compiled; no shader-toolchain crate" },
    { crate = "shaderc-rs", reason = "M3-02 T13 red line / NFR-DS-02: SPIR-V is committed pre-compiled; no shader-toolchain crate" },
    { crate = "shaderc", reason = "M3-02 T13 red line / NFR-DS-02: SPIR-V is committed pre-compiled; no shader-toolchain crate" },
    { crate = "glslang-sys", reason = "M3-02 T13 red line / NFR-DS-02: SPIR-V is committed pre-compiled; no shader-toolchain crate" },
    { crate = "naga", reason = "M3-02 T13 red line / NFR-DS-02: SPIR-V is committed pre-compiled; no shader-toolchain crate" },
    # WebGPU binding crates — M4-01 red line (ADR M4-01-webgpu-wasm §6, wired
    # from the ADR M3-02-spirv-generation §4-(d) ban wording that named `wgpu`
    # but had no deny.toml entry yet): the WebGPU backend talks to the browser
    # `navigator.gpu` API through a raw `#[link(wasm_import_module)]` extern
    # shim + hand-written JS glue. The `wgpu` crate family would add a large
    # non-`vokra-*` dependency tree to Cargo.lock (NFR-DS-02).
    { crate = "wgpu", reason = "M4-01 red line / NFR-DS-02: WebGPU is a raw extern-import shim + hand-written JS glue; no binding crate (ADR M4-01 §2/§6)" },
    { crate = "wgpu-core", reason = "M4-01 red line / NFR-DS-02: WebGPU is a raw extern-import shim + hand-written JS glue; no binding crate (ADR M4-01 §2/§6)" },
    { crate = "wgpu-hal", reason = "M4-01 red line / NFR-DS-02: WebGPU is a raw extern-import shim + hand-written JS glue; no binding crate (ADR M4-01 §2/§6)" },
    { crate = "wgpu-types", reason = "M4-01 red line / NFR-DS-02: WebGPU is a raw extern-import shim + hand-written JS glue; no binding crate (ADR M4-01 §2/§6)" },
    # WASM JS-glue toolchain crates — M4-01 red line (ADR M4-01-webgpu-wasm §5):
    # the JS glue and the .d.ts are hand-written; wasm-bindgen would inject a
    # macro + runtime dependency pair into Cargo.lock (NFR-DS-02).
    { crate = "wasm-bindgen", reason = "M4-01 red line / NFR-DS-02: JS glue is hand-written; no wasm-bindgen toolchain (ADR M4-01 §5/§6)" },
    { crate = "wasm-bindgen-futures", reason = "M4-01 red line / NFR-DS-02: JS glue is hand-written; no wasm-bindgen toolchain (ADR M4-01 §5/§6)" },
    { crate = "js-sys", reason = "M4-01 red line / NFR-DS-02: JS glue is hand-written; no wasm-bindgen toolchain (ADR M4-01 §5/§6)" },
    { crate = "web-sys", reason = "M4-01 red line / NFR-DS-02: JS glue is hand-written; no wasm-bindgen toolchain (ADR M4-01 §5/§6)" },
]
