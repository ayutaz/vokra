# cbindgen configuration for the Vokra C ABI header (M0-09-T02).
#
# Regenerate the header with `scripts/gen-c-abi.sh` (which runs
# `cbindgen --config crates/vokra-capi/cbindgen.toml --crate vokra-capi
# --output include/vokra.h`). cbindgen is a build-only tool (MPL-2.0); it is
# NOT a workspace dependency and never ships in an artifact (ADR-0003,
# docs/license-audit.md).

language = "C"
# Single public header (IF-01). Include guard + `extern "C"` for C++.
pragma_once = false
include_guard = "VOKRA_H"
cpp_compat = true
# Emit both the `struct tag;` forward declaration and the `typedef`, so the
# opaque handles (vokra_session_t / vokra_stream_t) declare cleanly.
style = "both"
# usize -> size_t, and pull in <stdint.h>/<stddef.h>/<stdbool.h> as needed.
usize_is_size_t = true
documentation = true
documentation_style = "c99"
line_length = 88
tab_width = 4
# Sort by the order items appear in the source, not alphabetically, so the
# header reads top-down (status, handles, lifecycle, tasks, streaming, utils).
sort_by = "None"

# Top-of-file banner: Apache-2.0 (NFR-LC-01) + "do not edit" + the M0
# breaking-change-allowed notice (milestones.md §4.2 note 3 / ADR-0003).
header = """
/*
 * vokra.h — C ABI for the Vokra speech runtime.
 *
 * Copyright The Vokra Authors.
 * SPDX-License-Identifier: Apache-2.0
 *
 * !!! AUTO-GENERATED by cbindgen from the `vokra-capi` crate — DO NOT EDIT. !!!
 * Regenerate with `scripts/gen-c-abi.sh`; CI fails on drift
 * (`scripts/gen-c-abi.sh --check`).
 *
 * STABILITY: this is the v1.0-rc (M4) prerelease window (semver
 * 1.0.0-rc.N). The ABI is NOT frozen; the semver ABI-stability commitment
 * starts at v1.0 GA (IF-01; docs/milestones.md §4.2 note 3, §9 M5-13; the
 * 2026-07-14 v-label reassignment #2 moved the freeze executor from M4-12 to
 * M5-13 — v1.0 GA = M5 close, M4 = v1.0-rc prerelease). During the v1.0-rc
 * window every symbol delta must be recorded in docs/abi-changelog.md and
 * covered by an entry dated on the day the PR opens —
 * scripts/check-abi-changelog.sh (M3-16) enforces this.
 *
 * RESERVED — CPU ISA tiers (M4-17): runtime CPU ISA selection
 * (`vokra_backend_cpu::IsaPath`, a `#[non_exhaustive]` Rust enum) is an
 * internal dispatch surface and is deliberately NOT exported here; the IF-01
 * freeze therefore never covers ISA-tier names. Future tiers (reserved:
 * AMX* / SME* / RvvZvfh* — see docs/abi-changelog.md "Reserved additions")
 * land as backward-compatible Rust variant additions without touching this
 * header. If a C-level backend/delegate selector is ever exported, it is an
 * M5 decision after the real-hardware NPU bakeoff (docs/handoff/m4-12.md
 * §(e)-3 / §(f)) and would be a NEW symbol, not a widening of an existing
 * one.
 */"""

autogen_warning = "/* Generated by cbindgen. Do not edit by hand — see scripts/gen-c-abi.sh. */"

[parse]
# Only parse vokra-capi itself; vokra-core / vokra-models types referenced by
# the handles stay opaque in the header (that is exactly what we want).
parse_deps = false

[export]
# Keep the C enum name/values verbatim from Rust (VOKRA_OK, ...).
prefix = ""

[enum]
# The Rust variants are already spelled VOKRA_* (see error.rs), so no renaming.
rename_variants = "None"
